<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hệ Thống Báo Cháy - Quiz</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', Tahoma, sans-serif; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); color: #eee; min-height: 100vh; padding: 20px; }
.container { max-width: 900px; margin: 0 auto; }
h1 { text-align: center; margin-bottom: 8px; font-size: 2.2em; background: linear-gradient(90deg, #ff6b35, #f7c548); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.subtitle { text-align: center; color: #aaa; margin-bottom: 30px; }
.brand-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-top: 30px; }
.brand-card { background: rgba(255,255,255,0.08); border: 2px solid rgba(255,255,255,0.15); border-radius: 16px; padding: 30px 20px; text-align: center; cursor: pointer; transition: all 0.3s; }
.brand-card:hover { transform: translateY(-5px); border-color: #ff6b35; background: rgba(255,107,53,0.15); box-shadow: 0 10px 30px rgba(255,107,53,0.3); }
.brand-icon { font-size: 3.5em; margin-bottom: 12px; }
.brand-name { font-size: 1.3em; font-weight: bold; margin-bottom: 5px; }
.brand-desc { font-size: 0.85em; color: #bbb; }
.card-bosch { border-left: 4px solid #dc143c; }
.card-gsth { border-left: 4px solid #00b04f; }
.card-gstul { border-left: 4px solid #0080ff; }
.card-simplex { border-left: 4px solid #ff9500; }
.card-mix { border-left: 4px solid #b19cd9; background: linear-gradient(135deg, rgba(255,107,53,0.1), rgba(177,156,217,0.1)); }
.category-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-top: 20px; }
.cat-card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.15); border-radius: 12px; padding: 20px; text-align: center; cursor: pointer; transition: all 0.2s; }
.cat-card:hover { background: rgba(255,107,53,0.15); border-color: #ff6b35; }
.cat-icon { font-size: 2.2em; margin-bottom: 8px; }
.btn { background: #ff6b35; color: white; border: none; padding: 12px 24px; border-radius: 8px; font-size: 1em; cursor: pointer; margin: 5px; transition: all 0.2s; }
.btn:hover { background: #e55a2b; }
.btn-back { background: rgba(255,255,255,0.15); }
.header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding: 15px; background: rgba(0,0,0,0.3); border-radius: 12px; }
.progress { flex: 1; margin: 0 20px; background: rgba(255,255,255,0.1); height: 8px; border-radius: 4px; overflow: hidden; }
.progress-bar { height: 100%; background: linear-gradient(90deg, #ff6b35, #f7c548); transition: width 0.3s; }
.question-card { background: rgba(255,255,255,0.08); border-radius: 16px; padding: 30px; margin-bottom: 20px; }
.question-num { color: #ff6b35; font-weight: bold; margin-bottom: 10px; }
.question-text { font-size: 1.15em; margin-bottom: 25px; line-height: 1.5; }
.options { display: flex; flex-direction: column; gap: 12px; }
.option { background: rgba(255,255,255,0.05); border: 2px solid rgba(255,255,255,0.15); border-radius: 10px; padding: 15px 20px; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; }
.option:hover:not(.disabled) { background: rgba(255,107,53,0.15); border-color: #ff6b35; }
.option.disabled { cursor: default; }
.option.correct { background: rgba(0,176,79,0.25); border-color: #00b04f; }
.option.wrong { background: rgba(220,20,60,0.25); border-color: #dc143c; }
.opt-letter { font-weight: bold; margin-right: 12px; min-width: 24px; color: #ff6b35; }
.option.correct .opt-letter { color: #00b04f; }
.option.wrong .opt-letter { color: #dc143c; }
.explanation { margin-top: 20px; padding: 18px; background: rgba(247,197,72,0.15); border-left: 4px solid #f7c548; border-radius: 8px; line-height: 1.6; display: none; }
.explanation.show { display: block; }
.explanation strong { color: #f7c548; }
.nav-buttons { display: flex; justify-content: flex-end; gap: 10px; }
.result-card { background: rgba(255,255,255,0.08); border-radius: 16px; padding: 40px; text-align: center; }
.score-big { font-size: 4em; font-weight: bold; margin: 20px 0; background: linear-gradient(90deg, #ff6b35, #f7c548); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.summary { text-align: left; margin: 25px 0; padding: 20px; background: rgba(0,0,0,0.25); border-radius: 10px; line-height: 1.7; }
.summary h3 { color: #f7c548; margin-bottom: 10px; }
.wrong-list { margin-top: 15px; }
.wrong-item { padding: 12px; margin-bottom: 8px; background: rgba(220,20,60,0.1); border-left: 3px solid #dc143c; border-radius: 6px; font-size: 0.9em; }
.count-selector { display: flex; gap: 10px; justify-content: center; margin: 20px 0; flex-wrap: wrap; }
.count-btn { background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.2); color: #eee; padding: 10px 20px; border-radius: 8px; cursor: pointer; }
.count-btn:hover, .count-btn.active { background: #ff6b35; border-color: #ff6b35; }
.hidden { display: none; }
h2 { margin-bottom: 15px; color: #f7c548; }
</style>
</head>
<body>
<div class="container">

<!-- HOME -->
<div id="home">
  <h1>🔥 HỆ THỐNG BÁO CHÁY</h1>
  <p class="subtitle">Luyện thi trắc nghiệm - BOSCH · GST · SIMPLEX</p>
  <div class="brand-grid">
    <div class="brand-card card-bosch" onclick="showCategories('BOSCH')">
      <div class="brand-icon">🔴</div>
      <div class="brand-name">BOSCH</div>
      <div class="brand-desc">Fire Panel LSN - Germany</div>
    </div>
    <div class="brand-card card-gsth" onclick="showCategories('GST-H')">
      <div class="brand-icon">🟢</div>
      <div class="brand-name">GST-H</div>
      <div class="brand-desc">Hải Vịnh - Chuẩn GB</div>
    </div>
    <div class="brand-card card-gstul" onclick="showCategories('GST-UL')">
      <div class="brand-icon">🔵</div>
      <div class="brand-name">GST-UL</div>
      <div class="brand-desc">Chuẩn UL864/NFPA72</div>
    </div>
    <div class="brand-card card-simplex" onclick="showCategories('SIMPLEX')">
      <div class="brand-icon">🟠</div>
      <div class="brand-name">SIMPLEX</div>
      <div class="brand-desc">IDNet/IDNAC - USA</div>
    </div>
    <div class="brand-card card-mix" onclick="showCategories('MIX')">
      <div class="brand-icon">🌈</div>
      <div class="brand-name">HỖN HỢP</div>
      <div class="brand-desc">So sánh - Phân biệt hãng</div>
    </div>
  </div>
</div>

<!-- CATEGORY -->
<div id="categories" class="hidden">
  <div class="header-bar">
    <button class="btn btn-back" onclick="goHome()">← Trang chủ</button>
    <h2 id="brand-title" style="margin:0;"></h2>
    <div style="width:120px;"></div>
  </div>
  <div class="category-grid" id="cat-grid"></div>
  <div style="text-align:center;margin-top:30px;">
    <h3 style="color:#aaa;margin-bottom:10px;">Số câu hỏi:</h3>
    <div class="count-selector">
      <button class="count-btn" data-count="10">10 câu</button>
      <button class="count-btn active" data-count="20">20 câu</button>
      <button class="count-btn" data-count="30">30 câu</button>
      <button class="count-btn" data-count="50">50 câu</button>
      <button class="count-btn" data-count="all">Tất cả</button>
    </div>
  </div>
</div>

<!-- QUIZ -->
<div id="quiz" class="hidden">
  <div class="header-bar">
    <button class="btn btn-back" onclick="if(confirm('Thoát bài hiện tại?'))goHome()">← Thoát</button>
    <div class="progress"><div class="progress-bar" id="pbar"></div></div>
    <span id="pcount">1/20</span>
  </div>
  <div class="question-card">
    <div class="question-num" id="qcat"></div>
    <div class="question-text" id="qtext"></div>
    <div class="options" id="qopts"></div>
    <div class="explanation" id="qexp"></div>
    <div class="nav-buttons">
      <button class="btn hidden" id="btnNext" onclick="nextQ()">Câu tiếp →</button>
    </div>
  </div>
</div>

<!-- RESULT -->
<div id="result" class="hidden">
  <div class="result-card">
    <h1>🎯 KẾT QUẢ</h1>
    <div class="score-big" id="scoreBig">0/0</div>
    <div id="scorePercent" style="font-size:1.3em;color:#aaa;"></div>
    <div class="summary" id="summary"></div>
    <button class="btn" onclick="goHome()">🏠 Trang chủ</button>
    <button class="btn" onclick="retryQuiz()">🔄 Làm lại</button>
  </div>
</div>

</div>
<script>
// Fire Alarm Quiz - Question Bank (improved explanations)
const QUESTIONS = [];

// ============ BOSCH - CONTROL PANEL ============
QUESTIONS.push(
{brand:'BOSCH',cat:'ControlPanel',q:'Tủ FPA-5000 hỗ trợ tối đa bao nhiêu điểm phát hiện khi hoạt động độc lập (standalone)?',options:['2048 điểm','4096 điểm','8192 điểm','32.768 điểm'],correct:1,explain:'Tủ báo cháy Modular FPA-5000 khi chạy standalone (1 panel) hỗ trợ 4096 điểm phát hiện. Con số 32.768 là tổng dung lượng của cả mạng 32 node ghép lại (mỗi node 2048 điểm). Nắm rõ khác biệt này để không lẫn khi tính dung lượng dự án.'},
{brand:'BOSCH',cat:'ControlPanel',q:'Mạng FPA-5000 tối đa bao nhiêu node?',options:['16 node','24 node','32 node','64 node'],correct:2,explain:'Mạng của tủ FPA-5000 hỗ trợ tối đa 32 node — bao gồm MPC Panel Controller, Remote Keypad FMR-5000 và OPC server. Có 2 kiểu topo: CAN loop (dây đồng, ≤1000m) hoặc Ethernet loop (có thể qua cáp quang tới 24–40 km).'},
{brand:'BOSCH',cat:'ControlPanel',q:'Số phần tử tối đa mỗi loop LSN improved trên FPA-5000 là bao nhiêu?',options:['127','200','254','512'],correct:2,explain:'Chuẩn LSN improved của BOSCH cho phép 254 phần tử trên 1 loop; LSN classic (thế hệ cũ) chỉ 127 phần tử. Đây là ưu thế lớn khi thiết kế loop dài để giảm số module bus.'},
{brand:'BOSCH',cat:'ControlPanel',q:'Nếu kết hợp LSN improved và LSN classic trên cùng 1 loop, giới hạn phần tử là:',options:['127','200','254','381'],correct:0,explain:'Khi trộn 2 thế hệ LSN trên cùng loop, hệ thống bị hạ xuống giới hạn của chuẩn thấp hơn — tức 127 phần tử theo LSN classic. Nếu muốn tận dụng 254 điểm/loop, phải đảm bảo tất cả thiết bị trên loop đều là LSN improved.'},
{brand:'BOSCH',cat:'ControlPanel',q:'Chiều dài cáp tối đa của module LSN-1500-A là:',options:['1000 m','1600 m','2000 m','3000 m'],correct:3,explain:'Module bus LSN-1500-A hỗ trợ cáp tối đa 3000 m/loop nhờ khả năng cấp dòng 1500 mA. Còn module LSN-0300-A (300 mA) chỉ đạt 1600 m. Chọn LSN-1500-A khi tòa nhà rộng hoặc loop có nhiều thiết bị tiêu thụ cao.'},
{brand:'BOSCH',cat:'ControlPanel',q:'Chiều dài cáp tối đa của module LSN-0300-A là:',options:['800 m','1000 m','1600 m','3000 m'],correct:2,explain:'Module bus LSN-0300-A đạt cáp tối đa 1600 m/loop, phù hợp dự án vừa và nhỏ. Nếu cần loop dài hơn phải chuyển sang module LSN-1500-A (3000 m) — nhưng chỉ dùng được với tủ FPA-5000, không dùng cho FPA-1200.'},
{brand:'BOSCH',cat:'ControlPanel',q:'FPA-1200 hỗ trợ tối đa bao nhiêu module LSN-0300-A?',options:['1','2','4','6'],correct:1,explain:'Tủ báo cháy nhỏ-trung FPA-1200 chỉ hỗ trợ tối đa 2 module bus LSN-0300-A, cho tổng 254 phần tử (127×2). Nếu dự án cần hơn 254 điểm, phải chuyển sang tủ FPA-5000 lớn hơn.'},
{brand:'BOSCH',cat:'ControlPanel',q:'FPA-1200 có hỗ trợ module LSN-1500-A không?',options:['Có','Không','Chỉ khi nâng cấp firmware','Chỉ 1 module'],correct:1,explain:'Module bus LSN-1500-A CHỈ tương thích với tủ FPA-5000, KHÔNG dùng được cho tủ FPA-1200. Nếu FPA-1200 cần loop dài hơn 1600 m thì bắt buộc phải nâng cấp lên FPA-5000.'},
{brand:'BOSCH',cat:'ControlPanel',q:'Số Remote Keypad FMR-5000 tối đa cho FPA-1200 là:',options:['1','3','8','32'],correct:1,explain:'Tủ FPA-1200 chỉ hỗ trợ tối đa 3 bàn phím từ xa FMR-5000 Remote Keypad. Trong khi đó tủ FPA-5000 có thể có tới 32 node trong mạng (bao gồm cả MPC và Remote Keypad).'},
{brand:'BOSCH',cat:'ControlPanel',q:'Điện áp vận hành của MPC-1300-C:',options:['12-24V DC','20-30V DC','24-48V DC','12-30V DC'],correct:1,explain:'Panel Controller MPC-1300-C của FPA-5000 hoạt động trong dải 20–30V DC (danh định 24V DC). Cần lưu ý khi cấp nguồn dự phòng: điện áp pin không được rơi dưới 20V khi tủ ở chế độ báo động.'},
{brand:'BOSCH',cat:'ControlPanel',q:'Kích thước màn hình MPC-1300-C:',options:['4.3 inch','5.7 inch (14.5 cm)','7 inch','10.4 inch'],correct:1,explain:'Panel Controller MPC-1300-C dùng màn hình TFT màu 5.7 inch (14.5 cm) độ phân giải 320×240 px, cảm ứng. Đây là đơn vị hiển thị và xử lý cảnh báo trung tâm của tủ FPA-5000.'},
{brand:'BOSCH',cat:'ControlPanel',q:'Chiều dài cáp CAN tối đa của MPC-1300-C:',options:['500 m','1000 m','1600 m','3000 m'],correct:1,explain:'Panel Controller MPC-1300-C kết nối các node qua CAN với chiều dài tối đa 1000 m (dây đồng). Nếu cần xa hơn (tới 24–40 km giữa các tòa nhà), phải chuyển sang Ethernet hoặc cáp quang.'},
{brand:'BOSCH',cat:'ControlPanel',q:'FPA-5000 lưu trữ được bao nhiêu sự kiện trong database nội bộ?',options:['1.000','5.000','10.000','100.000'],correct:2,explain:'Tủ báo cháy FPA-5000 có database nội bộ lưu 10.000 sự kiện gần nhất — dùng cho điều tra sự cố, kiểm tra bảo trì. Có thể xuất log qua USB hoặc Ethernet mà không cần shutdown hệ thống.'},
{brand:'BOSCH',cat:'ControlPanel',q:'Theo EN 54-2, panel Bosch có bao nhiêu điểm/nút nhấn cần kết nối dự phòng (redundant)?',options:['>128','>256','>512','>1024'],correct:2,explain:'Chuẩn EN 54-2 yêu cầu: khi panel giám sát trên 512 đầu báo/nút nhấn thì phải có kết nối dự phòng redundant. Với BOSCH FPA-5000, điều này đạt được bằng cách thêm housing thứ hai với MPC thứ hai.'},
{brand:'BOSCH',cat:'ControlPanel',q:'Phần mềm lập trình cho tủ FPA-5000/FPA-1200 là:',options:['SSD Designer','FSP-5000-RPS','Bosch Config Tool','RPS-5000'],correct:1,explain:'Phần mềm cấu hình chính của BOSCH là FSP-5000-RPS Programming Software — dùng cho cả tủ FPA-5000 và FPA-1200. Kết nối qua USB hoặc Ethernet, có thể cập nhật cấu hình mà không cần shutdown hệ thống.'},
{brand:'BOSCH',cat:'ControlPanel',q:'Bosch SSD là công cụ để làm gì?',options:['Lập trình logic tủ','Thiết kế đồ họa cảnh báo','Lập kế hoạch loop, tính dòng và chiều dài cáp','Backup cấu hình'],correct:2,explain:'SSD (Safety Systems Designer) là phần mềm hỗ trợ thiết kế loop — tính toán dòng điện tiêu thụ, sụt áp, chiều dài cáp cho phép, số lượng thiết bị/loop. Dùng SSD trước khi thi công để tránh quá tải loop và thiết kế không đúng chuẩn.'},
{brand:'BOSCH',cat:'ControlPanel',q:'FPC-500 là loại tủ gì?',options:['Địa chỉ LSN','Conventional (zone thông thường)','Điều khiển chữa cháy khí','Voice evacuation'],correct:1,explain:'Tủ báo cháy FPC-500 là loại Conventional (thông thường theo vùng) — không có địa chỉ từng thiết bị, mỗi zone kết nối nhiều đầu báo song song. Dùng cho công trình nhỏ khi không cần địa chỉ cụ thể từng điểm.'},
{brand:'BOSCH',cat:'ControlPanel',q:'FPC-500-8 hỗ trợ tối đa bao nhiêu đầu báo tổng cộng?',options:['64','128','256','512'],correct:2,explain:'Tủ Conventional FPC-500-8 có 8 vùng (zone) × 32 đầu báo/vùng = tối đa 256 đầu báo. Các biến thể nhỏ hơn: FPC-500-2 (2 zone/64 detector), FPC-500-4 (4 zone/128 detector).'},
{brand:'BOSCH',cat:'ControlPanel',q:'Nhiệt độ vận hành của FPC-500:',options:['-5°C đến +50°C','0°C đến +40°C','-10°C đến +55°C','-20°C đến +65°C'],correct:1,explain:'Tủ Conventional FPC-500 chỉ vận hành trong dải 0°C đến +40°C — hạn chế đáng kể trong môi trường lạnh. So sánh: tủ FPA-5000 vận hành rộng hơn (-5°C đến +50°C).'},
{brand:'BOSCH',cat:'ControlPanel',q:'Kết nối FPA-5000 với hệ thống âm thanh Praesideo/PAVIRO qua module:',options:['BCM-0000-B','IOS-0020-A hoặc IOS-0232-A','FLM-420-NAC','LSN-1500-A'],correct:1,explain:'Module giao tiếp IOS-0020-A (đường 20 mA, tối đa 1000 m) hoặc IOS-0232-A (2× RS232, mỗi cái tối đa 3 m) dùng để kết nối FPA-5000 với hệ thống âm thanh sơ tán Praesideo/PAVIRO của BOSCH.'},
{brand:'BOSCH',cat:'ControlPanel',q:'Khoảng cách trống cần thiết phía phải housing FPA-5000 để bảo trì:',options:['≥100 mm','≥150 mm','≥230 mm','≥300 mm'],correct:2,explain:'Housing của tủ FPA-5000 cần chừa ≥230 mm khoảng trống phía phải khung để mở nắp bảo trì thuận tiện. Nếu không đủ khoảng trống, khi thay thế module sẽ gặp khó khăn vật lý.'},
{brand:'BOSCH',cat:'ControlPanel',q:'FPA-1200 tối đa bao nhiêu module chức năng?',options:['4','6','10','46'],correct:1,explain:'Tủ FPA-1200 giới hạn 6 module chức năng — không đủ nếu dự án cần nhiều giao diện I/O, PA, relay… Trong khi đó FPA-5000 hỗ trợ tối đa 46 module chức năng, phù hợp dự án lớn.'},
{brand:'BOSCH',cat:'ControlPanel',q:'Số vùng NAC tối đa của FPC-500:',options:['1','2','4','8'],correct:1,explain:'Tủ Conventional FPC-500 có 2 đầu ra NAC (Notification Appliance Circuit), mỗi cái chịu tải 500 mA. NAC dùng để cấp nguồn cho còi/đèn cảnh báo conventional (như FNM-320 sounder).'},
{brand:'BOSCH',cat:'ControlPanel',q:'Cấp bảo vệ (IP) của FPA-1200:',options:['IP 20','IP 30','IP 54','IP 65'],correct:1,explain:'Tủ FPA-1200 có cấp bảo vệ IP 30 — chống vật rắn ≥2.5 mm, KHÔNG chống bụi hay nước. Chỉ phù hợp lắp trong phòng khô, sạch; không dùng ngoài trời hay nơi ẩm ướt.'},
{brand:'BOSCH',cat:'ControlPanel',q:'Kết nối BIS (Building Integration System) của FPA-5000 qua:',options:['CAN bus','Modbus RTU','OPC server qua Ethernet','RS485 trực tiếp'],correct:2,explain:'Tủ FPA-5000 tích hợp BIS (Building Integration System) qua OPC server chạy trên nền Ethernet. Với FPA-1200 cần thêm license ADC-5000-OPC để mở tính năng này.'},

// ============ BOSCH - DETECTORS ============
{brand:'BOSCH',cat:'Detectors',q:'Dòng đầu báo địa chỉ hàng đầu của BOSCH có tên gọi:',options:['LSN 300 Series','AVENAR 4000','FAS-420','MAPNET'],correct:1,explain:'AVENAR detector 4000 là dòng đầu báo địa chỉ LSN thế hệ mới nhất của BOSCH, gồm nhiều biến thể: FAP-425-O (quang), FAP-425-OT (quang+nhiệt), FAP-425-DO-R (dual-optical), FAH-425-T-R (chỉ nhiệt) v.v. Tương thích ngược với LSN classic và các tủ cũ.'},
{brand:'BOSCH',cat:'Detectors',q:'Công nghệ Dual-Ray dùng ở đầu báo nào?',options:['FAP-425-O','FAP-425-DO-R','FAH-425-T-R','FAS-420-TM-R'],correct:1,explain:'Đầu báo khói dual-optical FAP-425-DO-R (và bản có nhiệt FAP-425-DOT-R) dùng công nghệ Dual-Ray — 2 LED (hồng ngoại + xanh lam) giúp phát hiện khói mảnh nhỏ tinh vi, đáp ứng cả cháy TF1 (giấy) và TF9 (dầu).'},
{brand:'BOSCH',cat:'Detectors',q:'ISP trong AVENAR 4000 là viết tắt của:',options:['Internet Service Provider','Intelligent Signal Processing','Integrated Smoke Panel','Industrial Sensor Platform'],correct:1,explain:'ISP (Intelligent Signal Processing) là công nghệ xử lý tín hiệu thông minh trên đầu báo AVENAR 4000. ISP liên tục phân tích và kết hợp tín hiệu từ nhiều cảm biến (quang/nhiệt/CO) để phân biệt đám cháy thật với báo giả (khói bếp, hơi nước…).'},
{brand:'BOSCH',cat:'Detectors',q:'Đầu báo BOSCH nào có cảm biến CO?',options:['FAP-425-O','FAP-425-DO-R','FAP-425-DOTC-R','FAH-425-T-R'],correct:2,explain:'Đầu báo đa cảm biến FAP-425-DOTC-R là bản cao cấp nhất của AVENAR 4000: dual-optical + thermal + CO (carbon monoxide). Cảm biến CO hóa học giúp phát hiện cháy âm ỉ giai đoạn sớm (trước khi có khói rõ), nhưng có tuổi thọ hữu hạn — phải thay khi ngừng hoạt động.'},
{brand:'BOSCH',cat:'Detectors',q:'Điện áp vận hành của AVENAR 4000:',options:['12-24V DC','15-33V DC','20-30V DC','24-48V DC'],correct:1,explain:'Đầu báo AVENAR 4000 hoạt động trên bus LSN improved với dải rộng 15–33V DC, cho phép sụt áp trên loop dài mà vẫn ổn định. Danh định 24V DC.'},
{brand:'BOSCH',cat:'Detectors',q:'Dòng tiêu thụ của AVENAR 4000:',options:['0.25 mA','0.55 mA','1.0 mA','1.5 mA'],correct:1,explain:'Đầu báo AVENAR 4000 tiêu thụ rất thấp — chỉ 0.55 mA/đầu báo. Dòng thấp này cho phép nhiều thiết bị trên cùng loop (tới 254 điểm) mà không vượt tải bus.'},
{brand:'BOSCH',cat:'Detectors',q:'Diện tích giám sát tối đa của đầu báo khói AVENAR 4000:',options:['60 m²','80 m²','120 m²','200 m²'],correct:2,explain:'Đầu báo khói AVENAR 4000 giám sát tối đa 120 m² (chuẩn EN 54-7). Đối với đầu báo nhiệt FAH-425-T-R chỉ 40 m² vì đầu nhiệt phát hiện chậm hơn khói.'},
{brand:'BOSCH',cat:'Detectors',q:'Chiều cao lắp đặt tối đa của đầu báo khói AVENAR 4000:',options:['6 m','10 m','16 m','20 m'],correct:2,explain:'Đầu báo khói AVENAR 4000 có thể lắp trần cao tới 16 m. Còn đầu báo nhiệt FAH-425-T-R chỉ lắp được 0–7.5 m — do bản chất nhiệt độ giảm nhanh theo độ cao trần.'},
{brand:'BOSCH',cat:'Detectors',q:'Cấp bảo vệ tiêu chuẩn của đầu báo AVENAR 4000:',options:['IP 20','IP 41 (IP 43 với seal)','IP 54','IP 65'],correct:1,explain:'Đầu báo AVENAR 4000 đạt IP 41 tiêu chuẩn — chống vật rắn ≥1 mm và nhỏ giọt nước thẳng đứng. Có thể nâng lên IP 43 khi lắp thêm seal FAA-420-SEAL hoặc phụ kiện MSC 420.'},
{brand:'BOSCH',cat:'Detectors',q:'Chuẩn EN cho đầu báo khói AVENAR 4000:',options:['EN 54-5','EN 54-7','EN 54-11','EN 54-17'],correct:1,explain:'Đầu báo khói AVENAR 4000 đạt EN 54-7 (chuẩn cho detector khói quang). Đầu báo nhiệt FAH-425-T-R đạt EN 54-5. Cần nắm rõ để chỉ định đúng chuẩn theo yêu cầu AHJ (cơ quan quản lý).'},
{brand:'BOSCH',cat:'Detectors',q:'FAH-425-T-R là loại đầu báo gì?',options:['Khói quang','Nhiệt (heat only)','Optical+Thermal','Dual-optical'],correct:1,explain:'Đầu báo nhiệt FAH-425-T-R (Heat Only) là bản nhiệt thuần trong dòng AVENAR 4000 — chỉ dùng cảm biến nhiệt, không có cảm biến khói. Nhận dạng bằng vòng đỏ trên vỏ. Phù hợp môi trường có bụi/khói/hơi thường xuyên như bếp, kho.'},
{brand:'BOSCH',cat:'Detectors',q:'Phiên bản AVENAR 4000 nào KHÔNG hỗ trợ T-tap?',options:['FAP-425-DO-R','FAP-425-O (không rotary)','FAP-425-OT-R','FAH-425-T-R'],correct:1,explain:'Các phiên bản AVENAR 4000 không có rotary switch (FAP-425-O và FAP-425-OT — không có hậu tố -R) KHÔNG hỗ trợ T-tap, chỉ dùng cấu trúc tuyến tính hoặc loop. Muốn đi T-tap phải chọn bản có -R (rotary).'},
{brand:'BOSCH',cat:'Detectors',q:'Bao nhiêu isolator LSN được tích hợp trong AVENAR 4000?',options:['0','1','2','4'],correct:2,explain:'Đầu báo AVENAR 4000 tích hợp sẵn 2 cầu dao cách ly (isolator) LSN. Khi có đứt cáp hay ngắn mạch tại 1 điểm, 2 isolator sẽ cô lập đoạn lỗi, giúp phần còn lại của loop tiếp tục hoạt động. Trừ phiên bản không có rotary (không có isolator).'},
{brand:'BOSCH',cat:'Detectors',q:'FAD-425-O-R là đầu báo gì?',options:['Điểm quang','Điểm nhiệt','Ống gió (duct)','Beam tuyến tính'],correct:2,explain:'Đầu báo khói ống gió FAD-425-O-R (Duct Detector) là đầu báo quang gắn trong housing FAD-420-HS-EN, dùng để phát hiện khói trong ống thông gió HVAC. Lưu ý: đầu báo và housing phải đặt mua riêng rẽ.'},
{brand:'BOSCH',cat:'Detectors',q:'Dải tốc độ không khí của FAD-420-HS-EN duct detector:',options:['0-5 m/s','1-20 m/s','5-30 m/s','10-40 m/s'],correct:1,explain:'Đầu báo ống gió FAD-420-HS-EN hoạt động với tốc độ khí trong ống 1–20 m/s. Ngoài dải này thì mẫu khí không đủ để đưa khói qua buồng cảm biến, gây bỏ sót cảnh báo.'},
{brand:'BOSCH',cat:'Detectors',q:'Chiều dài cáp từ đầu báo LSN đến remote indicator không màn chắn tối đa:',options:['3 m','15 m','30 m','500 m'],correct:0,explain:'Nếu dùng cáp KHÔNG có màn chắn (unshielded) từ đầu báo LSN đến đèn báo phụ (remote indicator FAA-420-RI), chiều dài tối đa chỉ 3 m. Còn với cáp shielded (có màn chắn) thì được tới 500 m.'},
{brand:'BOSCH',cat:'Detectors',q:'Đầu báo dual-optical KHÔNG dùng được với:',options:['FPA-5000 MPC phiên bản A','FPA-1200 mới','MPC-1300-C','LSN-1500-A'],correct:0,explain:'Đầu báo dual-optical AVENAR 4000 (FAP-425-DO-R, DOT-R, DOTC-R) KHÔNG tương thích với Panel Controller MPC phiên bản A của FPA-5000. Phải nâng cấp lên MPC-1300-C phiên bản mới để dùng được.'},
{brand:'BOSCH',cat:'Detectors',q:'Nhiệt độ vận hành đầu báo FAP-425-O (chỉ quang):',options:['-20°C đến +50°C','-20°C đến +65°C','0°C đến +50°C','-5°C đến +55°C'],correct:1,explain:'Đầu báo quang FAP-425-O (chỉ khói) vận hành rộng -20°C đến +65°C. Các bản có thêm cảm biến nhiệt (FAP-425-OT, FAP-425-DOT-R, FAH-425-T-R) bị giới hạn còn -20°C đến +50°C do đặc tính của cảm biến nhiệt.'},
{brand:'BOSCH',cat:'Detectors',q:'Nhận dạng địa chỉ đầu báo AVENAR 4000 bằng cách nào?',options:['Chỉ auto','Chỉ manual','Tự động hoặc rotary switch','DIP switch'],correct:2,explain:'Đầu báo AVENAR 4000 có 2 cách gán địa chỉ: tự động (auto-detection từ tủ khi lắp hàng loạt) hoặc thủ công bằng rotary switch cho các bản có hậu tố -R. Bản không có -R chỉ hỗ trợ auto.'},
{brand:'BOSCH',cat:'Detectors',q:'Cảm biến CO trong FAP-425-DOTC-R khi hết tuổi thọ sẽ:',options:['Vẫn hoạt động','Tự ngắt, phải thay ngay','Chuyển sang chỉ quang','Không thể phát hiện'],correct:1,explain:'Cảm biến CO hóa học trong đầu báo FAP-425-DOTC-R có tuổi thọ hữu hạn và sẽ TỰ NGẮT khi hết hạn. Khi đó phải thay ngay cả đầu báo (không thể thay riêng cảm biến CO). Cần đưa vào kế hoạch bảo trì định kỳ.'},

// ============ BOSCH - MODULES ============
{brand:'BOSCH',cat:'Modules',q:'BCM-0000-B là module gì?',options:['Battery Controller','Bus Communication','Base Controller','Beam Control'],correct:0,explain:'BCM-0000-B là Battery Controller Module — module điều khiển sạc ắc-quy dự phòng của tủ FPA-5000/FPA-1200. Có bù nhiệt độ (temperature compensation) để kéo dài tuổi thọ pin, hỗ trợ 2–4 ắc-quy loại 24–26 Ah hoặc 36–45 Ah.'},
{brand:'BOSCH',cat:'Modules',q:'BCM-0000-B hỗ trợ tối đa bao nhiêu pin?',options:['2','4','6','8'],correct:1,explain:'Battery Controller BCM-0000-B hỗ trợ tối đa 4 ắc-quy (chia thành 2 cặp): mỗi cặp có thể là 24–26 Ah hoặc 36–45 Ah. Cắm vào khung module của FPA-5000/FPA-1200 theo kiểu plug-and-play.'},
{brand:'BOSCH',cat:'Modules',q:'Dòng ra mỗi cổng sạc của BCM-0000-B:',options:['1.5 A','2.8 A','5 A','10 A'],correct:1,explain:'Battery Controller BCM-0000-B có 2 đầu ra sạc độc lập, mỗi cổng 2.8 A/24V DC. Tổng dòng sạc tối đa 5.6 A đủ nạp ắc-quy dung lượng lớn trong thời gian hợp lý.'},
{brand:'BOSCH',cat:'Modules',q:'Điện trở cuối tuyến (EOL) của FLM-420-I2:',options:['1 kΩ','3.9 kΩ','4.7 kΩ','10 kΩ'],correct:1,explain:'Module đầu vào FLM-420-I2 (Input Interface Module 2 inputs) dùng điện trở EOL 3.9 kΩ để giám sát đường dây. EOL giúp phát hiện cả đứt mạch (ngắn hở) và ngắn mạch trên dây kết nối tiếp điểm.'},
{brand:'BOSCH',cat:'Modules',q:'Số đầu vào của FLM-420-I8R1-S:',options:['2','4','8','16'],correct:2,explain:'Module giao diện FLM-420-I8R1-S (Octo-Input Interface Module with Relay) có 8 đầu vào giám sát + 1 relay đầu ra chuyển đổi. Cấp bảo vệ IP 54 nên phù hợp môi trường có độ ẩm cao.'},
{brand:'BOSCH',cat:'Modules',q:'Cấp bảo vệ IP của FLM-420-I8R1-S:',options:['IP 20','IP 30','IP 54','IP 67'],correct:2,explain:'Module đầu vào FLM-420-I8R1-S đạt IP 54 — chống bụi và tia nước từ mọi hướng. Phù hợp lắp trong tủ kỹ thuật, gara, tầng hầm có độ ẩm cao. Chỉ có biến thể surface-mount, không có bản DIN rail.'},
{brand:'BOSCH',cat:'Modules',q:'FLM-420-NAC điều khiển tín hiệu bằng phương pháp nào?',options:['Pole reversal (đảo cực)','PWM','FSK','Manchester'],correct:0,explain:'Module NAC FLM-420-NAC (Signaling Device Interface Module) điều khiển khu vực NAC bằng phương pháp đảo cực (pole reversal). Khi có báo động, module đảo chiều dòng để kích hoạt còi/đèn conventional trên đường dây được giám sát.'},
{brand:'BOSCH',cat:'Modules',q:'Số dạng tín hiệu đầu ra lập trình được của FLM-420-NAC:',options:['4','8','10','32'],correct:2,explain:'Module NAC FLM-420-NAC có 10 dạng tín hiệu đầu ra khác nhau, lập trình được qua FSP-5000-RPS. Điều này cho phép phân biệt tone theo loại cảnh báo (evacuation, alert, test…).'},
{brand:'BOSCH',cat:'Modules',q:'FLM-420-NAC có tự cấp nguồn từ LSN không?',options:['Có','Không - cần nguồn ngoài 20.4-29 V DC','Chỉ khi không quá 500mA','Chỉ với LSN-1500-A'],correct:1,explain:'Module NAC FLM-420-NAC BẮT BUỘC cấp nguồn ngoài 20.4–29V DC (thường lấy từ AUX của tủ), KHÔNG tự cấp từ bus LSN. Điều này vì tải NAC có thể lên tới 3A — vượt xa khả năng cấp của bus LSN.'},
{brand:'BOSCH',cat:'Modules',q:'FLM-420-O1I1 có loại đầu ra gì?',options:['Relay cơ','Bán dẫn cách ly','Triac','Open collector'],correct:1,explain:'Module FLM-420-O1I1 (Output-Input Interface Module) có 1 đầu ra bán dẫn cách ly điện với bus LSN, tối đa 700 mA / 30V DC + 1 đầu vào giám sát. Phù hợp điều khiển van gas, cửa chống cháy công suất nhỏ. Không phải relay cơ nên không thích hợp tải AC cao.'},
{brand:'BOSCH',cat:'Modules',q:'FLM-420-RLV1 phiên bản -D (DIN) chịu tải DC:',options:['1 A/30V','2 A/30V','5 A/30V','10 A/30V'],correct:2,explain:'Module relay FLM-420-RLV1 (Relay Interface Module Low Voltage) bản DIN rail (-D) chịu tải 5A/30V DC; còn bản âm tường (-E) chỉ 1A/30V DC. Cả 2 phiên bản đều giới hạn 0.5A / 42.4V AC.'},
{brand:'BOSCH',cat:'Modules',q:'IOS-0020-A hỗ trợ chiều dài đường 20 mA tối đa:',options:['100 m','500 m','1000 m','3 m'],correct:2,explain:'Module giao tiếp IOS-0020-A (20 mA Communication Module) hỗ trợ đường 20 mA (S20) dài tới 1000 m — dùng nối các hệ thống audio Plena/PAVIRO ở xa. RS232 tích hợp thêm chỉ đi được 3 m theo chuẩn.'},
{brand:'BOSCH',cat:'Modules',q:'IOS-0232-A có bao nhiêu giao diện RS232?',options:['1','2','4','8'],correct:1,explain:'Module giao tiếp IOS-0232-A (RS232 Communication Module) có 2 giao diện RS232 độc lập, mỗi cái tối đa 3 m. Dùng kết nối cùng lúc 2 thiết bị: máy in, laptop cấu hình, hay thiết bị audio Plena.'},
{brand:'BOSCH',cat:'Modules',q:'Dòng tải tối đa của LSN-0300-A:',options:['150 mA','300 mA','750 mA','1500 mA'],correct:1,explain:'Module bus LSN-0300-A cấp dòng tối đa 300 mA/loop — đủ cho vòng vừa và nhỏ. Nếu loop có nhiều thiết bị hoặc dài hơn, phải chuyển sang LSN-1500-A (1500 mA/loop) — nhưng chỉ dùng được cho FPA-5000.'},
{brand:'BOSCH',cat:'Modules',q:'RMH-0002-A chịu điện áp AC nào?',options:['24 V','48 V','120/230 V','400 V'],correct:2,explain:'Module RMH-0002-A (Relay Module High Voltage) có 2 relay chuyển đổi chịu điện áp cao 120/230V AC (hoặc 30V DC). Dùng cho giao diện hệ thống chữa cháy VdS 2496, điều khiển tải AC lớn. Có cầu chì T 6.3 A bảo vệ mỗi relay.'},
{brand:'BOSCH',cat:'Modules',q:'Số relay của RML-0008-A:',options:['1','2','4','8'],correct:3,explain:'Module RML-0008-A (Relay Module Low Voltage) có 8 relay chuyển đổi NC/COM/NO lập trình tự do. Tiêu thụ rất thấp: chỉ 4 mA standby, 68 mA khi tất cả 8 relay kích hoạt.'},
{brand:'BOSCH',cat:'Modules',q:'Tải RML-0008-A:',options:['1A @ 30V DC','5A @ 30V DC','5A @ 230V AC','10A @ 230V AC'],correct:0,explain:'Module RML-0008-A (Low Voltage) chỉ dùng cho tải điện áp thấp: 1A @ 30V DC. KHÔNG dùng cho tải AC điện áp cao như 230V — cần chọn RMH-0002-A (High Voltage) cho tải AC.'},
{brand:'BOSCH',cat:'Modules',q:'Cầu chì bảo vệ mỗi relay của RMH-0002-A:',options:['F 3.15 A','T 6.3 A','F 10 A','T 16 A'],correct:1,explain:'Module RMH-0002-A (High Voltage) có cầu chì T 6.3 A (loại chậm) cho mỗi relay — F1 cho relay 1 và F2 cho relay 2. Cầu chì bảo vệ mạch khi tải AC 230V bị chập.'},
{brand:'BOSCH',cat:'Modules',q:'Dòng standby của RML-0008-A:',options:['4 mA','10 mA','25 mA','68 mA'],correct:0,explain:'Module RML-0008-A ở trạng thái chờ chỉ tiêu thụ 4 mA @ 24V DC. Khi tất cả 8 relay kích hoạt cùng lúc, dòng tăng lên 68 mA. Đây là lý do có thể lắp nhiều module này trên tủ mà không lo tải nguồn 24V.'},
{brand:'BOSCH',cat:'Modules',q:'LSN-1500-A có bao nhiêu đầu ra AUX?',options:['1 × 500 mA','2 × 500 mA','1 × 1500 mA','2 × 300 mA'],correct:1,explain:'Module bus LSN-1500-A có 2 đầu ra AUX 500 mA — dùng cấp nguồn cho các thiết bị ngoài như module NAC, sounder standalone. Trong khi LSN-0300-A chỉ có 1 đầu ra AUX 500 mA.'},

// ============ BOSCH - ALARM DEVICES ============
{brand:'BOSCH',cat:'AlarmDevices',q:'FAA-420-RI-DIN có bao nhiêu chế độ hoạt động?',options:['1','2','3','4'],correct:2,explain:'Đèn báo phụ FAA-420-RI-DIN (Remote Indicator theo chuẩn DIN 14623) có 3 chế độ hoạt động: sáng liên tục (Mode 1) / sáng liên tục + hạn dòng (Mode 2) / nhấp nháy (Mode 3). Chọn chế độ tùy nguồn cấp và ứng dụng.'},
{brand:'BOSCH',cat:'AlarmDevices',q:'FMC-210-DM là loại nút nhấn nào?',options:['Single action','Double action (đập kính + nhấn)','Resettable','Break-glass đơn'],correct:1,explain:'Nút ấn báo cháy thủ công FMC-210-DM (Manual Call Point Double Action) yêu cầu 2 bước để kích hoạt: đập vỡ kính trước rồi mới nhấn nút. Cơ chế này chống kích hoạt vô tình, phù hợp khu vực đông người qua lại.'},
{brand:'BOSCH',cat:'AlarmDevices',q:'FMC-210-DM tuân thủ chuẩn:',options:['EN 54-3 Type A','EN 54-7','EN 54-11 Type B','EN 54-17'],correct:2,explain:'Nút ấn FMC-210-DM đạt EN 54-11 Type B (double action). Nút ấn Type A (single action như FMC-420RW) chỉ cần 1 thao tác, trong khi Type B như FMC-210-DM cần 2 thao tác — an toàn hơn nhưng chậm hơn khi cần kích hoạt gấp.'},
{brand:'BOSCH',cat:'AlarmDevices',q:'FMC-420RW là loại nút nhấn nào?',options:['Single action LSN improved','Double action','Conventional','Break glass only'],correct:0,explain:'Nút ấn báo cháy FMC-420RW (Manual Call Point Single Action LSN improved) chỉ cần 1 thao tác (nhấn ô đen) để kích hoạt, đạt chuẩn EN 54-11 Type A. Có 2 biến thể: loại phá kính và loại resettable (không cần thay kính khi reset).'},
{brand:'BOSCH',cat:'AlarmDevices',q:'Cấp bảo vệ Form H outdoor của FMC-420RW:',options:['IP 42','IP 54','IP 65','IP 67'],correct:3,explain:'Nút ấn FMC-420RW Form H (outdoor) đạt IP 67 — chống bụi hoàn toàn và ngâm nước tạm thời (1m/30 phút). Phù hợp lắp ngoài trời, cảng, khu công nghiệp. Form G indoor chỉ đạt IP 52.'},
{brand:'BOSCH',cat:'AlarmDevices',q:'Độ cao lắp đặt tiêu chuẩn của MCP theo Bosch:',options:['1000 ± 200 mm','1200 ± 200 mm','1400 ± 200 mm','1600 ± 200 mm'],correct:2,explain:'Nút ấn báo cháy thủ công (như FMC-210-DM, FMC-420RW) lắp ở độ cao 1400 ± 200 mm từ giữa thiết bị đến sàn — chuẩn quốc tế cho tầm với dễ dàng. Vị trí ưu tiên: lối thoát, hành lang, cầu thang.'},
{brand:'BOSCH',cat:'AlarmDevices',q:'Số tone lựa chọn của còi FNM-320:',options:['8','16','32','64'],correct:2,explain:'Còi conventional FNM-320 (Conventional Sounder) có 32 tone lựa chọn qua DIP switch — bao gồm DIN tone (EN 457/DIN 33404), BS, NEN, ISO 8201. Chọn tone theo tiêu chuẩn địa phương để đồng bộ với các còi khác trong tòa nhà.'},
{brand:'BOSCH',cat:'AlarmDevices',q:'Âm lượng tối đa FNM-320 ở 24V:',options:['92 dB(A)','105 dB(A)','112 dB(A)','120 dB(A)'],correct:2,explain:'Còi FNM-320 ở 24V DC đạt âm lượng 112 ± 3 dB(A) — phù hợp nhà máy, kho xưởng có tiếng ồn nền cao. Ở 12V DC chỉ 105 dB(A). Tần số hoạt động 300 Hz – 2850 Hz.'},
{brand:'BOSCH',cat:'AlarmDevices',q:'FNM-320LED-SRD có chứng nhận EN 54-23 không?',options:['Có','Không','Chỉ khi lắp trần','Chỉ với FPA-5000'],correct:1,explain:'Còi + đèn LED FNM-320LED-SRD KHÔNG có chứng nhận EN 54-23 (chuẩn cho thiết bị báo quang cho người khiếm thính). Nghĩa là KHÔNG được dùng làm thiết bị báo quang chính theo chuẩn EU — chỉ dùng làm cảnh báo phụ.'},
{brand:'BOSCH',cat:'AlarmDevices',q:'FNM-420-A-BS lập trình tone/âm lượng qua:',options:['DIP switch','FSP-5000-RPS','Bộ điều khiển từ xa','Web browser'],correct:1,explain:'Còi đế địa chỉ FNM-420-A-BS (Base Sounder LSN) lập trình 32 tone + 5 mức âm lượng qua phần mềm FSP-5000-RPS — không cần DIP switch như dòng conventional FNM-320. Cho phép thay đổi từ xa mà không cần leo lên gỡ còi.'},
{brand:'BOSCH',cat:'AlarmDevices',q:'FNS-420-R là thiết bị gì?',options:['Sounder LSN','Đèn strobe LSN','Còi conventional','Đèn báo phụ'],correct:1,explain:'FNS-420-R (LSN Strobe for Sounder Base) là đèn strobe LED địa chỉ trên bus LSN. Đồng bộ 1 Hz với các strobe khác cùng loop, lấy nguồn trực tiếp từ bus (không cần nguồn phụ). Lắp vào đế còi FNM-420-A-BS hoặc đế đầu báo MS 400.'},
{brand:'BOSCH',cat:'AlarmDevices',q:'FNS-420-R có chứng nhận EN 54-23 không?',options:['Có','Không','Chỉ khi lắp trần','Chỉ với FPA-5000'],correct:1,explain:'Đèn strobe FNS-420-R KHÔNG có chứng nhận EN 54-23. Vì vậy KHÔNG được dùng làm thiết bị báo quang chính theo chuẩn EU. Chỉ dùng làm thiết bị cảnh báo phụ hoặc chỉ thị vị trí.'},
{brand:'BOSCH',cat:'AlarmDevices',q:'FNM-420-A-BS mất bao nhiêu dB khi lắp với FNM-SPACER?',options:['-2 dB','-5 dB','-10 dB','-15 dB'],correct:1,explain:'Khi lắp còi đế FNM-420-A-BS cùng phụ kiện FNM-SPACER (miếng chèn giữa đế và trần), âm lượng giảm 5 dB. Cần tính vào tổng dB thực tế khi thiết kế phân bố âm thanh trong không gian.'},
{brand:'BOSCH',cat:'AlarmDevices',q:'W-HSR là sản phẩm của:',options:['Bosch tự sản xuất','Cooper Wheelock Exceder','Simplex','Notifier'],correct:1,explain:'Còi + đèn treo tường W-HSR / W-HSW (Wall Horn Strobe) thực chất là sản phẩm Cooper Wheelock Exceder được BOSCH phân phối cho thị trường UL/ULC. Đạt chuẩn UL 464 (âm thanh) và UL 1971 (đèn cho người khiếm thính).'},
{brand:'BOSCH',cat:'AlarmDevices',q:'Số mức candela của W-HSR:',options:['3','5','8','10'],correct:2,explain:'Còi đèn W-HSR có 8 mức candela chọn được: 15, 15/75, 30, 75, 95, 110, 135, 185 cd. Nhờ có 8 mức trong 1 thiết bị mà kho không cần lưu nhiều model khác nhau.'},
{brand:'BOSCH',cat:'AlarmDevices',q:'Đèn strobe của W-HSR sử dụng loại đèn gì?',options:['LED','Xenon flashtube','Halogen','Neon'],correct:1,explain:'Strobe của còi đèn W-HSR/W-HSW dùng bóng xenon flashtube — cho tia sáng mạnh, tức thời. Đây là điểm khác biệt với dòng FNS-420-R (LSN Strobe) dùng LED. Xenon sáng hơn nhưng tuổi thọ ngắn hơn LED.'},
{brand:'BOSCH',cat:'AlarmDevices',q:'FMC-210-DM khi reset tại call point có reset báo động trên tủ không?',options:['Có','Không - phải reset ở tủ','Chỉ với FPA-5000','Chỉ với chìa khóa đặc biệt'],correct:1,explain:'Với nút ấn FMC-210-DM, thao tác reset tại call point (đóng cửa hoặc dùng chìa khóa FMM-KEY) CHỈ khôi phục trạng thái vật lý của nút, KHÔNG reset báo động trên tủ. Phải vào tủ FPA để reset alarm — quy trình an toàn tránh reset nhầm.'},
{brand:'BOSCH',cat:'AlarmDevices',q:'FNM-420-A-BS-RD có kèm cover không?',options:['Có','Không','Chỉ khi mua kèm sounder','Chỉ phiên bản outdoor'],correct:0,explain:'Còi đế FNM-420-A-BS-RD (Red) đi kèm nắp cover đỏ. Nhưng bản FNM-420-A-BS-WH (White) thì KHÔNG kèm cover — phải đặt mua riêng. Chú ý khi báo giá tránh thiếu phụ kiện.'},
{brand:'BOSCH',cat:'AlarmDevices',q:'Đầu vào thứ 2 của FNM-320 khi kích hoạt sẽ:',options:['Ngắt còi','Tự động chuyển sang tone 2 (pre-alarm)','Tăng âm lượng','Không có tác dụng'],correct:1,explain:'Còi conventional FNM-320 có 2 đầu vào. Khi kích hoạt đầu vào thứ 2, còi tự động chuyển sang tone 2 — chức năng pre-alarm (cảnh báo giai đoạn 1 trước khi sơ tán chính thức).'},
{brand:'BOSCH',cat:'AlarmDevices',q:'Chiều dài cáp tối đa từ thiết bị LSN đến remote indicator (shielded):',options:['3 m','100 m','500 m','1000 m'],correct:2,explain:'Với cáp shielded (có màn chắn), khoảng cách từ thiết bị LSN đến đèn báo phụ FAA-420-RI (Remote Indicator) tối đa 500 m. Nếu dùng cáp unshielded thì chỉ được 3 m — sử dụng loại cáp phù hợp theo thiết kế.'},
);

// ============ BOSCH - SYSTEM KNOWLEDGE ============
QUESTIONS.push(
{brand:'BOSCH',cat:'SystemKnowledge',q:'LSN (Local Security Network) của BOSCH là gì?',options:['Giao thức RS485 chuẩn','Bus 2 dây kết hợp cấp nguồn + dữ liệu số cho đầu báo địa chỉ','Mạng Ethernet nội bộ','Bus 4 dây có cách ly'],correct:1,explain:'LSN (Local Security Network) là bus truyền thông độc quyền của BOSCH — dùng chỉ 2 dây để đồng thời cấp nguồn 24V DC và truyền dữ liệu số cho các thiết bị địa chỉ (detector, module, sounder). Ưu điểm: dây đơn giản, không phân cực (đấu ngược vẫn chạy), có bảo vệ ngắn mạch bằng isolator tích hợp trong từng thiết bị.'},
{brand:'BOSCH',cat:'SystemKnowledge',q:'Khác biệt cốt lõi giữa LSN classic và LSN improved:',options:['Điện áp khác nhau','LSN improved: 254 điểm/loop + dòng cao hơn + hỗ trợ T-tap','LSN improved dùng cáp quang','Chỉ khác giá thành'],correct:1,explain:'LSN improved là thế hệ nâng cấp — tăng số điểm/loop từ 127 lên 254, dòng bus mạnh hơn (đến 1500 mA với LSN-1500-A), cho phép cấu trúc T-tap linh hoạt (rẽ nhánh). LSN classic (đời cũ) chỉ 127 điểm/loop, dòng thấp hơn. Khi trộn 2 thế hệ trên cùng loop, hệ thống bị hạ xuống chuẩn thấp (127 điểm).'},
{brand:'BOSCH',cat:'SystemKnowledge',q:'Isolator tích hợp trong đầu báo AVENAR 4000 hoạt động thế nào?',options:['Ngắt hoàn toàn loop khi có sự cố','Khi phát hiện ngắn mạch, 2 isolator ở 2 đầu thiết bị tự cô lập đoạn lỗi, phần còn lại loop vẫn chạy','Chuyển sang loop dự phòng','Báo lỗi rồi ngắt tủ'],correct:1,explain:'Mỗi đầu báo AVENAR 4000 có 2 isolator LSN tích hợp ở 2 đầu (vào/ra). Khi có ngắn mạch giữa 2 thiết bị, các isolator ở 2 phía tự động ngắt đoạn lỗi, giữ nguyên hoạt động cho phần còn lại của loop từ cả 2 hướng. Sau khi khắc phục, isolator tự phục hồi. Nhờ vậy chỉ 1 sự cố không làm sập cả loop.'},
{brand:'BOSCH',cat:'SystemKnowledge',q:'Vì sao FPA-5000 mở rộng được lên 32.768 điểm?',options:['1 tủ có 32.768 loop','Mạng 32 node × 1024 điểm/node (mỗi node là 1 tủ FPA-5000 hoặc FPA-1200)','Tăng loop lên 128','Dùng cloud'],correct:1,explain:'FPA-5000 độc lập chỉ 4096 điểm/panel. Nhưng khi ghép mạng: tối đa 32 node, mỗi node giám sát tối đa 1024 điểm chia sẻ — tổng dung lượng mạng lên 32.768 điểm. Mỗi node là 1 tủ FPA-5000/FPA-1200 kết nối qua CAN loop (≤1000m) hoặc Ethernet loop (24–40 km qua cáp quang).'},
{brand:'BOSCH',cat:'SystemKnowledge',q:'Class A vs Class B trên LSN — chọn khi nào?',options:['Chỉ Class A hoạt động','Class A (loop khép kín) chống đứt cáp; Class B (T-tap/stub) tiết kiệm dây','Class B nhanh hơn','Không có khác biệt'],correct:1,explain:'Class A là loop khép kín (closed ring) — cáp đi từ tủ ra rồi về lại tủ. Khi đứt cáp 1 chỗ, tín hiệu vẫn đến được tất cả thiết bị từ 2 hướng. Class B là loop hở (open) hoặc T-tap — tiết kiệm dây nhưng đứt cáp sẽ mất phần sau điểm đứt. Chọn Class A cho tòa nhà cao, dự án lớn, ứng dụng critical; Class B cho công trình nhỏ.'},
{brand:'BOSCH',cat:'SystemKnowledge',q:'Vì sao dùng LSN-1500-A thay vì LSN-0300-A?',options:['LSN-1500-A rẻ hơn','LSN-1500-A cấp dòng 1500 mA + cáp 3000 m — cho loop dài, nhiều thiết bị tiêu thụ cao','LSN-1500-A nhiều tính năng lập trình hơn','Chỉ khác thương hiệu'],correct:1,explain:'LSN-0300-A cấp 300 mA/1600 m — đủ cho hầu hết loop vừa và nhỏ. LSN-1500-A cấp 1500 mA (gấp 5 lần) và cáp 3000 m (gấp 2), phù hợp: loop dài, nhiều sounder/strobe tiêu thụ cao, hoặc dự án lớn. LƯU Ý: LSN-1500-A CHỈ dùng với FPA-5000 — tủ FPA-1200 chỉ hỗ trợ tối đa 2 module LSN-0300-A.'},
{brand:'BOSCH',cat:'SystemKnowledge',q:'Số thiết bị/loop nên chừa dự phòng bao nhiêu %?',options:['0% (dùng hết)','~20% (thiết kế thực tế 200/254 điểm)','50%','80%'],correct:1,explain:'Nguyên tắc thiết kế thực tế: chừa ~20% dự phòng cho loop LSN — nghĩa là dùng khoảng 200/254 điểm (LSN improved) hoặc 100/127 điểm (LSN classic). Lý do: (1) dự phòng mở rộng tương lai, (2) đảm bảo dòng bus không sát giới hạn (tránh sụt áp), (3) tính đến các module NAC/sounder tiêu thụ cao. Dùng SSD Designer để tính chính xác.'},
{brand:'BOSCH',cat:'SystemKnowledge',q:'Quy trình gán địa chỉ cho đầu báo AVENAR 4000:',options:['Chỉ DIP switch','Auto (tủ tự gán) hoặc rotary switch (bản -R) — không cần laptop','Chỉ qua FSP-5000-RPS','Nhấn nút vật lý'],correct:1,explain:'AVENAR 4000 có 2 cách: (1) Auto-detection — tủ tự phát hiện thiết bị mới lắp và gán địa chỉ, phù hợp lắp hàng loạt; (2) Rotary switch — chỉ có trên bản có hậu tố -R (như FAP-425-DO-R), xoay bằng tay để đặt địa chỉ vật lý. Bản không có -R (FAP-425-O, FAP-425-OT) không hỗ trợ T-tap, chỉ đi loop/tuyến thẳng.'},
{brand:'BOSCH',cat:'SystemKnowledge',q:'Redundancy (dự phòng) theo EN 54-2 áp dụng khi nào?',options:['Tùy chọn','Bắt buộc khi >512 đầu báo/nút nhấn — phải có housing thứ 2 với MPC thứ 2','Chỉ với FPA-1200','Không bắt buộc'],correct:1,explain:'Chuẩn EN 54-2 yêu cầu: khi hệ thống giám sát >512 đầu báo/nút nhấn, panel phải có kết nối dự phòng (redundant). Với BOSCH FPA-5000, thực hiện bằng cách lắp housing thứ 2 với MPC-1300-C thứ 2 — hệ thống tự chuyển sang backup khi MPC chính hỏng. Đây là yêu cầu bắt buộc pháp lý ở châu Âu, không phải tùy chọn.'},
{brand:'BOSCH',cat:'SystemKnowledge',q:'ISP (Intelligent Signal Processing) trong AVENAR 4000 là gì?',options:['Chuẩn Internet','Thuật toán phân tích liên tục tín hiệu đa cảm biến để phân biệt cháy thật với báo giả','Giao thức truyền tín hiệu','Chức năng nén dữ liệu'],correct:1,explain:'ISP là thuật toán trong đầu báo AVENAR 4000 liên tục phân tích tín hiệu từ nhiều cảm biến (quang, nhiệt, CO) và kết hợp chúng theo mô hình cháy thật. Ưu điểm: phân biệt được khói bếp, hơi nước tắm với khói cháy thật. Giảm báo giả (nuisance alarm) hàng chục lần so với thuật toán ngưỡng đơn thuần thế hệ cũ.'},
{brand:'BOSCH',cat:'SystemKnowledge',q:'Tại sao Dual-Ray phát hiện cháy tốt hơn quang đơn?',options:['Chỉ khác marketing','2 LED bước sóng khác nhau (IR + Blue) phân biệt kích thước hạt khói — bắt được cả TF1 và TF9','Sáng hơn','Rẻ hơn'],correct:1,explain:'Đầu báo dual-optical (FAP-425-DO-R) dùng 2 LED bước sóng khác nhau: hồng ngoại (IR) nhạy với hạt khói lớn, xanh lam (Blue) nhạy với hạt khói nhỏ. Phân biệt được đám cháy khói đen (TF9 - dầu) và khói trắng (TF1 - giấy) — 2 loại cháy khó nhất trong test EN 54-7. Quang đơn LED chỉ tối ưu cho 1 loại khói.'},
{brand:'BOSCH',cat:'SystemKnowledge',q:'Bù trôi (drift compensation) làm gì?',options:['Bù chuyển động','Tự điều chỉnh ngưỡng phát hiện theo bụi bẩn tích tụ trong buồng quang qua thời gian','Bù nhiệt độ','Bù dòng điện'],correct:1,explain:'Theo thời gian, buồng quang của đầu báo khói tích tụ bụi, làm tăng nền tín hiệu. Nếu không bù, đầu báo sẽ báo giả liên tục. Drift compensation tự nâng nhẹ ngưỡng phát hiện để bù bụi tích tụ — kéo dài chu kỳ vệ sinh. NHƯNG khi bụi vượt mức bù được, đầu báo báo "cần vệ sinh" cho tủ. Đây là tính năng chuẩn của LSN đầu báo hiện đại.'},
{brand:'BOSCH',cat:'SystemKnowledge',q:'Ắc-quy dự phòng theo EN 54-4 cho BOSCH FPA:',options:['12h standby','24h standby + 30 phút alarm (thông thường)','1 tuần standby','Chỉ standby không alarm'],correct:1,explain:'Chuẩn EN 54-4 yêu cầu tối thiểu 24h standby + 30 phút full alarm (khi tất cả thiết bị kích hoạt). Với dự án lớn cần 72h standby. Battery Controller BCM-0000-B của FPA-5000/FPA-1200 tính toán tự động, hỗ trợ 2–4 ắc-quy 24–26 Ah hoặc 36–45 Ah. Dùng SSD Designer để tính dung lượng ắc-quy chính xác theo tải hệ thống.'},
{brand:'BOSCH',cat:'SystemKnowledge',q:'Vì sao mỗi loop LSN chỉ nên có 1 module NAC?',options:['Giới hạn kỹ thuật','Module NAC (FLM-420-NAC) cần nguồn ngoài 3A — nhiều NAC sẽ vượt AUX của tủ','Không đủ địa chỉ','Đa NAC gây nhiễu'],correct:1,explain:'Module FLM-420-NAC không tự cấp nguồn từ bus LSN — bắt buộc nguồn ngoài 20.4–29V DC, tối đa 3A. Mỗi loop LSN thường lấy nguồn từ AUX của LSN-0300-A (500 mA) hoặc LSN-1500-A (2×500 mA). Nếu nhiều module NAC trên 1 loop sẽ vượt AUX — phải cấp nguồn từ nguồn phụ riêng có giám sát. Thiết kế phân bổ NAC theo tải AUX.'},
{brand:'BOSCH',cat:'SystemKnowledge',q:'Cấu trúc T-tap trên LSN là gì?',options:['Cáp hình chữ T','Rẽ nhánh giữa loop mà không cần loop khép kín — tiết kiệm dây','Kết nối 3 tủ','Class A hình sao'],correct:1,explain:'T-tap là kỹ thuật rẽ nhánh từ 1 điểm trên loop chính ra 1 nhánh phụ (giống chữ T). Ưu điểm: tiết kiệm dây, linh hoạt lắp đặt trong tòa nhà có nhiều phòng. LSN improved hỗ trợ T-tap; LSN classic KHÔNG hỗ trợ. Yêu cầu: thiết bị đầu T-tap phải có isolator; tổng chiều dài dây (loop chính + nhánh) không vượt giới hạn của module bus.'},
{brand:'BOSCH',cat:'SystemKnowledge',q:'Khi thiết kế loop dài 2500m, chọn module bus nào?',options:['LSN-0300-A','LSN-1500-A (3000m) — LSN-0300-A chỉ 1600m','Cả 2 đều được','Không dùng LSN'],correct:1,explain:'LSN-0300-A giới hạn 1600m — không đủ cho loop 2500m. Bắt buộc dùng LSN-1500-A (3000m). Đồng thời phải kiểm tra tủ có phải FPA-5000 không (LSN-1500-A không dùng được với FPA-1200). Nếu dự án bắt buộc FPA-1200 mà cần loop dài, phải chia thành 2 loop ngắn hơn — mỗi loop dùng 1 LSN-0300-A riêng.'},
{brand:'BOSCH',cat:'SystemKnowledge',q:'FPA-1200 có tối đa bao nhiêu loop?',options:['1','2 (mỗi loop 127 điểm, tổng 254)','4','6'],correct:1,explain:'Tủ báo cháy FPA-1200 giới hạn CỨNG: tối đa 2 module LSN-0300-A × 127 phần tử = 254 điểm tổng cộng. Không thể mở rộng thêm — vượt số này phải nâng cấp lên FPA-5000. Ngoài ra FPA-1200 tối đa 6 module chức năng (I/O, NAC, relay) và 3 Remote Keypad FMR-5000.'},
{brand:'BOSCH',cat:'SystemKnowledge',q:'Phân bổ FPA-5000 tối đa 46 module chức năng — chọn thế nào?',options:['Cắm ngẫu nhiên','Ưu tiên bus LSN → nguồn → I/O → relay theo thứ tự tải giảm dần','Ngẫu nhiên','Chỉ theo thứ tự alphabet'],correct:1,explain:'Nguyên tắc phân bổ 46 module chức năng của FPA-5000: (1) Ưu tiên module bus LSN (LSN-0300-A/LSN-1500-A) tính theo số loop cần; (2) Module nguồn BCM-0000-B; (3) Module I/O (FLM-420-I2, I8R1-S) theo số thiết bị bên ngoài; (4) Module relay (RML/RMH) cho liên động. Tính tổng dòng tiêu thụ tất cả module để chọn công suất nguồn phù hợp — dùng phần mềm SSD Designer.'},
{brand:'BOSCH',cat:'SystemKnowledge',q:'Tình huống: tòa nhà 15 tầng, dự kiến 1200 đầu báo — chọn tủ nào?',options:['FPC-500 conventional','FPA-1200 (254 điểm)','FPA-5000 standalone (4096 điểm) — đủ cho 1200 detector','Mạng 4 tủ FPA-1200'],correct:2,explain:'1200 điểm vượt xa capacity FPC-500 (max 256 conventional) và FPA-1200 (max 254 địa chỉ). FPA-5000 standalone hỗ trợ tối đa 4096 điểm — đủ cho 1200 detector kèm dự phòng ~70%. Chia thành ~6 loop LSN improved (mỗi loop 200 điểm chừa dự phòng 20%). Nếu tòa nhà rất cao, chia thành 2 tủ FPA-5000 ghép mạng để dự phòng.'},
{brand:'BOSCH',cat:'SystemKnowledge',q:'Tính năng "cắm-và-chạy" (plug-and-play) của FPA-5000 nghĩa là:',options:['Cắm USB','Module tự nhận diện khi cắm vào housing — không cần cấu hình lại tủ','Không cần dây','Chỉ dùng nguồn USB'],correct:1,explain:'Plug-and-play của FPA-5000: khi cắm module chức năng mới (LSN-0300-A, FLM-420-NAC, BCM-0000-B…) vào housing, tủ tự nhận diện loại module và cấu hình sẵn. Nếu thay module hỏng bằng module cùng loại — tủ tự đồng bộ. Đặc trưng độc đáo BOSCH — GST và SIMPLEX không có plug-and-play mức module chức năng. Rút ngắn thời gian bảo trì.'},
{brand:'BOSCH',cat:'SystemKnowledge',q:'BIS (Building Integration System) của BOSCH là gì?',options:['Chuẩn ISO','Phần mềm nền tảng BOSCH tích hợp fire + CCTV + access control + intrusion — 1 giao diện chung','Chỉ dành cho tủ FPA','Phần mềm miễn phí'],correct:1,explain:'BIS (Building Integration System) là nền tảng phần mềm cấp doanh nghiệp của BOSCH tích hợp nhiều hệ thống: báo cháy (FPA-5000), CCTV, access control, intrusion, chữa cháy khí — hiển thị và điều khiển trên 1 giao diện thống nhất. Tủ FPA-5000 kết nối BIS qua OPC server chạy trên Ethernet (FPA-1200 cần thêm license ADC-5000-OPC).'},
{brand:'BOSCH',cat:'SystemKnowledge',q:'Vì sao BOSCH ưu tiên chuẩn EN 54 thay vì UL?',options:['EN dễ hơn','BOSCH gốc Đức, thị trường chính EU — EN 54 là chuẩn bắt buộc EU','UL không tồn tại','Không quan trọng'],correct:1,explain:'BOSCH có gốc từ Đức và thị trường chính là châu Âu — nên sản phẩm ưu tiên chuẩn EN 54 (EN 54-2 panel, EN 54-4 nguồn, EN 54-5 nhiệt, EN 54-7 khói, EN 54-11 MCP, EN 54-17 isolator, EN 54-23 báo quang). Chứng nhận VdS (Đức) và CPD 0786 (EU). Có các dòng riêng cho thị trường UL/ULC (như W-HSR wall horn strobe của Cooper Wheelock được BOSCH phân phối).'},
{brand:'BOSCH',cat:'SystemKnowledge',q:'FSP-5000-RPS Programming Software hoạt động khi nào?',options:['Chỉ khi tủ tắt','Kết nối USB/Ethernet — cấu hình + cập nhật cấu hình KHÔNG cần shutdown tủ','Chỉ qua CAN','Yêu cầu ngắt loop'],correct:1,explain:'FSP-5000-RPS kết nối tủ FPA-5000/FPA-1200 qua USB hoặc Ethernet — cho phép lập trình logic, gán tên thiết bị, cấu hình vùng, ngưỡng nhạy, tone còi. Ưu điểm lớn: cập nhật cấu hình mới KHÔNG CẦN shutdown tủ đang chạy — hệ thống báo cháy vẫn giám sát bình thường trong lúc kỹ thuật viên cập nhật. Rất quan trọng cho bệnh viện, khách sạn không được downtime.'},
{brand:'BOSCH',cat:'SystemKnowledge',q:'Cấu hình mạng Ethernet + cáp quang giữa các tủ FPA-5000 đạt khoảng cách:',options:['1 km','5 km','24-40 km qua bộ chuyển đổi cáp quang','100 km'],correct:2,explain:'Mạng FPA-5000 qua CAN đồng chỉ 1000m — quá ngắn cho tòa nhà phân tán. Qua Ethernet + bộ chuyển đổi cáp quang (single-mode fiber), khoảng cách lên tới 24–40 km giữa các node. Tham khảo tài liệu FPA-5000 Networking Guide để chọn đúng bộ chuyển đổi. Rất phù hợp cho khu công nghiệp lớn, khu đô thị có nhiều tòa nhà.'},
{brand:'BOSCH',cat:'SystemKnowledge',q:'Đầu báo LSN classic có dùng được trên tủ FPA-5000 mới không?',options:['Không','Có — LSN improved backward compatible với LSN classic (kể cả BZ 500 LSN, UEZ 2000 LSN)','Chỉ 1 số model','Phải qua converter'],correct:1,explain:'Ưu điểm lớn của LSN: LSN improved backward compatible hoàn toàn với LSN classic — đầu báo cũ vẫn dùng được trên tủ FPA-5000 mới. AVENAR 4000 tương thích ngược với tủ cũ (BZ 500 LSN, UEZ 2000 LSN, UGM 2020). Điều này bảo toàn đầu tư khi nâng cấp tủ mà giữ nguyên detector cũ — chỉ cần thay từng loại khi hỏng.'},
{brand:'BOSCH',cat:'SystemKnowledge',q:'Ứng dụng UGM 2020 tích hợp qua FPA-5000:',options:['Không thể','Qua module FPE-5000-UGM — kết nối Universal Security System của BOSCH','Chỉ CCTV','Chỉ qua BIS'],correct:1,explain:'UGM 2020 là Universal Security System của BOSCH — quản lý cả báo cháy, an ninh, khí độc. FPA-5000 tích hợp UGM 2020 qua module FPE-5000-UGM. Cho phép 1 hệ thống UGM giám sát nhiều tủ FPA đồng thời. Cũng có thể tích hợp qua BIS ở cấp phần mềm cao hơn. Phù hợp cho khu phức hợp lớn cần trung tâm điều hành duy nhất.'},
{brand:'BOSCH',cat:'SystemKnowledge',q:'Tổng số node mạng FPA-5000 = 32 gồm những gì?',options:['32 tủ','MPC-1300-C + FMR-5000 Remote Keypad + OPC server (mỗi cái tính 1 node)','32 detector','32 module I/O'],correct:1,explain:'Trong mạng FPA-5000, tối đa 32 node bao gồm: các Panel Controller MPC-1300-C của từng tủ, các bàn phím từ xa FMR-5000-C-13, và OPC server (nếu có). Ví dụ: mạng 20 tủ FPA-5000 (20 node MPC) + 8 Remote Keypad + 2 OPC server = 30 node. Cần lên kế hoạch từ đầu để không vượt giới hạn 32 khi mở rộng.'},
{brand:'BOSCH',cat:'SystemKnowledge',q:'Cảm biến CO trong FAP-425-DOTC-R phát hiện điều gì?',options:['Chỉ oxy','CO + hydro + nitrous oxide từ cháy âm ỉ giai đoạn sớm','Chỉ khí gas','Chỉ nhiệt'],correct:1,explain:'Cảm biến CO hóa học trong đầu báo FAP-425-DOTC-R phát hiện: carbon monoxide (CO), hydro, nitrous oxide — các khí sinh ra ở giai đoạn ĐẦU của đám cháy âm ỉ, trước khi có khói rõ. Kết hợp với dual-optical + thermal thành đầu báo 4-cảm biến. Nhược điểm: cảm biến CO có tuổi thọ hữu hạn — TỰ NGẮT khi hết hạn, phải thay ngay.'}
);

// ============ GST-H - CONTROL PANEL ============
QUESTIONS.push(
{brand:'GST-H',cat:'ControlPanel',q:'Tất cả tủ GST-H dùng loại tổng tuyến gì?',options:['4 dây có phân cực','2 dây không phân cực','RS485','CAN bus'],correct:1,explain:'Tất cả tủ báo cháy GST-H dùng SLC 2 dây không phân cực (non-polar) — thợ điện đấu ngược chiều vẫn hoạt động, giảm sai lầm khi thi công. Địa chỉ 1–242/vòng. Đây là đặc điểm chung của thương hiệu GST (Hải Vịnh).'},
{brand:'GST-H',cat:'ControlPanel',q:'Số điểm địa chỉ tối đa trên 1 vòng của tủ GST-H:',options:['128','200','242','254'],correct:2,explain:'Mỗi vòng SLC của tủ GST-H hỗ trợ 242 điểm địa chỉ (từ 1 đến 242). Khác với BOSCH LSN improved (254 điểm/loop) và SIMPLEX IDNet (200–250 tùy tủ). Cần nắm rõ để tính số vòng cần thiết cho dự án.'},
{brand:'GST-H',cat:'ControlPanel',q:'GST100 có tối đa bao nhiêu điểm địa chỉ?',options:['64','128','242','484'],correct:1,explain:'Tủ báo cháy nhỏ GST100 (JB-QB-GST100) hỗ trợ tối đa 128 điểm địa chỉ trên 1 vòng, chia thành 8 vùng + 1 vùng công cộng. Phù hợp cho nhà hàng, karaoke, siêu thị nhỏ, trạm biến áp.'},
{brand:'GST-H',cat:'ControlPanel',q:'GST200H có bao nhiêu vòng tổng tuyến?',options:['1 vòng, 242 điểm','2 vòng, 484 điểm','4 vòng, 968 điểm','6 vòng, 1452 điểm'],correct:0,explain:'Tủ trung cấp GST200H có 1 vòng × 242 điểm. Biến thể GST200H/2 có 2 vòng × 484 điểm. Ký hiệu "/2" luôn nghĩa là 2 loop; ký hiệu "-S" là kiểu tủ mỏng.'},
{brand:'GST-H',cat:'ControlPanel',q:'GST200H/2 có tối đa bao nhiêu điểm?',options:['242','484','1452','4840'],correct:1,explain:'Tủ trung cấp GST200H/2 có 2 vòng × 242 = 484 điểm địa chỉ. Đây là bản 2 loop, phù hợp tòa nhà cỡ trung. Nếu cần hơn 484 điểm phải chuyển sang tủ lớn GST1500H (1452 điểm).'},
{brand:'GST-H',cat:'ControlPanel',q:'Điểm khác biệt của model GST200H-S so với GST200H là:',options:['Thêm 1 vòng','Kiểu mỏng, lắp khoang hẹp','Nhiều pin hơn','Cấp bảo vệ IP54'],correct:1,explain:'Hậu tố "-S" trong tủ báo cháy GST200H-S nghĩa là kiểu mỏng (slim). Cùng thông số điện với GST200H nhưng vỏ tủ mỏng hơn, phù hợp lắp trong khoang tủ điện chật hẹp hoặc tòa nhà có không gian tủ hạn chế.'},
{brand:'GST-H',cat:'ControlPanel',q:'GST1500H có bao nhiêu vòng tổng tuyến?',options:['2','4','6','20'],correct:2,explain:'Tủ báo cháy lớn GST1500H (JB-QB-GST1500H, kiểu treo tường) có 6 vòng × 242 = 1452 điểm. Còn tủ đứng lớn hơn: GST5000H (20 vòng/4840 điểm), GST9000H (60 vòng/14520 điểm).'},
{brand:'GST-H',cat:'ControlPanel',q:'GST9000H có tối đa bao nhiêu điểm địa chỉ?',options:['4.840','5.000','10.000','14.520'],correct:3,explain:'Tủ báo cháy lớn nhất dòng GST-H là GST9000H với 60 vòng × 242 = 14.520 điểm địa chỉ. Có 2 kiểu: JB-QG-GST9000H (tủ đứng) và JB-QT-GST9000H (kiểu bàn 琴台). Phù hợp cho tòa nhà cao tầng, khu công nghiệp lớn.'},
{brand:'GST-H',cat:'ControlPanel',q:'GST5000H có bao nhiêu vòng?',options:['6','12','20','60'],correct:2,explain:'Tủ báo cháy GST5000H có 20 vòng × 242 = 4.840 điểm địa chỉ. Bản đứng JB-QG-GST5000H hoặc kiểu bàn JB-QT-GST5000H. Nằm giữa GST1500H (1452 điểm) và GST9000H (14520 điểm).'},
{brand:'GST-H',cat:'ControlPanel',q:'Tải tổng tuyến của mỗi vòng GST-H:',options:['300 mA','500 mA','700 mA','1.500 mA'],correct:2,explain:'Mỗi vòng SLC của tủ GST-H có tải tối đa 700 mA. Lưu ý quan trọng: nếu tủ 2 vòng như GST200H/2 thì tổng cả 2 vòng vẫn ≤ 700 mA — phải chia đều tải giữa 2 vòng khi thiết kế.'},
{brand:'GST-H',cat:'ControlPanel',q:'Điện áp cuối tổng tuyến GST-H phải ≥:',options:['12 V','16 V','20 V','24 V'],correct:1,explain:'Điện áp cuối tổng tuyến của tủ GST-H phải ≥16V để đảm bảo thiết bị hoạt động ổn định. Với dây dài phải tính sụt áp: dây 1.0 mm² tối đa 2 km, dây 1.5/2.5 mm² tối đa 3 km.'},
{brand:'GST-H',cat:'ControlPanel',q:'Chiều dài cáp tổng tuyến 24V với dây 1.0 mm² tối đa:',options:['1 km','2 km','3 km','5 km'],correct:1,explain:'Với dây tổng tuyến 24V tiết diện 1.0 mm² (2 dây không phân cực), khoảng cách tối đa 2 km. Muốn xa hơn phải tăng tiết diện: dây 1.5 mm² hoặc 2.5 mm² đạt 3 km.'},
{brand:'GST-H',cat:'ControlPanel',q:'GST-QKP01H là tủ gì?',options:['Tủ báo cháy nhỏ','Tủ điều khiển chữa cháy khí 1 vùng','Tủ hiển thị','Tủ nguồn'],correct:1,explain:'Tủ chữa cháy khí GST-QKP01H là tủ điều khiển xả khí chuyên dụng cho 1 vùng bảo vệ. Kết hợp báo cháy + điều khiển van xả khí tự động có trễ thời gian. Dùng cho hệ thống FM200, CO2, Novec.'},
{brand:'GST-H',cat:'ControlPanel',q:'GST-QKP02H có bao nhiêu vùng bảo vệ?',options:['1','2','4','6'],correct:1,explain:'Tủ chữa cháy khí GST-QKP02H có 2 vùng (2 zones). Trong series: QKP01H = 1 vùng, QKP02H = 2 vùng, QKP04H = 4 vùng. Chọn theo số phòng độc lập cần bảo vệ.'},
{brand:'GST-H',cat:'ControlPanel',q:'Dòng ra van điện từ khi 1 vùng xả đơn lẻ của QKP:',options:['1 A','1.5 A','3 A','5 A'],correct:2,explain:'Tủ QKP series (QKP01H/02H/04H) có đầu ra van điện từ DC24V/3A khi xả 1 vùng đơn lẻ. NHƯNG với QKP02H/04H nếu 2 vùng xả đồng thời thì mỗi vùng chỉ được 1.5A — cần kiểm tra dòng khởi động van có đủ không.'},
{brand:'GST-H',cat:'ControlPanel',q:'Thời gian trễ xả khí của QKP cài đặt được từ:',options:['0-10 giây','0-30 giây','10-60 giây','30-120 giây'],correct:1,explain:'Tủ QKP series cho phép cài thời gian trễ xả (delay) 0–30 giây qua menu tủ. Trễ này để cảnh báo cho người trong phòng thoát ra trước khi xả khí. Sau khi bắt đầu xả thì KHÔNG dừng lại được.'},
{brand:'GST-H',cat:'ControlPanel',q:'CAN bus liên mạng của GST-QKP01H tối đa bao nhiêu km?',options:['1 km','2 km','3 km','5 km'],correct:2,explain:'Tủ chữa cháy khí GST-QKP01H liên mạng với tủ báo cháy chính qua CAN bus tối đa 3 km (dây ≥1.0 mm² xoắn đôi/bọc kim). Còn tổng tuyến tín hiệu bên trong tủ ≤1 km.'},
{brand:'GST-H',cat:'ControlPanel',q:'Thao tác STOP khi xả khí có thể thực hiện lúc nào?',options:['Bất kỳ lúc nào','Trong thời gian trễ (delay)','Chỉ sau khi xả xong','Chỉ tại tủ chính'],correct:1,explain:'⚠ Với tủ chữa cháy khí QKP, thao tác STOP (dừng xả) CHỈ có tác dụng TRONG THỜI GIAN TRỄ 0–30 giây. Sau khi hết delay và bắt đầu xả, không thể dừng lại được — chất chữa cháy sẽ xả hết. Cần đào tạo nhân viên nắm rõ.'},
{brand:'GST-H',cat:'ControlPanel',q:'Vị trí lắp tủ QKP theo đúng nguyên tắc là:',options:['Trong vùng bảo vệ','Ngoài vùng bảo vệ (cửa phòng)','Tầng hầm','Trên trần'],correct:1,explain:'Tủ chữa cháy khí QKP phải lắp NGOÀI vùng bảo vệ, thường tại cửa vào phòng. Lý do: (1) người thoát khỏi phòng có thể ấn Stop khẩn cấp; (2) sau xả khí phòng nguy hiểm — không được ở trong phòng để vận hành tủ.'},
{brand:'GST-H',cat:'ControlPanel',q:'Nguồn dự phòng của GST9000H:',options:['2 × 12V/14Ah','2 × 12V/50Ah','2 × 12V/38Ah','2 × 24V/50Ah'],correct:1,explain:'Tủ báo cháy lớn GST9000H (và GST5000H) dùng 2 ắc-quy 12V/50Ah rất lớn — đảm bảo thời gian standby dài cho hệ thống 14520 điểm. Còn GST1500H nhỏ hơn nên chỉ cần 2 × 12V/14Ah.'},
{brand:'GST-H',cat:'ControlPanel',q:'Board card nào bắt buộc ở khe cắm đầu tiên trong tủ lớn GST?',options:['Manager board','NAC card','Isolator card','Power card'],correct:0,explain:'Trong tủ GST5000H/9000H, Manager board (bo điều khiển chính) BẮT BUỘC nằm ở khe cắm đầu tiên (slot 1). Không được hoán đổi với các bo mở rộng khác — nếu sai vị trí, tủ sẽ không khởi động.'},
{brand:'GST-H',cat:'ControlPanel',q:'Tiêu chuẩn tuổi thọ tủ GST theo GB 29837-2013:',options:['≤5 năm','≤8 năm','≤12 năm','≤20 năm'],correct:2,explain:'Theo tiêu chuẩn Trung Quốc GB 29837-2013, tuổi thọ tủ báo cháy GST ≤ 12 năm. Sau 12 năm phải kiểm tra tổng thể hoặc thay tủ mới để đảm bảo độ tin cậy hệ thống PCCC.'},
{brand:'GST-H',cat:'ControlPanel',q:'Màn hình của GST9000H:',options:['4.3 in màu','7 in màu','10.4 in màu (tùy chọn cảm ứng)','12 in đơn sắc'],correct:2,explain:'Tủ báo cháy GST9000H có màn hình 10.4 inch màu độ phân giải 800×600, có tùy chọn cảm ứng. Lớn nhất trong dòng GST-H. So sánh: GST1500H/5000H màn hình 7 in màu; GST200H series 4.3 in màu.'},
);

// ============ GST-H - SYSTEM KNOWLEDGE ============
QUESTIONS.push(
{brand:'GST-H',cat:'SystemKnowledge',q:'Giao thức SLC 2 dây không phân cực của GST hoạt động thế nào?',options:['Chỉ cấp nguồn','2 dây đồng thời cấp nguồn 24V + truyền dữ liệu số, tủ polling từng địa chỉ 1-242','RS485 đơn thuần','CAN bus'],correct:1,explain:'SLC (Signaling Line Circuit) của GST dùng 2 dây không phân cực (đấu ngược cực vẫn chạy) — vừa cấp nguồn DC24V vừa truyền dữ liệu. Tủ chủ động polling (hỏi lần lượt) từng thiết bị theo địa chỉ 1–242. Mỗi thiết bị trả lời khi được hỏi tới. Ưu điểm: đơn giản, ít lỗi thi công (không lo đấu ngược); nhược điểm: tốc độ truyền chậm hơn CAN/Ethernet.'},
{brand:'GST-H',cat:'SystemKnowledge',q:'Vì sao mỗi vòng GST-H chỉ có 242 điểm (không phải 254 như BOSCH)?',options:['Giới hạn công nghệ','Địa chỉ 1-242 do thiết kế firmware GST — 13 địa chỉ dự trữ cho hệ thống','Do chuẩn GB','Ngẫu nhiên'],correct:1,explain:'GST thiết kế địa chỉ hóa từ 1 đến 242 — 13 địa chỉ còn lại (243–255 trong 8-bit) dự trữ cho các lệnh hệ thống, broadcast, mã đặc biệt. BOSCH LSN improved dùng cấu trúc khác cho phép 254. SIMPLEX IDNet chọn 200/250 tùy tủ. Con số 242 là dấu hiệu nhận diện chắc chắn của GST — nếu thấy trong tài liệu là GST.'},
{brand:'GST-H',cat:'SystemKnowledge',q:'Kiến trúc mở rộng GST-H: tủ lớn nhất GST9000H có bao nhiêu loop?',options:['20','40','60 loop × 242 = 14.520 điểm','128'],correct:2,explain:'GST9000H là tủ đầu não lớn nhất dòng GST-H: 60 vòng SLC × 242 điểm/vòng = 14.520 điểm địa chỉ tổng. Nhiều gấp 5 lần SIMPLEX 4100ES (3000 điểm). Kiến trúc phù hợp cho khu phức hợp lớn ở Trung Quốc/Việt Nam. Cần lên kế hoạch phân bổ 60 vòng theo tầng/khu vực từ giai đoạn thiết kế.'},
{brand:'GST-H',cat:'SystemKnowledge',q:'Vì sao tải bus GST-H là 700 mA CHUNG cho cả tủ 2 vòng?',options:['Sai thiết kế','Nguồn cấp chung cho cả 2 vòng — phải chia đều tải khi thiết kế','Do nguồn yếu','Kỹ thuật viên chọn'],correct:1,explain:'Tủ GST200H/2 có 2 vòng nhưng nguồn cấp bus chỉ 700 mA CHUNG cho cả 2 vòng (không phải 700 mA mỗi vòng). Khi thiết kế: nếu vòng 1 dùng 500 mA thì vòng 2 chỉ còn 200 mA. Phải chia đều tải giữa 2 vòng để tránh vượt tổng. Đây là điểm khác biệt với BOSCH — mỗi module LSN có nguồn riêng độc lập.'},
{brand:'GST-H',cat:'SystemKnowledge',q:'Điện áp cuối vòng SLC GST-H phải ≥16V vì:',options:['Ngẫu nhiên','Đầu báo GST cần tối thiểu 16V DC để hoạt động ổn định — thấp hơn thì báo lỗi/không polling được','Chuẩn quốc tế','An toàn'],correct:1,explain:'Đầu báo và module GST-H được thiết kế hoạt động 16–28V DC. Nếu điện áp cuối vòng <16V do sụt áp trên dây dài + tải nhiều, thiết bị không polling được → tủ báo lỗi communication. Khi thiết kế: tính sụt áp theo tiết diện dây và tổng dòng — 1.0 mm² tối đa 2 km; 1.5/2.5 mm² tối đa 3 km. Sụt áp cao cần tăng tiết diện dây.'},
{brand:'GST-H',cat:'SystemKnowledge',q:'Module cách ly GST-LD-8313 nên lắp mỗi bao nhiêu địa chỉ?',options:['Không cần','Mỗi 32 địa chỉ + mỗi nhánh T-tap — giới hạn tối đa 32 thiết bị bị cô lập khi có sự cố','Mỗi 100','Chỉ 1 module/vòng'],correct:1,explain:'Nguyên tắc thiết kế: lắp 1 module cách ly GST-LD-8313 mỗi 32 địa chỉ, và ít nhất 1 module ở mỗi nhánh T-tap. Khi có ngắn mạch, chỉ đoạn giữa 2 isolator kế nhau bị cô lập — tối đa 32 thiết bị. Phần còn lại của vòng vẫn hoạt động. Nếu không có isolator, 1 ngắn mạch có thể làm mất cả 242 thiết bị trên vòng.'},
{brand:'GST-H',cat:'SystemKnowledge',q:'Liên mạng nhiều tủ GST-H qua giao thức gì?',options:['Ethernet trực tiếp','Card mạng GST + CAN bus (≤3 km với dây bọc kim ≥1.0 mm² xoắn đôi)','WiFi','Chỉ RS485'],correct:1,explain:'Nhiều tủ GST-H liên mạng qua card mạng GST + CAN bus. Yêu cầu cáp ≥1.0 mm² xoắn đôi/bọc kim, khoảng cách tối đa 3 km giữa các tủ. Cho phép tạo hệ thống phân tán: tủ chính giám sát nhiều tủ vệ tinh + tủ điều khiển chữa cháy khí GST-QKP. Có thể thêm bảng hiển thị cháy (fire display panel) tại các điểm quan trọng.'},
{brand:'GST-H',cat:'SystemKnowledge',q:'Tủ chữa cháy khí GST-QKP hoạt động thế nào?',options:['Tự động xả ngay','Nhận tín hiệu từ 2 đầu báo trong zone → đếm ngược 0-30s (delay) → xả van 24V/3A','Chỉ manual','Chờ lệnh tủ chính'],correct:1,explain:'Quy trình xả khí GST-QKP: (1) Đầu báo trong zone kích hoạt → tủ nhận tín hiệu; (2) Xác nhận cross-zone (2 đầu báo trong 1 zone hoặc 1 đầu báo + 1 nút ấn) để tránh xả nhầm; (3) Kích hoạt còi/đèn xả khí; (4) Đếm ngược 0–30s cho người thoát; (5) Nếu không ấn STOP trong delay, kích hoạt van điện từ 24V/3A xả khí. Sau khi bắt đầu xả KHÔNG DỪNG được.'},
{brand:'GST-H',cat:'SystemKnowledge',q:'QKP02H có 2 vùng — khi 2 vùng xả đồng thời điều gì xảy ra?',options:['Cả 2 xả 3A','Mỗi vùng chỉ được 1.5A (chia đôi 3A) — kiểm tra dòng khởi động van đủ không','Ngừng cả 2','Chỉ 1 vùng xả'],correct:1,explain:'⚠ Tủ QKP02H (2 vùng) khi 2 vùng xả đồng thời chia đôi công suất: mỗi vùng chỉ được 1.5A (thay vì 3A khi 1 vùng xả đơn lẻ). Kiểm tra thông số van điện từ: dòng khởi động (in-rush current) có ≤1.5A không. Nếu van cần 2A khởi động, thiết kế phải đảm bảo 2 zone không xả đồng thời, hoặc chọn tủ QKP01H (chỉ 1 vùng, luôn có 3A).'},
{brand:'GST-H',cat:'SystemKnowledge',q:'Cáp cảm nhiệt tuyến tính GST105A/B khác nhau ở đâu?',options:['Chỉ giá','GST105A KHÔNG PHỤC HỒI (cháy 1 lần thay cáp); GST105B PHỤC HỒI (tự về khi nhiệt hạ)','Chiều dài','Ngưỡng nhiệt'],correct:1,explain:'⚠ Điểm khác biệt quan trọng: GST105A (Non-Restorable) — sau khi đạt 105°C, cấu trúc cáp bị phá hủy vật lý, phải thay đoạn cáp. GST105B (Restorable) — cáp tự phục hồi khi nhiệt độ hạ xuống. Chọn A cho vị trí ít cháy giả (bồn dầu — nếu cháy thật thì thay cáp cũng chấp nhận được); chọn B cho khu vực có thể có nhiệt cao tạm thời (hầm cáp mùa hè).'},
{brand:'GST-H',cat:'SystemKnowledge',q:'Đầu báo hút khí GST1D/2D có 4 cấp báo động để làm gì?',options:['Phức tạp hóa','Alarm staging: Pre-warning → Fire 1 → Fire 2 → Fire — phản ứng leo thang thay vì báo động ngay','Chọn 1 cấp','Nhiễu'],correct:1,explain:'4 cấp báo động của đầu báo hút khí JTY-GXF-GST1D/2D cho phép alarm staging (phản ứng leo thang): Pre-warning (nồng độ khói nhẹ) → chỉ thông báo phòng bảo vệ; Fire 1 → cảnh báo local; Fire 2 → kích còi vùng; Fire → toàn hệ thống. Mỗi cấp có relay riêng để nối với các hành động khác nhau. Rất phù hợp phòng sạch, trung tâm dữ liệu — bảo vệ trước khi đám cháy phát triển.'},
{brand:'GST-H',cat:'SystemKnowledge',q:'Tòa nhà 25 tầng, ~2500 detector — chọn tủ GST-H nào?',options:['GST100 (128)','GST200H/2 (484)','GST1500H (1452)','GST5000H (4840 điểm) — dư đủ cho 2500'],correct:3,explain:'2500 điểm: GST100/GST200H đều quá nhỏ; GST1500H (1452) không đủ; GST5000H có 4840 điểm — dư 2340 điểm cho dự phòng (~50%). Chia thành khoảng 20 vòng × 125 điểm/vòng (chừa dự phòng 50% mỗi vòng). Hoặc thay bằng 2 tủ GST1500H ghép mạng (2×1452 = 2904) — nhưng phức tạp hơn, kém tin cậy hơn tủ đơn.'},
{brand:'GST-H',cat:'SystemKnowledge',q:'Ắc-quy dự phòng của GST9000H 2×12V/50Ah nặng và cần đặc biệt vì:',options:['Ngẫu nhiên','Dung lượng lớn cho 14.520 điểm → cần giá đỡ chắc, tải sàn phòng điều khiển đủ','Đắt','An toàn'],correct:1,explain:'2 ắc-quy 12V/50Ah của GST9000H mỗi cặp nặng ~30–35 kg. Với hệ thống 14.520 điểm, dung lượng lớn để đảm bảo 24h standby + 30 phút alarm. Yêu cầu thiết kế: giá đỡ pin chắc chắn (không dùng nhựa/gỗ), kiểm tra tải sàn phòng điều khiển (≥400 kg/m²), thông gió tốt (ắc-quy chì kín vẫn có thể xả khí H2 khi quá nhiệt). Kiểm tra định kỳ để thay pin đúng thời hạn.'},
{brand:'GST-H',cat:'SystemKnowledge',q:'Vì sao Manager board bắt buộc ở slot 1 của tủ lớn GST?',options:['Ngẫu nhiên','Manager là CPU chính điều khiển các board mở rộng — slot 1 có bus ưu tiên/nguồn riêng','Chuẩn quốc tế','Truyền thống'],correct:1,explain:'Manager board là bo điều khiển chính (CPU) của tủ GST1500H/5000H/9000H. Slot 1 có thiết kế phần cứng riêng: đường bus ưu tiên, nguồn ổn định, giao tiếp với màn hình chính. Nếu cắm Manager ở slot khác, tủ không khởi động được. Các slot còn lại dành cho board mở rộng (loop card, network card, communication card). Nắm rõ khi bảo trì/thay thế.'},
{brand:'GST-H',cat:'SystemKnowledge',q:'Còi đèn địa chỉ GST-HX-240B cần 4 dây vì:',options:['Tiêu chuẩn','2 dây SLC (tín hiệu) + 2 dây nguồn 24V DC (công suất còi/đèn) — SLC không đủ dòng','Chống nhiễu','Thẩm mỹ'],correct:1,explain:'Còi/đèn tiêu thụ dòng cao (~10 mA) — bus SLC chỉ cấp được vài mA cho mỗi thiết bị. Nên GST-HX-240B tách riêng: 2 dây SLC (chỉ để nhận địa chỉ và lệnh from tủ) + 2 dây nguồn 24V DC (cấp công suất cho còi/đèn hoạt động). Thiếu nguồn 24V thì còi không kêu/đèn không sáng mặc dù SLC vẫn nhận lệnh. Kiến trúc này gọi là "địa chỉ 4 dây".'},
{brand:'GST-H',cat:'SystemKnowledge',q:'Mã hóa địa chỉ điện tử qua GST-BMQ-2 khác DIP switch thế nào?',options:['Không khác','Không cần tháo module để đổi địa chỉ; lưu trong EEPROM; có thể đổi từ tủ chính','Cùng cách','GST-BMQ-2 rẻ hơn'],correct:1,explain:'DIP switch truyền thống: 8 công tắc nhỏ set địa chỉ vật lý — muốn đổi phải tháo module ra chỉnh. Mã hóa điện tử GST-BMQ-2: cắm bộ mã hóa vào module, nhập địa chỉ, lưu vào EEPROM của module. Ưu điểm: không giới hạn 8-bit (mở rộng dải), không cần tháo lắp, có thể đổi từ tủ chính qua lệnh. Tất cả thiết bị GST-H hiện đại dùng cách này.'},
{brand:'GST-H',cat:'SystemKnowledge',q:'Tuổi thọ tủ báo cháy GST theo GB 29837-2013:',options:['≤5 năm','≤12 năm — sau đó phải kiểm tra tổng thể hoặc thay tủ','≤20 năm','Vô hạn'],correct:1,explain:'Chuẩn Trung Quốc GB 29837-2013 quy định: tuổi thọ tủ báo cháy ≤12 năm. Sau 12 năm, các linh kiện điện tử (điện dung, relay, bo mạch) suy giảm độ tin cậy — bắt buộc kiểm tra tổng thể hoặc thay tủ để đảm bảo an toàn PCCC. Việt Nam áp dụng chuẩn tương tự cho các dự án dùng thiết bị Trung Quốc. Lên kế hoạch ngân sách thay thế định kỳ.'},
{brand:'GST-H',cat:'SystemKnowledge',q:'Class A vs Class B trên GST-H — thực tế phổ biến ở VN:',options:['Chỉ Class A','Chỉ Class B','Đa số Class B (tiết kiệm dây) — Class A cho khách sạn cao cấp/bệnh viện critical','Ngẫu nhiên'],correct:2,explain:'Ở Việt Nam, dự án GST-H phổ biến dùng Class B (loop hở với isolator mỗi 32 địa chỉ) vì tiết kiệm dây và đủ tin cậy cho tòa nhà thương mại thông thường. Class A (loop khép kín — dây đi ra rồi về tủ) dùng cho khách sạn 5 sao, bệnh viện critical, tòa nhà cao > 30 tầng — nơi yêu cầu chống đứt cáp tuyệt đối. Chi phí Class A cao hơn ~30% do gấp đôi dây.'},
{brand:'GST-H',cat:'SystemKnowledge',q:'Ưu điểm SLC không phân cực của GST khi lắp đặt:',options:['Rẻ hơn','Thợ điện đấu ngược cực cũng chạy → giảm sai sót thi công đáng kể','Nhanh hơn','An toàn hơn'],correct:1,explain:'SLC 2 dây không phân cực = dây đấu ngược chiều vẫn hoạt động. Với dự án hàng nghìn thiết bị lắp đặt bởi thợ điện chưa đào tạo chuyên sâu, ưu điểm này giảm 30–50% lỗi thi công so với các hệ thống phân cực. Không phải phá dây làm lại khi commissioning phát hiện đấu ngược. GST và BOSCH LSN đều không phân cực; SIMPLEX IDNet cũng vậy nhưng cần dây twisted pair đặc biệt.'}
);

// ============ GST-H - DETECTORS ============
QUESTIONS.push(
{brand:'GST-H',cat:'Detectors',q:'GST-BT001F là đầu báo gì?',options:['Khói quang','Khí LPG/LNG (bán dẫn)','Nhiệt điểm','Beam tuyến tính'],correct:1,explain:'GST-BT001F là đầu báo khí gas độc lập, cảm biến bán dẫn, dùng phát hiện khí gas hóa lỏng LPG/LNG (0–100% LEL). Dạng standalone — có còi và LED tích hợp, không cần kết nối tủ báo cháy. Phù hợp gia đình, khách sạn, căn hộ.'},
{brand:'GST-H',cat:'Detectors',q:'Tuổi thọ cảm biến khí gas GST-BT001F/BR001F tối đa:',options:['2 năm','3 năm','5 năm','10 năm'],correct:2,explain:'⚠ Cảm biến khí gas bán dẫn của đầu báo GST-BT001F (LPG/LNG) và GST-BR001F (khí gas nhân tạo/khí than) có tuổi thọ tối đa 5 năm theo GB 29837-2013. Sau 5 năm bắt buộc thay cả đầu báo hoặc cảm biến — nếu không sẽ báo sai/không phát hiện.'},
{brand:'GST-H',cat:'Detectors',q:'GTYQ-GST006M có cấp chống nổ:',options:['Ex ia IIB T4','Ex db IIC T6 Gb','Ex nA IIC T3','Không chống nổ'],correct:1,explain:'Đầu báo khí công nghiệp GTYQ-GST006M có cấp chống nổ Ex db IIC T6 Gb (khí) + Ex tb IIIC T80°C Db (bụi). Dùng cho nhà máy, kho có nguy cơ nổ, bồn dầu, xưởng hóa chất. Vỏ nhôm đúc, kính chống nổ, kết nối M20×1.5.'},
{brand:'GST-H',cat:'Detectors',q:'Cấp bảo vệ của GTYQ-GST006M:',options:['IP54','IP65','IP66','IP67'],correct:2,explain:'Đầu báo khí GTYQ-GST006M đạt IP66 — chống bụi hoàn toàn (bụi không lọt vào) và chống tia nước mạnh từ mọi hướng. Phù hợp môi trường công nghiệp nặng, ngoài trời có mái che.'},
{brand:'GST-H',cat:'Detectors',q:'GST006M dùng giao tiếp gì?',options:['SLC 2 dây','LBUS 4 tổng tuyến','RS485','HART'],correct:1,explain:'Đầu báo khí GTYQ-GST006M dùng giao tiếp LBUS 4 tổng tuyến (cáp bọc 4×1.5 mm²) với khoảng cách tối đa 1000 m. Khác với các đầu báo GST khác trên SLC 2 dây, LBUS 4 dây cho phép cấp nguồn riêng cho tải cao hơn.'},
{brand:'GST-H',cat:'Detectors',q:'JTF-GOM-GST9613 là đầu báo:',options:['Chỉ khói','Chỉ nhiệt','Kết hợp khói quang + nhiệt điểm','Beam'],correct:2,explain:'Đầu báo phức hợp JTF-GOM-GST9613 kết hợp cảm biến khói quang điện và cảm biến nhiệt bán dẫn A2R trong cùng 1 đầu. Ưu điểm: phát hiện cả đám cháy âm ỉ (nhiều khói) lẫn đám cháy bùng phát (nhiệt tăng nhanh). Giảm bỏ sót đám cháy so với đầu báo đơn cảm biến.'},
{brand:'GST-H',cat:'Detectors',q:'Loại cảm biến nhiệt của GST9613:',options:['A1','A2R (định nhiệt + tốc độ tăng)','B','CS'],correct:1,explain:'Đầu báo phức hợp GST9613 có cảm biến nhiệt loại A2R — kết hợp định nhiệt cố định (báo khi > ngưỡng) và tốc độ tăng nhiệt (rate-of-rise). Cần kết hợp cả 2 điều kiện nên không báo động chỉ vì nhiệt môi trường cao đơn thuần.'},
{brand:'GST-H',cat:'Detectors',q:'Diện tích bảo vệ đầu báo khói GST khi cao 6-12m:',options:['40 m²','60 m²','80 m²','120 m²'],correct:2,explain:'Đầu báo khói điểm của GST (như JTY-GD-G3, JTF-GOM-GST9613) giám sát tối đa 80 m² khi lắp trần cao 6–12 m, giảm xuống 60 m² khi trần thấp <6 m — theo GB 50116. Trần càng cao khói càng loãng nhưng lan rộng hơn.'},
{brand:'GST-H',cat:'Detectors',q:'JTW-LD-GST105A có phục hồi sau khi kích hoạt không?',options:['Có, tự phục hồi','Có, phải reset thủ công','Không - phải thay cáp','Chỉ phục hồi 1 lần'],correct:2,explain:'⚠ Cáp cảm nhiệt tuyến tính JTW-LD-GST105A là loại KHÔNG PHỤC HỒI: khi kích hoạt (nhiệt độ đạt 105°C) toàn bộ đoạn cáp bị phá hủy vật lý, phải thay mới. Trong khi JTW-LD-GST105B và JTW-LD-GST85B là loại phục hồi được — cáp trở về nguyên trạng khi nhiệt độ hạ.'},
{brand:'GST-H',cat:'Detectors',q:'Nhiệt độ báo động của cáp cảm nhiệt JTW-LD-GST85B:',options:['70°C','85°C','105°C','120°C'],correct:1,explain:'Cáp cảm nhiệt tuyến tính JTW-LD-GST85B kích hoạt ở 85°C. So với GST105A/B (105°C), model 85B chọn ngưỡng thấp hơn cho phát hiện sớm hơn. Nguyên tắc chọn: ngưỡng phải cao hơn nhiệt độ môi trường bình thường tối thiểu 20°C để tránh báo giả.'},
{brand:'GST-H',cat:'Detectors',q:'Chiều dài cáp cảm nhiệt JTW-LD tối đa:',options:['50 m','100 m','150 m','200 m'],correct:2,explain:'Cáp cảm nhiệt tuyến tính JTW-LD (105A/105B/85B) tối đa 150 m/tuyến trên 1 bộ xử lý. Nếu tuyến bảo vệ dài hơn 150 m phải chia thành nhiều đoạn, mỗi đoạn có 1 bộ xử lý riêng.'},
{brand:'GST-H',cat:'Detectors',q:'Đầu báo chống nổ GSTN9812 dùng cho nhóm khí:',options:['IIA','IIB, IIC','I','III'],correct:1,explain:'Đầu báo nhiệt chống nổ JTW-ZOM-GSTN9812(Ex)/WIS dùng cho nhóm khí IIB và IIC (khí hydrogen, acetylene…). Gồm đầu cảm nhiệt intrinsically safe + safety barrier chống nổ vỏ nhôm đúc. Bắt buộc tiếp đất khi lắp đặt.'},
{brand:'GST-H',cat:'Detectors',q:'JTY-GD-G3 là đầu báo:',options:['Nhiệt điểm','Khói quang điện','Khói ion hóa','Beam'],correct:1,explain:'JTY-GD-G3 là đầu báo khói quang điện điểm (photoelectric), nguyên lý tán xạ hồng ngoại trong buồng quang. Phù hợp khách sạn, văn phòng, thư viện, phòng server, kể cả tàu thủy. Có bù trôi nhiệt độ/độ ẩm và lưu 14 bản ghi lịch sử.'},
{brand:'GST-H',cat:'Detectors',q:'JTY-GXF-GST2D chiếm bao nhiêu địa chỉ?',options:['1','2 địa chỉ liên tiếp','4','8'],correct:1,explain:'Đầu báo khói hút khí JTY-GXF-GST2D (Air-Sampling, 2 ống) có 2 module hút mẫu độc lập nên chiếm 2 địa chỉ liên tiếp trên bus. Khi thiết kế địa chỉ phải để 2 slot chẵn/lẻ liên tiếp. Bản GST1D chỉ 1 ống/1 địa chỉ.'},
{brand:'GST-H',cat:'Detectors',q:'Chiều dài ống lấy mẫu tối đa của GST1D/2D:',options:['50 m/nhánh','100 m/nhánh','150 m/nhánh','200 m/nhánh'],correct:1,explain:'Đầu báo khói hút khí JTY-GXF-GST1D/2D dùng ống lấy mẫu tối đa 100 m/nhánh. Không được nối dài hơn — nếu không tốc độ khí không đủ để phát hiện. Ống phải dùng vật liệu chuyên dụng, không dùng PVC thông thường.'},
{brand:'GST-H',cat:'Detectors',q:'Đầu báo hút khí GST1D/2D có bao nhiêu cấp báo động?',options:['2','3','4 (Pre-warning/Fire1/Fire2/Fire)','8'],correct:2,explain:'Đầu báo hút khí GST1D/2D có 4 cấp báo động phân cấp: Pre-warning (cảnh báo sớm) → Fire 1 → Fire 2 → Fire. Mỗi cấp có relay đầu ra riêng, cho phép phản ứng leo thang: thông báo → cảnh báo → sơ tán → xả khí.'},
{brand:'GST-H',cat:'Detectors',q:'Giao tiếp phụ của GST1D/2D:',options:['RS232','RS-485 MODBUS RTU','CAN','LonWorks'],correct:1,explain:'Đầu báo hút khí GST1D/2D ngoài tổng tuyến địa chỉ GST còn có RS-485 MODBUS RTU — cho phép tích hợp trực tiếp vào BMS (Building Management System) mà không cần gateway.'},
