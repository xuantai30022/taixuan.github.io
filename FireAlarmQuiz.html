QUESTIONS.push(
{brand:'GST-UL',cat:'Detectors',q:'Đế đầu báo chung cho DI/DC-M9101N là:',options:['DB-M01N','DB-M02N','MS400','B501'],correct:0,explain:'DB-M01N là Common Detector Base (đế đầu báo chung) tương thích với các đầu báo GST-UL: DI/DC-M9101N, DI/DC-M9102N, DI/DC-M9103. Đế màu trắng RAL 9016, đường kính 100 mm × 16.5 mm. Dùng chung đế giúp giảm chi phí dự phòng.'},
{brand:'GST-UL',cat:'Detectors',q:'DI-M9101N là đầu báo:',options:['Chỉ khói','Chỉ nhiệt','Địa chỉ khói MWMA + nhiệt cố định','Beam'],correct:2,explain:'Đầu báo đa cảm biến DI-M9101N (Intelligent Multi-criteria Smoke & Heat) là bản địa chỉ kết hợp khói quang MWMA và nhiệt cố định 135°F. Phát hiện cả đám cháy âm ỉ (khói) lẫn bùng phát (nhiệt) — giảm bỏ sót cảnh báo.'},
{brand:'GST-UL',cat:'Detectors',q:'Công nghệ khói của dòng DI-M910x:',options:['LED đơn','MWMA (Multi-Wave Multi-Angle)','Ion hóa','Beam'],correct:1,explain:'Dòng đầu báo DI-M910x dùng công nghệ MWMA (Multi-Wave Multi-Angle photoelectric) — phát nhiều bước sóng và thu nhiều góc, giúp phân biệt khói thật với bụi/hơi nước. Đặc trưng công nghệ khói của GST-UL.'},
{brand:'GST-UL',cat:'Detectors',q:'Nhiệt độ tác động (fixed) của DI-M9101N:',options:['57°C (135°F)','68°C (155°F)','88°C (190°F)','100°C'],correct:0,explain:'Đầu báo DI-M9101N và DI-M9103 có ngưỡng nhiệt cố định 135°F (57.2°C). Đây là ngưỡng chuẩn theo UL521 cho phần lớn ứng dụng thương mại. Nếu môi trường nóng bình thường (bếp), cần chọn model có ngưỡng cao hơn.'},
{brand:'GST-UL',cat:'Detectors',q:'Dòng standby của DI-M9101N:',options:['≤0.1 mA','≤0.4 mA','≤1 mA','≤2 mA'],correct:1,explain:'Đầu báo địa chỉ DI-M9101N ở trạng thái chờ tiêu thụ ≤0.4 mA. Dòng thấp giúp cắm nhiều detector trên cùng vòng SLC mà không vượt tải.'},
{brand:'GST-UL',cat:'Detectors',q:'Dòng báo động của DI-M9101N khi có chỉ thị xa:',options:['≤1.4 mA','≤3.4 mA','≤5 mA','≤10 mA'],correct:1,explain:'Đầu báo DI-M9101N: dòng báo động ≤1.4 mA (không có chỉ thị xa) tăng lên ≤3.4 mA (khi có chỉ thị xa C-9314P). Chênh lệch này do phải cấp nguồn cho đèn chỉ thị xa — cần tính khi thiết kế tải vòng lặp.'},
{brand:'GST-UL',cat:'Detectors',q:'Dải nhạy L3 của DI-M9101N là:',options:['0.5-1.5 %/ft','1.38-3.38 %/ft','2.25-4.25 %/ft','3.12-5.12 %/ft'],correct:3,explain:'Đầu báo DI-M9101N có 3 mức nhạy: L1 (1.38–3.38 %/ft, nhạy cao nhất), L2 mặc định (2.25–4.25 %/ft), L3 (3.12–5.12 %/ft, ít nhạy nhất). L3 dùng cho phòng dễ có bụi/khói bếp để tránh báo giả.'},
{brand:'GST-UL',cat:'Detectors',q:'DI-M9102N khác DI-M9101N ở điểm:',options:['Không có địa chỉ','Chỉ khói (không có nhiệt)','Class A','Có isolator'],correct:1,explain:'Đầu báo DI-M9102N là bản chỉ có cảm biến khói MWMA (không có cảm biến nhiệt). Trong khi DI-M9101N là bản kết hợp khói + nhiệt. Chọn M9102N khi chỉ cần phát hiện khói, tiết kiệm chi phí.'},
{brand:'GST-UL',cat:'Detectors',q:'DI-M9103 là loại đầu báo:',options:['Chỉ khói','Nhiệt RoR + fixed','Kết hợp khói+nhiệt','Beam'],correct:1,explain:'Đầu báo địa chỉ DI-M9103 (Intelligent Rate-of-Rise & Fixed Temperature Heat Detector) là bản NHIỆT ONLY — kết hợp cảm biến tốc độ tăng nhiệt (RoR) và nhiệt cố định 135°F. Không có cảm biến khói.'},
{brand:'GST-UL',cat:'Detectors',q:'Tốc độ tăng tác động của DI-M9103:',options:['5°F/min','10°F/min','15°F/min (8.3°C/min)','30°F/min'],correct:2,explain:'Đầu báo nhiệt DI-M9103 có Rate-of-Rise 15°F/min (8.3°C/min) — khi nhiệt độ tăng nhanh hơn tốc độ này sẽ báo động, kể cả chưa đạt ngưỡng cố định 135°F. Cơ chế bắt được đám cháy phát triển nhanh.'},
{brand:'GST-UL',cat:'Detectors',q:'Khoảng cách lắp nhiệt của DI-M9103 tối đa:',options:['20 ft','30 ft','50 ft (15.2 m)','100 ft'],correct:2,explain:'Đầu báo nhiệt DI-M9103 có khoảng cách lắp tối đa 50 ft × 50 ft (15.2 m × 15.2 m) theo chuẩn UL521. Nghĩa là 1 đầu báo bao phủ ~225 m². Ngoài dải này phải lắp thêm detector.'},
{brand:'GST-UL',cat:'Detectors',q:'Dòng DC-M9101N là:',options:['Địa chỉ','Thông thường (conventional)','Wireless','Beam'],correct:1,explain:'Đầu báo DC-M9101N là bản Conventional (thông thường) — không có địa chỉ riêng. Ký hiệu GST-UL: "DC" = Conventional, "DI" = Digital/Intelligent (địa chỉ). Cùng công nghệ MWMA nhưng khác kiểu giao tiếp.'},
{brand:'GST-UL',cat:'Detectors',q:'Dây kết nối DC-M9101N:',options:['2 dây phân cực','2 dây không phân cực','4 dây','SLC'],correct:0,explain:'Đầu báo conventional DC-M9101N đấu 2 dây PHÂN CỰC (phải đúng cực + và -). Trong khi đầu báo địa chỉ DI series đấu 2 dây KHÔNG phân cực. Phân biệt rõ để tránh đấu sai gây không hoạt động.'},
{brand:'GST-UL',cat:'Detectors',q:'Dòng báo động của DC-M9101N:',options:['≤10 mA','≤55 mA','≤100 mA','≤200 mA'],correct:1,explain:'Đầu báo conventional DC-M9101N khi báo động tiêu thụ ≤55 mA. Dòng chờ chỉ ≤70 µA — rất thấp. Vì báo động tăng dòng đột ngột nên phải kết nối với module/tủ có giới hạn dòng, tránh đấu trực tiếp 24V không kiểm soát.'},
{brand:'GST-UL',cat:'Detectors',q:'DC-M9103 có thể tắt tính năng nào qua programmer?',options:['LED','Fixed temp','Rate-of-Rise','Địa chỉ'],correct:2,explain:'Đầu báo nhiệt DC-M9103 cho phép tắt tính năng Rate-of-Rise qua bộ lập trình P-9910B, chỉ giữ lại chức năng nhiệt cố định. Hữu ích trong môi trường thay đổi nhiệt nhanh (bếp công nghiệp, gần lò) — tránh báo giả do RoR.'},
{brand:'GST-UL',cat:'Detectors',q:'Đầu báo GST-UL kết nối chỉ thị xa qua model:',options:['C-9314P','DB-M01N','DI-M9319','P-9910B'],correct:0,explain:'C-9314P là Passive Remote Indicator (đèn chỉ thị xa thụ động) — dùng cho các đầu báo GST-UL khi lắp ẩn (dưới trần giả, sàn nâng). Lấy nguồn trực tiếp từ detector 2–3 VDC, không cần nguồn phụ.'},
{brand:'GST-UL',cat:'Detectors',q:'Thiết bị lập trình địa chỉ cho detector GST-UL là:',options:['GST-BMQ-2','P-9910B','FSP-5000-RPS','JK-TX-6000D'],correct:1,explain:'P-9910B là Hand Held Programmer (bộ lập trình cầm tay) của GST-UL — lập trình địa chỉ (1–242), loại thiết bị, độ nhạy cho detector, module và MCP. Chạy pin 9V, tiêu thụ ≤8 mA. Không cần laptop.'},

// ============ GST-UL - MODULES ============
{brand:'GST-UL',cat:'Modules',q:'DC-M9410 là module gì?',options:['Đầu vào','Signal Synchronization (đồng bộ tín hiệu)','Cách ly','Zone monitor'],correct:1,explain:'Module DC-M9410 là Signal Synchronization Module — đồng bộ hóa còi + đèn chớp (sounder & strobe) trên một mạch NAC. Đảm bảo tất cả strobe nháy cùng lúc, tránh gây phản ứng quang nhạy cảm (photosensitive) ở người xem.'},
{brand:'GST-UL',cat:'Modules',q:'Độ chính xác đồng bộ của DC-M9410:',options:['±1s','1 lần/giây ±10 ms','±100 ms','±500 ms'],correct:1,explain:'Module đồng bộ DC-M9410 đạt độ chính xác 1 lần/giây trong vòng ±10 ms, không giới hạn thời gian. Độ chính xác này đáp ứng UL1971 cho thiết bị báo quang phục vụ người khiếm thính.'},
{brand:'GST-UL',cat:'Modules',q:'DC-M9503 là:',options:['Loop Isolator wall/rail','Base isolator','Đầu vào','Đầu ra'],correct:0,explain:'Module DC-M9503 là Loop Isolator (cách ly ngắn mạch) gắn tường hoặc thanh DIN 35mm. Cách ly đoạn ngắn mạch trên SLC IDNet và tự phục hồi khi khắc phục sự cố. Hỗ trợ cả Class A và Class B, kể cả nhánh (branch).'},
{brand:'GST-UL',cat:'Modules',q:'Số thiết bị tối đa giữa 2 DC-M9503:',options:['30','50','70','128'],correct:1,explain:'Module cách ly DC-M9503 (wall/rail) giới hạn tối đa 50 thiết bị giữa 2 isolator. Tối đa 128 isolator/vòng. Khi thiết kế phải vẽ sơ đồ trước để phân bổ isolator đúng chỗ.'},
{brand:'GST-UL',cat:'Modules',q:'DC-M9504 khác DC-M9503:',options:['Tăng công suất','Base mount thay thế đế detector','Class B only','Wireless'],correct:1,explain:'Module DC-M9504 là Base Mount Short Circuit Isolator — thay thế luôn đế detector, không cần lắp riêng biệt. Cho phép max 70 thiết bị giữa 2 isolator (nhiều hơn DC-M9503 là 50). Tiết kiệm chi phí dây và hộp kỹ thuật.'},
{brand:'GST-UL',cat:'Modules',q:'DI-M9300 là module:',options:['Đầu vào đơn (tiếp điểm khô)','Đầu ra đơn','I/O','Cách ly'],correct:0,explain:'Module DI-M9300 (Digital Single Input Module) nhận tín hiệu tiếp điểm khô NO/NC (mặc định NO, đổi được qua P-9910B). Gửi tín hiệu fault/alarm về FACP qua SLC. Dùng cho công tắc dòng chảy, công tắc áp suất, van tín hiệu.'},
{brand:'GST-UL',cat:'Modules',q:'DI-M9301 có bao nhiêu địa chỉ (max):',options:['1','1 hoặc 2 (chọn qua Function-4)','2 luôn','4'],correct:1,explain:'Module DI-M9301 (Digital Single Input & Output) có thể cài 1 hoặc 2 địa chỉ qua Function-4 của P-9910B: 1 địa chỉ chung cho cả in/out, hoặc 2 địa chỉ (in=addr X, out=addr X+1 liên tiếp). Linh hoạt tùy nhu cầu.'},
{brand:'GST-UL',cat:'Modules',q:'Tải đầu ra của DI-M9301:',options:['1A @ 30V DC','2A @ 30V DC','5A @ 30V DC','10A @ 30V DC'],correct:1,explain:'Module DI-M9301 có tải đầu ra 2A @ 30V DC (PF = 0.35). Nếu cần điều khiển tải lớn hơn (van solenoid công suất cao) phải qua relay trung gian, không đấu trực tiếp.'},
{brand:'GST-UL',cat:'Modules',q:'Chế độ đầu vào của DI-M9301:',options:['Chỉ NO','Chỉ NC','NO, NC hoặc Self-confirm','NO + NC luôn'],correct:2,explain:'Module DI-M9301 có 3 chế độ đầu vào cài qua Function-3: NO (thường mở), NC (thường đóng), hoặc Self-confirm (đầu ra kích hoạt rồi tự xác nhận trạng thái phản hồi qua đầu vào). Linh hoạt tùy ứng dụng.'},
{brand:'GST-UL',cat:'Modules',q:'DI-M9305 là:',options:['Zone monitor','Riser Output (cấp/ngắt nguồn)','Đồng bộ tín hiệu','Cách ly'],correct:1,explain:'Module DI-M9305 (Digital Single Riser Output Module) điều khiển cấp/ngắt nguồn cho thiết bị cuối. Relay đóng đồng thời CẢ 2 dây nguồn — an toàn cho thiết bị có tải cảm kháng (motor, van solenoid). Có thể cài monitored output để tủ nhận fault nếu đứt dây.'},
{brand:'GST-UL',cat:'Modules',q:'DI-M9319 dùng để làm gì?',options:['Đồng bộ','Kết nối đầu báo thông thường vào hệ địa chỉ','Isolator','I/O'],correct:1,explain:'Module DI-M9319 (Digital Zone Monitor Module) là cầu nối cho phép dùng đầu báo cháy thông thường (DC-M9101N/9102N/9103) trong hệ thống địa chỉ SLC. Tiết kiệm chi phí khi mở rộng hệ thống mà không phải đổi hết detector.'},
{brand:'GST-UL',cat:'Modules',q:'Dung lượng đầu báo thông thường của DI-M9319:',options:['10','20','30 (hoặc 9 nếu có chỉ thị xa C-9314P)','50'],correct:2,explain:'Module DI-M9319 nhận tối đa 30 đầu báo thông thường hoặc nút ấn. NHƯNG nếu có kết nối chỉ thị xa C-9314P (passive), dung lượng giảm chỉ còn 9 đầu báo — do tải LED chỉ thị chiếm dụng dòng.'},
{brand:'GST-UL',cat:'Modules',q:'DI-M9301 khi dùng 2 địa chỉ thì địa chỉ:',options:['Bất kỳ','Phải liên tiếp (X và X+1)','Cách nhau 8','Cách nhau 16'],correct:1,explain:'Module DI-M9301 khi cài 2 địa chỉ thì bắt buộc: địa chỉ vào = addr X, địa chỉ ra = addr X+1 (liên tiếp). Không được dùng địa chỉ tách rời. Khi lập kế hoạch địa chỉ phải để 2 slot liên tiếp cho module này.'},

// ============ GST-UL - ALARM DEVICES ============
{brand:'GST-UL',cat:'AlarmDevices',q:'C-9314P là:',options:['Còi','Đèn chỉ thị xa thụ động (Passive)','Nút ấn','Module'],correct:1,explain:'C-9314P là Passive Remote Indicator (đèn chỉ thị xa thụ động). Dùng cho detector lắp ẩn (dưới trần giả, sàn nâng, phòng sạch). "Thụ động" vì không cần nguồn phụ — lấy điện thẳng từ đầu báo qua 2 dây phân cực.'},
{brand:'GST-UL',cat:'AlarmDevices',q:'Điện áp làm việc của C-9314P:',options:['2-3 VDC (từ detector)','12 VDC','24 VDC','29 VDC'],correct:0,explain:'Đèn chỉ thị xa C-9314P hoạt động ở 2.0–3.0 VDC lấy từ detector. Điện áp thấp nên PHẢI nối đúng cực — đấu ngược sẽ không sáng và có thể hỏng LED. Dòng standby 0 mA, dòng tác động ≤30 mA.'},
{brand:'GST-UL',cat:'AlarmDevices',q:'DC-M9204F khác DC-M9204:',options:['Có địa chỉ','Có dấu hiệu FIRE','Chống nước','Không phân cực'],correct:1,explain:'Nút ấn DC-M9204F (Conventional Manual Call Point, hậu tố "F") có dấu hiệu FIRE in trên mặt theo NFPA. Trong khi DC-M9204 không có marking. Chọn model F khi dự án yêu cầu marking rõ ràng.'},
{brand:'GST-UL',cat:'AlarmDevices',q:'DI-M9204 khác DC-M9204:',options:['Có địa chỉ','Chống nước hơn','Nhiều tone hơn','Không có kính'],correct:0,explain:'Nút ấn DI-M9204 là bản Digital (địa chỉ) — có 1 địa chỉ riêng (1–242), tủ biết chính xác nút nào được kích. Còn DC-M9204 là Conventional (thông thường) — chỉ báo về zone chung, không xác định được nút cụ thể.'},
{brand:'GST-UL',cat:'AlarmDevices',q:'Cách kích hoạt DC-M9204/DI-M9204:',options:['Push button','Đập kính (breakglass)','Xoay khóa','Kéo cần'],correct:1,explain:'Nút ấn DC-M9204 và DI-M9204 đều kích hoạt bằng cách đập kính (breakglass). Khôi phục bằng khóa chuyên dụng — glass reusable (kính có thể tái dùng) sau khi dùng key reset. Cấp bảo vệ IP43.'},
{brand:'GST-UL',cat:'AlarmDevices',q:'DC-M9413R là:',options:['Wall Mount Sounder (chỉ còi)','Wall Mount Sounder Strobe (còi+đèn) - Đỏ','Ceiling Mount','Strobe only'],correct:1,explain:'DC-M9413R là còi + đèn chớp treo tường (Wall Mount Sounder Strobe), màu ĐỎ. Ký hiệu GST-UL: "R" = Red (đỏ), "W" = White (trắng). Bản M9413 tích hợp cả còi và đèn trên 1 thiết bị, tiết kiệm chi phí lắp.'},
{brand:'GST-UL',cat:'AlarmDevices',q:'Cường độ candela của DC-M9413:',options:['5,10,15,25','15,30,75,110','20,40,60,80','30,60,90,120'],correct:1,explain:'Còi đèn DC-M9413 có 4 mức cường độ candela chọn được: 15, 30, 75, 110 cd. Chọn theo diện tích và độ sáng môi trường lắp đặt — nơi có nhiều ánh sáng ngoài trời chọn mức cao hơn.'},
{brand:'GST-UL',cat:'AlarmDevices',q:'DC-M9414 là:',options:['Còi + đèn','Chỉ còi (không đèn)','Chỉ đèn (không còi)','Ceiling mount'],correct:1,explain:'DC-M9414R/W là Wall Mount Sounder — CHỈ CÒI, không có đèn chớp. Dùng khi khu vực không yêu cầu tín hiệu quang hoặc đã có đèn strobe riêng. Rẻ hơn bản M9413 (còi + đèn).'},
{brand:'GST-UL',cat:'AlarmDevices',q:'DC-M9415 là:',options:['Còi + đèn','Chỉ còi','Chỉ đèn strobe','Đèn trần'],correct:2,explain:'DC-M9415R/W là Wall Mount Strobe — CHỈ ĐÈN CHỚP, không có còi. Dùng cho khu vực yêu cầu tín hiệu quang cho người khiếm thính (đáp ứng UL1971) và không cần âm thanh (thư viện, phòng ngủ khách sạn).'},
{brand:'GST-UL',cat:'AlarmDevices',q:'DC-M9416 khác DC-M9413:',options:['Ceiling Mount thay vì Wall','Nhiều candela hơn','Class A','Digital'],correct:0,explain:'DC-M9416R/W là Ceiling Mount Sounder Strobe — lắp trần thay vì tường. Cường độ tối đa chỉ 95 cd (khác với 110 cd của M9413 wall). Dùng hộp vuông 4 inch thay vì single-gang.'},
{brand:'GST-UL',cat:'AlarmDevices',q:'Tốc độ chớp của DC-M9413/M9415/M9416:',options:['0.5 Hz','1 flash/giây','2 Hz','5 Hz'],correct:1,explain:'Tất cả đèn chớp UL đồng bộ ở tần số 1 flash/giây (1 Hz) theo chuẩn UL1971. Đây là tần số an toàn — không gây phản ứng động kinh nhạy cảm với ánh sáng (photosensitive epilepsy).'},
);

// ============ SIMPLEX - CONTROL PANEL ============
QUESTIONS.push(
{brand:'SIMPLEX',cat:'ControlPanel',q:'2004FS có bao nhiêu IDC và NAC?',options:['2 IDC, 1 NAC','4 IDC, 1 NAC','8 IDC, 2 NAC','4 IDC, 2 NAC'],correct:1,explain:'Tủ báo cháy 2004FS (Foundation Series FACU) là tủ conventional nhỏ với 4 IDC (Initiating Device Circuit) Class B + 1 NAC × 1.5A. Mỗi IDC tối đa 20 smoke/heat detectors. Phù hợp tòa nhà nhỏ, thao tác đơn giản qua DIP switch.'},
{brand:'SIMPLEX',cat:'ControlPanel',q:'2008FS có bao nhiêu IDC Class B?',options:['4','8 (hoặc 4 Class A)','16','32'],correct:1,explain:'Tủ 2008FS (Foundation Series FACU) hỗ trợ 8 IDC Class B hoặc 4 IDC Class A (do Class A cần 2 dây in/return nên số zone giảm nửa). Có 2 NAC × 1.5A, 4 relay phụ. Mỗi IDC tối đa 30 detectors.'},
{brand:'SIMPLEX',cat:'ControlPanel',q:'2050FS hỗ trợ tối đa bao nhiêu điểm địa chỉ?',options:['30','50 điểm MX','200','250'],correct:1,explain:'Tủ báo cháy 2050FS (Foundation Series Addressable) hỗ trợ tối đa 50 điểm địa chỉ trên 1 MX loop. Đây là bước nhảy công nghệ: dùng MX addressable protocol nhưng vẫn giữ giao diện đơn giản Foundation Series. Phù hợp retrofit từ conventional lên addressable.'},
{brand:'SIMPLEX',cat:'ControlPanel',q:'2250FS hỗ trợ tối đa bao nhiêu điểm?',options:['50','100','250 điểm MX','1000'],correct:2,explain:'Tủ 2250FS (Foundation Series Addressable) hỗ trợ 250 điểm trên 1 MX loop — gấp 5 lần 2050FS. Cùng nền tảng Foundation, cùng phụ kiện (CSG, SafeLINC). Có 4 NAC × 3A (gấp đôi 2050FS).'},
{brand:'SIMPLEX',cat:'ControlPanel',q:'Ba phương án địa chỉ hóa của 2050FS/2250FS là:',options:['DIP, Soft, QR code','Chỉ DIP','Chỉ Soft','DIP + Rotary'],correct:0,explain:'Tủ 2050FS/2250FS hỗ trợ 3 cách địa chỉ hóa: DIP switch (truyền thống), Soft addressing (qua phần mềm), và QR code (quét mã trên thiết bị). Linh hoạt cho mọi tình huống lắp đặt và thay thế.'},
{brand:'SIMPLEX',cat:'ControlPanel',q:'NAC của 2050FS/2250FS tương thích với:',options:['TrueAlert non-addressable','IDNAC addressable','ES Net','Cả 3'],correct:0,explain:'NAC của tủ 2050FS/2250FS CHỈ tương thích TrueAlert non-addressable — không dùng được thiết bị addressable IDNAC (thuộc dòng ES cao cấp hơn). Khi thiết kế phải chọn đúng dòng còi/đèn.'},
{brand:'SIMPLEX',cat:'ControlPanel',q:'4004R là tủ:',options:['FACP thường','Suppression Releasing Panel (chữa cháy tự động)','Voice','ECS'],correct:1,explain:'Tủ 4004R là Suppression Releasing Panel — chuyên biệt cho hệ thống chữa cháy tự động: deluge, preaction sprinkler, xả chất chữa cháy khí. Có 2 RAC (Releasing Appliance Circuit) giám sát coil actuator, 2 SPM cho Manual Release/Abort.'},
{brand:'SIMPLEX',cat:'ControlPanel',q:'4004R hỗ trợ chế độ IDC nào để giảm nguy cơ xả nhầm?',options:['Latching','Cross-zoning (2 IDC đồng thời)','PAS','TrueSense'],correct:1,explain:'Tủ chữa cháy 4004R hỗ trợ Cross-zoning — cần 2 IDC alarm đồng thời mới kích hoạt xả chất chữa cháy. Giảm rủi ro xả nhầm chi phí lớn. Chế độ single-zone (1 IDC đủ) chỉ dùng khi rủi ro xả nhầm thấp.'},
{brand:'SIMPLEX',cat:'ControlPanel',q:'Actuator của 4004R tương thích:',options:['12 VDC','24 VDC hoặc 2×12 VDC nối tiếp','48 VDC','120 VAC'],correct:1,explain:'Tủ 4004R tương thích actuator 24 VDC hoặc 2 × 12 VDC nối tiếp. TUYỆT ĐỐI không dùng loại điện áp khác — sai điện áp sẽ không kích hoạt được van xả khí trong tình huống cháy thật.'},
{brand:'SIMPLEX',cat:'ControlPanel',q:'4007ES kết hợp 2 công nghệ:',options:['MAPNET II + hard-wired','IDNet+ (initiation) + IDNAC SLC (notification)','MX + NAC','TrueAlarm + Voice'],correct:1,explain:'Tủ 4007ES (Fire Control Panel) là bước đột phá: kết hợp IDNet+ addressable initiation (100–250 điểm) và IDNAC SLC addressable notification (còi/đèn có địa chỉ) trong 1 tủ nhỏ gọn. Màn hình cảm ứng 4.3 inch.'},
{brand:'SIMPLEX',cat:'ControlPanel',q:'IDNet+ trên 4007ES tối đa:',options:['50 điểm','100 điểm (1 loop) + 75/module (max 250)','200 điểm','508 điểm'],correct:1,explain:'IDNet+ SLC trên tủ 4007ES: loop chuẩn 100 điểm, mỗi module mở rộng thêm 75 điểm, tối đa 250 điểm tổng. Có short circuit isolation tích hợp — dùng được cả dây bọc lẫn không bọc.'},
{brand:'SIMPLEX',cat:'ControlPanel',q:'Điện áp IDNAC SLC ổn định của Simplex:',options:['24 VDC','27 VDC','29 VDC ổn định (kể cả pin)','48 VDC'],correct:2,explain:'IDNAC SLC (Signaling Line Circuit) của SIMPLEX duy trì 29 VDC ổn định — ngay cả khi tủ chuyển sang chạy bằng pin. Ưu điểm: khoảng cách dây dài hơn 2–3 lần so với NAC thường 24V (do dòng thấp hơn).'},
{brand:'SIMPLEX',cat:'ControlPanel',q:'4008 hỗ trợ tối đa bao nhiêu điểm IDNet?',options:['100','200','250','508'],correct:1,explain:'Tủ 4008 (TrueAlarm Addressable FACP) có 1 IDNet SLC × 200 điểm địa chỉ. Hỗ trợ TrueAlarm analog nhưng feature set BỊ GIẢM so với 4100ES — cần kiểm tra tài liệu S4008-0001 khi chọn thiết bị TrueAlarm cho 4008.'},
{brand:'SIMPLEX',cat:'ControlPanel',q:'4010ES có dual IDNAC SLC:',options:['1 × 1A','1 × 3A','2 × 3A onboard','4 × 2A'],correct:2,explain:'Tủ 4010ES (Fire Control Panel cấp trung) có 2 × 3A IDNAC SLC onboard — không cần module NAC thêm cho hầu hết ứng dụng. Điện áp 29 VDC ổn định giúp mỗi mạch phủ khu vực lớn hơn.'},
{brand:'SIMPLEX',cat:'ControlPanel',q:'4010ES hỗ trợ VESDA lên đến:',options:['32','64','127','255'],correct:2,explain:'Tủ 4010ES hỗ trợ tích hợp đến 127 hệ thống VESDA Air Aspiration (module tùy chọn). VESDA là hệ thống hút khí phát hiện khói cực nhạy dùng cho phòng sạch, trung tâm dữ liệu, di tích. Rất mạnh khi tích hợp trực tiếp không cần gateway.'},
{brand:'SIMPLEX',cat:'ControlPanel',q:'IDNet2 SLC của 4010ES đặc biệt vì:',options:['Nhiều điểm hơn','Short circuit isolating dual loop tích hợp','Class A only','Nhanh hơn'],correct:1,explain:'Tủ 4010ES dùng IDNet2 SLC — có tích hợp sẵn 2 loop cô lập ngắn mạch (short circuit isolating dual loop). Không cần lắp isolator ngoài, hoạt động cả với dây bọc lẫn không bọc. Đây là đặc trưng của IDNet2 (thế hệ mới hơn IDNet).'},
{brand:'SIMPLEX',cat:'ControlPanel',q:'4017ES có amplifier tích hợp:',options:['25 W','50 W','100 W','200 W'],correct:1,explain:'Tủ 4017ES (Voice Fire Alarm Control Unit) có 1 amplifier 50 W tích hợp cho voice evacuation. Có thể mở rộng thêm 1 amp thành tổng 100 W hoặc dùng làm backup amplifier. Kết hợp IDNet2 (250 điểm) + IDNAC SLC.'},
{brand:'SIMPLEX',cat:'ControlPanel',q:'4017ES chọn điện áp loa qua:',options:['Jumper phần cứng','Phần mềm (25 V hoặc 70.7 V rms)','DIP switch','Cố định 70V'],correct:1,explain:'Tủ 4017ES cho phép chọn điện áp loa 25 V rms hoặc 70.7 V rms bằng phần mềm — không cần thay phần cứng khi đổi loại loa. Ưu điểm lớn khi retrofit hoặc thay đổi loa trong tương lai.'},
{brand:'SIMPLEX',cat:'ControlPanel',q:'⚠ Cảnh báo quan trọng khi nâng cấp 4017ES lên ES Net:',options:['Phải cập nhật firmware','KHÔNG trộn NIC ES Net và NIC 4120 trên cùng vòng','Phải thay pin','Đổi loa'],correct:1,explain:'⚠ Khi nâng cấp mạng 4120 lên ES Net, TUYỆT ĐỐI không trộn NIC ES Net và NIC 4120 trên cùng vòng mạng — sẽ gây xung đột giao thức. Phải thay TẤT CẢ NIC 4120 thành ES Net NIC một lúc.'},
{brand:'SIMPLEX',cat:'ControlPanel',q:'4020 hỗ trợ giao thức addressable nào?',options:['IDNet','MAPNET II (đến 508 điểm)','IDNet2','MX'],correct:1,explain:'Tủ 4020 (Enhanced Capacity Addressable) dùng MAPNET II — giao thức addressable thế hệ cũ của SIMPLEX. Hỗ trợ đến 508 điểm địa chỉ + 20 mạch hard-wired I/O. Cần giữ tồn kho thiết bị MAPNET II khi mở rộng.'},
{brand:'SIMPLEX',cat:'ControlPanel',q:'4020 đạt chuẩn nào ngoài UL 864?',options:['UL 1971','UL 1076 (Security)','UL 268','UL 464'],correct:1,explain:'Tủ 4020 đạt cả UL 864 (báo cháy) và UL 1076 (Security System) — cùng 1 tủ phục vụ cả báo cháy lẫn báo động an ninh. Điểm đặc biệt so với các tủ chỉ có UL 864. 4100ES cũng có tính năng này.'},
{brand:'SIMPLEX',cat:'ControlPanel',q:'4100ES là tủ:',options:['Nhỏ','Trung','Lớn nhất Simplex (đến 3000 điểm)','Voice only'],correct:2,explain:'Tủ 4100ES (Large Scale Addressable Fire Control Unit) là tủ lớn nhất dòng SIMPLEX — đến 3.000 điểm địa chỉ. Hỗ trợ đầy đủ: ES Net, 4120 network, ECS, VESDA, BACnet, SafeLINC Cloud. Dùng cho bệnh viện, khách sạn lớn, khu phức hợp.'},
{brand:'SIMPLEX',cat:'ControlPanel',q:'4100ES có tính năng dual CPU nào?',options:['2 CPU chạy song song','Dual CPU programs (1 active + 1 reserve)','2 mạng riêng','Backup power'],correct:1,explain:'Tủ 4100ES có Dual CPU programs: 1 chương trình active + 1 reserve trong CPU 32-bit. Cho phép download cấu hình mới mà KHÔNG GIÁN ĐOẠN hệ thống đang chạy — tính năng cực quan trọng cho tòa nhà critical (bệnh viện, khách sạn).'},
{brand:'SIMPLEX',cat:'ControlPanel',q:'UL 2572 mà 4100ES đạt là chuẩn cho:',options:['Voice evacuation','Mass Notification System (MNS)','Security','Anti-tampering'],correct:1,explain:'Tủ 4100ES đạt UL 2572 (MNS — Mass Notification Systems). Chuẩn này áp dụng cho hệ thống thông báo đại chúng: khủng bố, thời tiết, cảnh báo an ninh. Chỉ tủ cấp cao nhất mới có MNS listing này.'},
{brand:'SIMPLEX',cat:'ControlPanel',q:'MAPNET II trên 4020/4100ES gọi là:',options:['Công nghệ mới','Giao thức thế hệ cũ nhưng backward compatible','Chỉ dùng UL','Không hỗ trợ IDNet'],correct:1,explain:'MAPNET II là giao thức addressable thế hệ cũ của SIMPLEX. Tủ 4100ES vẫn backward compatible với MAPNET II để bảo toàn đầu tư thiết bị cũ — khi nâng cấp không phải thay hết detector cũ. Trong khi các tủ ES thế hệ mới thiên về IDNet2.'},
);

// ============ SIMPLEX - SYSTEM KNOWLEDGE ============
QUESTIONS.push(
{brand:'SIMPLEX',cat:'SystemKnowledge',q:'IDNet là gì?',options:['Ethernet nội bộ','Giao thức addressable initiation 2 dây của Simplex — kết nối đầu báo/nút ấn có địa chỉ đến FACP','WiFi báo cháy','Cáp quang'],correct:1,explain:'IDNet (Individual Device Network) là giao thức addressable SLC của SIMPLEX cho các thiết bị initiation (đầu báo, nút ấn, module I/O). Dùng 2 dây cấp cả nguồn 24V và dữ liệu. Địa chỉ 1–200 (4008) hoặc 1–250 (4010/4100). Truyền dữ liệu analog (không chỉ on/off) — mỗi 4s tủ nhận giá trị đo thực từ TrueAlarm sensor. Đây là thế hệ đầu; hiện tại nâng cấp lên IDNet2 và IDNet+.'},
{brand:'SIMPLEX',cat:'SystemKnowledge',q:'IDNet2 khác IDNet ở điểm gì?',options:['Chỉ tên khác','Tích hợp sẵn short circuit isolation trong bus (dual loop) → không cần isolator ngoài','Nhiều điểm hơn','Nhanh hơn'],correct:1,explain:'IDNet2 là thế hệ mới của IDNet với đột phá: TÍCH HỢP SẴN short circuit isolation dual loop trong bus. Nghĩa là: (1) không cần lắp isolator riêng biệt; (2) dùng được cả dây bọc lẫn không bọc; (3) khi ngắn mạch, tủ tự cô lập đoạn lỗi ở CẢ 2 loop độc lập. IDNet cũ cần isolator 4090-9116/9122 hoặc base 4098-9766/9767. IDNet2 chỉ có trên tủ ES (4007ES, 4010ES, 4100ES).'},
{brand:'SIMPLEX',cat:'SystemKnowledge',q:'IDNet+ trên 4007ES khác gì IDNet/IDNet2?',options:['Chỉ marketing','Cô lập ngắn mạch tích hợp + 100 điểm/loop cơ sở, mỗi module thêm 75 → tối đa 250','Chỉ 50 điểm','Không dùng địa chỉ'],correct:1,explain:'IDNet+ là biến thể trên tủ SIMPLEX 4007ES: (1) Có short circuit isolation tích hợp (như IDNet2); (2) Cấu trúc mở rộng: loop cơ sở 100 điểm + mỗi module mở rộng thêm 75 điểm — tối đa 250 điểm. Tối ưu cho dự án cỡ vừa. Có thể coi IDNet+ là "IDNet2 tối ưu cho 4007ES", còn IDNet2 dùng trên 4010ES/4100ES với 250 điểm/loop chuẩn.'},
{brand:'SIMPLEX',cat:'SystemKnowledge',q:'IDNAC (SLC notification) khác IDNet ở đâu?',options:['Chỉ tên','IDNAC cho thiết bị NOTIFICATION có địa chỉ (còi, đèn); IDNet cho thiết bị INITIATION (đầu báo, nút ấn)','Cùng chức năng','IDNAC nhỏ hơn'],correct:1,explain:'2 giao thức SLC riêng biệt của SIMPLEX: IDNet (Initiation) cho đầu báo, nút ấn, module I/O gửi tín hiệu VÀO tủ. IDNAC (Notification) cho còi, đèn strobe có địa chỉ nhận tín hiệu TỪ tủ. IDNAC đặc trưng: điện áp 29V DC ổn định (kể cả pin), dây gấp 2-3 lần NAC thường, giám sát đến tận thiết bị. Dòng còi/đèn dòng 49AV/49VO/49AO chạy trên IDNAC.'},
{brand:'SIMPLEX',cat:'SystemKnowledge',q:'Vì sao IDNAC giữ 29V DC ổn định (không phải 24V)?',options:['Tùy chọn','29V có buffer chống sụt áp khi pin xuống 20V, đảm bảo còi/đèn hoạt động ổn định trong mọi điều kiện','Chuẩn UL','Ngẫu nhiên'],correct:1,explain:'NAC thường dùng 24V DC — khi tủ chạy pin, điện áp có thể tụt còn 20-22V khi tải cao → còi kêu yếu, đèn strobe không đủ candela. IDNAC dùng bộ chuyển đổi giữ nghiêm 29V DC (ngay cả khi pin ở 20V). Ưu điểm: (1) khoảng cách dây gấp 2-3 lần (do dòng thấp hơn ở cùng công suất); (2) hoạt động ổn định trong mọi tình huống; (3) tương thích thiết bị TrueAlert ES addressable.'},
{brand:'SIMPLEX',cat:'SystemKnowledge',q:'MAPNET II là gì?',options:['Chuẩn mới','Giao thức addressable thế hệ cũ của Simplex (đời tủ 4020, 4100) — vẫn được 4100ES backward compatible','Giao thức Cisco','WiFi'],correct:1,explain:'MAPNET II là giao thức addressable SLC thế hệ cũ của Simplex — dùng trên các tủ 4020 (508 điểm), 4100, 4120, 2120 CDT. Sau này được thay bằng IDNet/IDNet2. Tuy nhiên tủ hiện đại 4100ES vẫn backward compatible với MAPNET II để bảo toàn đầu tư khách hàng cũ — không phải thay hết detector khi nâng cấp tủ. Nhiều IAM module (4090-9001/9008) hỗ trợ cả IDNet và MAPNET II.'},
{brand:'SIMPLEX',cat:'SystemKnowledge',q:'MX loop trên Foundation Series (2050FS/2250FS) là gì?',options:['Cùng IDNet','Giao thức addressable riêng cho dòng Foundation entry-level — không tương thích IDNet/IDNAC','Chỉ conventional','Không có địa chỉ'],correct:1,explain:'MX loop là giao thức addressable RIÊNG của dòng Foundation Series entry-level (2050FS 50 điểm, 2250FS 250 điểm). Đơn giản, tối ưu chi phí. KHÔNG tương thích với IDNet/IDNet2 cao cấp — dùng danh mục thiết bị MX riêng. NAC của 2050FS/2250FS chỉ chạy TrueAlert non-addressable (không dùng được TrueAlert ES trên IDNAC). 3 phương án địa chỉ hóa: DIP switch, Soft addressing, QR code.'},
{brand:'SIMPLEX',cat:'SystemKnowledge',q:'TrueAlarm Analog Sensor truyền dữ liệu thế nào?',options:['On/off','Truyền giá trị đo thực (analog) mỗi 4 giây → tủ tự tính ngưỡng động, bù drift','Chỉ khi báo động','Realtime liên tục'],correct:1,explain:'TrueAlarm khác conventional ở chỗ: mỗi 4 giây/sensor truyền GIÁ TRỊ ĐO THỰC (analog value) về tủ, không chỉ tín hiệu on/off. Tủ phân tích lịch sử: (1) tính ngưỡng trung bình động (bù nhiễu ngắn hạn); (2) phát hiện drift dài hạn do bụi; (3) so sánh với 7 mức nhạy đã cài; (4) cảnh báo Dirty/Almost Dirty/Excessively Dirty. Đây là "brain" nằm ở panel — sensor chỉ là "eye".'},
{brand:'SIMPLEX',cat:'SystemKnowledge',q:'TrueSense (4098-9754) khác TrueAlarm sensor thường?',options:['Chỉ tên','Multi-sensor: phân tích tương quan khói + nhiệt đồng thời, phát hiện hot-flaming fire sớm hơn từng cảm biến riêng','Nhiều điểm','Ion hóa'],correct:1,explain:'TrueSense là thuật toán trên đầu báo 4098-9754 Multi-Sensor: có CẢ cảm biến khói quang + nhiệt trong 1 đầu báo. TrueSense phân tích tương quan 2 tín hiệu đồng thời: nếu khói + nhiệt cùng tăng → cháy thật (dù mỗi tín hiệu chưa đạt ngưỡng riêng). Ưu điểm: phát hiện đám cháy hot-flaming (nhiệt cao, khói ít) sớm hơn 30-50% so với đầu báo khói đơn lẻ. Báo cáo dữ liệu 2 point qua 1 địa chỉ.'},
{brand:'SIMPLEX',cat:'SystemKnowledge',q:'Kiến trúc 4100ES — tối đa 3000 điểm hoạt động thế nào?',options:['1 loop lớn','12 IDNet2 SLC × 250 điểm + module IDNAC + tối đa 2000 điểm annunciation','1 CPU chung','Cloud'],correct:1,explain:'Tủ 4100ES lớn nhất Simplex đạt 3.000 điểm bằng cách: (1) Tối đa 12 IDNet2 SLC × 250 điểm = 3000 điểm địa chỉ initiation; (2) Module IDNAC SLC tùy chọn cho notification có địa chỉ; (3) Đến 2.000 điểm annunciation (LED/relay hiển thị); (4) Ghép mạng ES Net hoặc 4120 với nhiều tủ khác. CPU 32-bit Master Controller quản lý tất cả, có dual CPU programs (1 active + 1 reserve) cho download không gián đoạn.'},
{brand:'SIMPLEX',cat:'SystemKnowledge',q:'ES Net Peer-to-Peer khác 4120 Network thế nào?',options:['Cùng chức năng','ES Net: thế hệ mới, peer-to-peer (không master/slave); 4120: thế hệ cũ, cần token routing','Chỉ tốc độ','Ngẫu nhiên'],correct:1,explain:'2 công nghệ mạng của Simplex: 4120 (thế hệ cũ) — dùng token routing, có node master điều khiển traffic. ES Net (thế hệ mới) — peer-to-peer thực sự, mỗi node độc lập, tự phục hồi khi 1 node hỏng, Class B hoặc X. Khi nâng cấp 4120 lên ES Net, ⚠ KHÔNG được trộn NIC ES Net và NIC 4120 trên cùng vòng — sẽ xung đột giao thức. Phải thay TOÀN BỘ NIC cùng lúc.'},
{brand:'SIMPLEX',cat:'SystemKnowledge',q:'Dual CPU programs của 4100ES nghĩa là:',options:['2 CPU','1 CPU chứa 2 chương trình: 1 active + 1 reserve → download cấu hình mới không cần shutdown','Backup file','2 tủ'],correct:1,explain:'Dual CPU programs không phải 2 CPU vật lý — mà là 1 CPU 32-bit Master Controller chứa 2 CHƯƠNG TRÌNH: 1 active đang chạy + 1 reserve đang cập nhật. Khi kỹ thuật viên download cấu hình mới, tủ nạp vào slot reserve; sau khi kiểm tra ok, tủ chuyển sang chạy chương trình mới TRONG <1 GIÂY. Không cần shutdown — hệ thống báo cháy tiếp tục giám sát liên tục. Tính năng critical cho bệnh viện.'},
{brand:'SIMPLEX',cat:'SystemKnowledge',q:'ECS trên 4100ES là gì?',options:['Ethernet','Emergency Communications Systems: 8 kênh audio digital hoặc 2 kênh analog — cho thông báo khẩn cấp đa mục đích','Chỉ voice fire','Backup power'],correct:1,explain:'ECS (Emergency Communications Systems) là mở rộng của voice evacuation — không chỉ báo cháy mà còn thông báo khẩn cấp đa mục đích: khủng bố, thời tiết cực đoan, an ninh, y tế. 4100ES hỗ trợ 8 kênh digital audio (có thể phát nội dung khác nhau ở khác vùng) hoặc 2 kênh analog. Kết hợp với UL 2572 (Mass Notification System - MNS) — chuẩn cho thông báo đại chúng, bắt buộc ở sân bay/campus lớn của Mỹ.'},
{brand:'SIMPLEX',cat:'SystemKnowledge',q:'Cross-zoning trên 4004R Suppression Panel là gì?',options:['2 zone chung','Yêu cầu 2 IDC alarm ĐỒNG THỜI ở 2 zone khác nhau mới kích hoạt xả khí — giảm rủi ro xả nhầm','Chỉ 1 zone','Zone chéo'],correct:1,explain:'Cross-zoning trên tủ chữa cháy 4004R: yêu cầu 2 IDC alarm ĐỒNG THỜI ở 2 zone khác nhau mới kích hoạt xả chất chữa cháy. Ví dụ: zone 1 (khói) + zone 2 (nhiệt) — cả 2 báo mới xả. Giảm cực mạnh rủi ro xả nhầm chi phí cao (khí FM200 xả 1 lần ~50-100 triệu VNĐ). Chế độ single-zone (1 IDC đủ kích hoạt) chỉ dùng khi rủi ro báo giả rất thấp — ví dụ phòng thiết bị không có người.'},
{brand:'SIMPLEX',cat:'SystemKnowledge',q:'Chuỗi âm thanh leo thang của 4004R:',options:['Chỉ 1 tone','3 giai đoạn: Stage 1 Temporal → Stage 2 March Time 120 BPM → Release On Steady','Ngắt còi','Voice'],correct:1,explain:'4004R Audible Escalation 3 giai đoạn cảnh báo trước khi xả khí: (1) Stage 1 Pre-alarm: Temporal Code 3 — thông báo có báo động, người trong phòng chú ý; (2) Stage 2 Timer active: March Time 120 BPM — bắt đầu đếm ngược delay, người phải thoát ra ngay; (3) Release (timer hết): On Steady — actuator đã kích hoạt, khí đang xả. Chuỗi âm thanh khác biệt giúp người trong phòng biết chính xác đang ở giai đoạn nào.'},
{brand:'SIMPLEX',cat:'SystemKnowledge',q:'DACT tích hợp trên 2050FS/2250FS làm gì?',options:['Chỉ audio','Digital Alarm Communicator Transmitter — báo về monitoring station qua Contact ID/SIA/IP/Cellular','Nút ấn','Backup pin'],correct:1,explain:'DACT (Digital Alarm Communicator Transmitter) là bộ truyền tin báo về trung tâm giám sát (monitoring station) qua các đường: (1) PSTN 2 đường - Contact ID/SIA; (2) IP Fibro Protocol; (3) Cellular 4G/LTE. Tủ Foundation Series (2050FS/2250FS) tích hợp DACT sẵn. Khi có alarm, DACT tự động gọi/gửi tin đến trung tâm 24/7 để dispatch cứu hỏa. Bắt buộc theo NFPA72 cho hầu hết dự án commercial ở Mỹ.'},
{brand:'SIMPLEX',cat:'SystemKnowledge',q:'SafeLINC Cloud kết nối qua gì?',options:['Trực tiếp Internet','Connected Services Gateway (CSG) — giám sát tủ từ web/mobile app, xem status realtime','WiFi','Bluetooth'],correct:1,explain:'SafeLINC Cloud là dịch vụ giám sát từ xa của Simplex qua CSG (Connected Services Gateway). Tủ 2050FS/2250FS/4100ES gửi dữ liệu status/events lên cloud Simplex. Chủ đầu tư/quản lý dùng web/mobile app xem realtime: alarm, trouble, event history, thời gian remaining của pin. Kỹ thuật viên có thể predictive maintenance từ xa. Có phí subscription hàng năm.'},
{brand:'SIMPLEX',cat:'SystemKnowledge',q:'Tủ nào của Simplex phù hợp cho tòa nhà 100 tầng?',options:['2004FS','4008 (200 điểm)','4100ES (3000 điểm) + ECS + ES Net mạng nhiều tủ','2050FS'],correct:2,explain:'Tòa nhà 100 tầng cần: (1) Capacity rất lớn: 4100ES 3000 điểm/tủ; (2) Voice evacuation phân vùng theo tầng: ECS 8 kênh digital audio; (3) Mạng nhiều tủ (mỗi vài tầng 1 tủ): ES Net Peer-to-Peer; (4) Redundancy: Dual CPU programs; (5) BACnet interface HVAC/thang máy; (6) Mass Notification: UL 2572. Chỉ 4100ES đáp ứng đủ. Chia thành 5-10 tủ ghép mạng, mỗi tủ giám sát 10-20 tầng.'},
{brand:'SIMPLEX',cat:'SystemKnowledge',q:'Tòa nhà 5 tầng, 200 detector — chọn tủ nào?',options:['2004FS (chỉ conventional)','2050FS (50 điểm)','2250FS (250 điểm MX) hoặc 4008 (200 IDNet)','4100ES quá lớn'],correct:2,explain:'200 detector: 2004FS (conventional 4 IDC/80 detector) không đủ; 2050FS (50 điểm MX) không đủ. Đáp án đúng: (1) 2250FS Foundation Series MX 250 điểm — chi phí thấp, dễ dùng, DACT tích hợp, phù hợp entry-level; hoặc (2) 4008 TrueAlarm 200 điểm IDNet — nhiều tính năng hơn (TrueAlarm analog, SmartSync), phù hợp khách hàng cần tin cậy cao. Không dùng 4100ES vì quá dư (3000 điểm).'},
{brand:'SIMPLEX',cat:'SystemKnowledge',q:'IDNAC — số thiết bị/mạch giới hạn bởi gì?',options:['Chỉ điện áp','63 thiết bị active/mạch, tổng trở dây max 26 Ω — vượt là sụt áp cao, còi/đèn không đủ dòng','Chỉ số địa chỉ','Không giới hạn'],correct:1,explain:'IDNAC 1 mạch giới hạn 63 thiết bị active và tổng trở dây max 26 Ω. Khi thiết kế: (1) Tính tổng trở dây (dài × điện trở/km × 2 chiều); (2) Tính tổng dòng ở alarm mode (n × dòng/thiết bị); (3) Kiểm tra sụt áp cuối mạch còn ≥17V (thiết bị 49AV/49VO cần 17-31V). Vượt giới hạn → phải chia thêm mạch NAC/IDNAC. Dùng phần mềm định nghĩa Simplex tính toán chính xác.'},
{brand:'SIMPLEX',cat:'SystemKnowledge',q:'Dây twisted pair (TWP) bắt buộc trên IDNAC vì:',options:['Đẹp','Chống nhiễu điện từ cho tín hiệu 29V + dữ liệu — dây parallel không đáp ứng','Rẻ','Chuẩn'],correct:1,explain:'IDNAC truyền cả nguồn 29V và tín hiệu điều khiển từng thiết bị. Dây twisted pair (xoắn đôi) có 2 dây xoắn nhau, khử nhiễu điện từ tốt hơn parallel dây thẳng — bởi 2 dây gần nhau thì nhiễu bên ngoài tác động lên cả 2 gần bằng nhau, khi trừ đi thì triệt tiêu (common-mode rejection). Dây đơn parallel dễ nhận nhiễu → mất tín hiệu điều khiển. Bắt buộc trong tài liệu Simplex, không được thay thế.'},
{brand:'SIMPLEX',cat:'SystemKnowledge',q:'T-Tap trên IDNAC được phép ở Class nào?',options:['Class A','Class B chỉ; Class A bắt buộc in/out (không T-Tap)','Cả 2','Không cho'],correct:1,explain:'Trên IDNAC SLC: T-Tap CHỈ được phép ở Class B (open loop, có isolator). Class A yêu cầu dây in/out từ tủ đi qua tất cả thiết bị rồi về tủ (closed ring) — KHÔNG được rẽ nhánh T-tap vì làm mất tính redundant khi đứt cáp. Tương tự trên IDNet2. Nắm rõ để thiết kế đi dây đúng: Class A tuy tốn dây nhưng chống đứt cáp; Class B với T-Tap tiết kiệm dây.'},
{brand:'SIMPLEX',cat:'SystemKnowledge',q:'Dòng 49AV, 49VO, 49AO — 3 dòng khác nhau chỗ nào?',options:['Chỉ màu','49AV: A/V (còi+đèn) indoor; 49VO: chỉ strobe indoor; 49AO: A/V outdoor NEMA 3R (weatherproof)','Cùng loại','Chỉ candela'],correct:1,explain:'3 dòng TrueAlert ES trên IDNAC: 49AV — Indoor Audio/Visual (còi + đèn kết hợp, dùng trong nhà); 49VO — Indoor Visual Only (chỉ đèn strobe, cho khu vực không cần âm thanh như thư viện); 49AO — Outdoor A/V NEMA 3R (chống mưa, dùng ngoài trời hoặc độ ẩm mở rộng, yêu cầu weatherproof mounting box 49WPBB). Cả 3 đều có địa chỉ, giám sát đến tận thiết bị, 6 mức candela.'},
{brand:'SIMPLEX',cat:'SystemKnowledge',q:'IAM (Individual Addressable Module) trên IDNet dùng để làm gì?',options:['Chỉ đầu vào','Module địa chỉ giao tiếp thiết bị bên ngoài (tiếp điểm khô, relay) — mở rộng khả năng cho các thiết bị không phải fire alarm','Cách ly','Sounder'],correct:1,explain:'IAM (Individual Addressable Module) là "adapter" giữa hệ IDNet và thiết bị bên ngoài không thuộc fire alarm: công tắc dòng chảy, công tắc áp suất, van tín hiệu, quạt, cửa. Mỗi IAM chiếm 1 địa chỉ IDNet. Các loại chính: 4090-9001 (supervised input NO), 4090-9002 (relay Form C), 4090-9008 (dual relay 2 địa chỉ 1 module), 4090-9010 (8A high-power relay), 4090-9007 (Signal IAM cho selective NAC), 4090-9118 (relay + T-Sense).'},
{brand:'SIMPLEX',cat:'SystemKnowledge',q:'T-Sense trên IDNet phân biệt 4 trạng thái là gì?',options:['Chỉ on/off','Bình thường / Hở mạch / Ngắn mạch / Dòng giới hạn — 1 điểm giám sát đồng thời tamper + waterflow','Chỉ tương tự','4 mức nhạy'],correct:1,explain:'T-Sense (chỉ có trên IDNet, không có MAPNET II) là chế độ giám sát 4 trạng thái trên 1 đầu vào: (1) Bình thường; (2) Hở mạch — dây đứt; (3) Ngắn mạch — dây chập; (4) Dòng giới hạn — điện trở khác thường. Ứng dụng: 1 module 4090-9118 vừa giám sát công tắc dòng chảy (waterflow — trạng thái 4) vừa giám sát tamper switch trên van (trạng thái 2/3) — tiết kiệm địa chỉ SLC. Cấu hình điện trở EOL đúng cho 4 trạng thái.'},
{brand:'SIMPLEX',cat:'SystemKnowledge',q:'Isolator2 base (4098-9767) khác Isolator base thường?',options:['Chỉ giá','Isolator2 chỉ dùng cho IDNet2 (4007ES/4010ES/4100ES); phục hồi ngắn mạch nhanh hơn','Cùng chức năng','Cùng cấp'],correct:1,explain:'Isolator2 Base 4098-9767 là thế hệ mới của isolator base — CHỈ tương thích panel IDNet2 (4007ES, 4010ES, 4100ES với IDNet2). Ưu điểm: (1) Phục hồi ngắn mạch nhanh hơn (~ms so với vài giây của Isolator1); (2) Ít gián đoạn hệ thống hơn khi có sự cố; (3) Tự động chuyển đổi cấu hình theo tủ. Nếu tủ chỉ có IDNet đời cũ, phải dùng Isolator base 4098-9766 (Isolator1) — không nhầm.'},
{brand:'SIMPLEX',cat:'SystemKnowledge',q:'SmartSync trên NAC làm gì?',options:['Chỉ đồng bộ','Điều khiển horn + strobe trên cùng 1 mạch 2 dây (thay vì 4 dây tách riêng) + đồng bộ đa thiết bị','Kết nối cloud','Backup'],correct:1,explain:'SmartSync là công nghệ Simplex cho phép điều khiển đồng thời horn (còi) và strobe (đèn) trên CÙNG 1 MẠCH 2 DÂY (thay vì 4 dây tách riêng như dòng 4903 truyền thống). Ưu điểm: (1) Giảm 50% dây và conduit; (2) Đồng bộ tự động horn on/off riêng biệt với strobe on (still until reset); (3) Đồng bộ nhiều thiết bị chớp cùng lúc — tránh photosensitive seizure. Cần SmartSync module 4905-9938 hoặc tủ có SmartSync tích hợp (4007ES, 4010).'},
{brand:'SIMPLEX',cat:'SystemKnowledge',q:'⚠ Bẫy phổ biến khi lắp còi 4901-9820 SmartSync:',options:['Không có','SW1=ON (SmartSync) mà thiếu sync module → còi KHÔNG KÊU dù có báo cháy','Đấu ngược','Dây nhỏ'],correct:1,explain:'⚠ Còi 4901-9820 có 2 chế độ: SW1=OFF (Free-Run — mặc định) hoặc SW1=ON (SmartSync). Khi SW1=ON mà KHÔNG kết nối SmartSync module (4905-9938), 4010 FACP, hoặc 4009 IDNet NAC Extender → còi SẼ KHÔNG KÊU dù có báo cháy thật. Đây là lỗi phổ biến khi kỹ thuật viên chuyển SW1 ngẫu nhiên. Kiểm tra: mặc định OFF, chỉ chuyển ON khi tủ có SmartSync source.'},
{brand:'SIMPLEX',cat:'SystemKnowledge',q:'Foundation Series 2050FS/2250FS retrofit-friendly nghĩa là:',options:['Rẻ','3 phương án địa chỉ (DIP/Soft/QR code) + tương thích đa thiết bị → dễ nâng cấp từ conventional lên addressable','Chỉ mới','Nhanh'],correct:1,explain:'Foundation Series thiết kế cho retrofit (nâng cấp hệ thống cũ): (1) 3 phương án địa chỉ hóa (DIP switch — cách cũ, Soft addressing — qua phần mềm, QR code — quét mã); (2) MX loop dùng dây có sẵn của hệ thống cũ (không cần thay dây); (3) DACT tích hợp + IP + Cellular — dùng đường truyền có sẵn; (4) Danh mục thiết bị đa dạng (smoke UL268 7th Ed, sounder base, duct, IAM, ZAM). Khách hàng nâng cấp từ conventional tiết kiệm 40-60% chi phí so với thay hoàn toàn.'},
{brand:'SIMPLEX',cat:'SystemKnowledge',q:'Tủ Simplex nào backward compatible với MAPNET II?',options:['Chỉ 4020 cũ','4020, 4100, 4100ES (dòng lớn) — bảo toàn đầu tư thiết bị MAPNET II cũ','Tất cả tủ','Không có'],correct:1,explain:'Backward compatibility với MAPNET II (giao thức addressable đời cũ): 4020 Enhanced Capacity — sinh ra với MAPNET II; 4100/4100U — vừa hỗ trợ MAPNET II vừa IDNet; 4100ES (mới nhất) — vẫn backward compatible với MAPNET II để bảo toàn đầu tư khách hàng cũ khi nâng cấp tủ. Ngược lại, 4007ES/4008/4010ES/4017ES chỉ dùng IDNet/IDNet2 — không hỗ trợ MAPNET II.'},
{brand:'SIMPLEX',cat:'SystemKnowledge',q:'UL 1076 (Security) tích hợp trong FACP 4020/4100ES nghĩa là:',options:['2 tủ','1 tủ vừa báo cháy (UL 864) vừa báo an ninh (UL 1076) — chung SLC, tiết kiệm chi phí','Chỉ security','Backup'],correct:1,explain:'2 chuẩn UL trong 1 tủ: UL 864 (fire alarm — báo cháy) và UL 1076 (proprietary alarm system — báo động an ninh). Tủ 4020 và 4100ES đạt cả 2. Điểm mạnh: dùng chung SLC IDNet, 1 hệ thống dây cho cả fire và security, module 4090-9121 Security Monitor IAM giám sát cửa/motion/contact sensor. Ưu điểm: giảm 30-40% chi phí hệ thống + 1 giao diện quản lý duy nhất. BOSCH và GST-UL không có tủ 2-in-1 UL864+UL1076 tương tự.'},
{brand:'SIMPLEX',cat:'SystemKnowledge',q:'ES trong tên các tủ (4007ES, 4010ES, 4100ES) là viết tắt của:',options:['Ethernet Standard','Enhanced System — thế hệ mới với ES Net, IDNet2, ESS power supply, ES Touch Screen','European Standard','Emergency Signal'],correct:1,explain:'"ES" trong tên tủ SIMPLEX (4007ES, 4010ES, 4017ES, 4100ES) là viết tắt Enhanced System — thế hệ mới nhất với các đặc trưng: (1) ES Net Peer-to-Peer network; (2) IDNet2 với short circuit isolation dual loop; (3) IDNAC SLC 29V ổn định; (4) ESS (Enhanced System Supply) power supply; (5) ES Touch Screen 4.3" cảm ứng; (6) Dual language Unicode. Các tủ không có ES (4008, 4020, 4100) là thế hệ cũ dùng IDNet/MAPNET II thường.'},
{brand:'SIMPLEX',cat:'SystemKnowledge',q:'Amplifier 50W trên 4017ES đủ phủ bao nhiêu loa?',options:['5 loa','~50 loa 1W hoặc ~25 loa 2W — chọn điện áp loa 25V hoặc 70.7V rms qua phần mềm','200 loa','1000 loa'],correct:1,explain:'Amplifier 50W của 4017ES phủ được tổng công suất 50W trên hệ thống loa 25V hoặc 70.7V rms (chọn qua phần mềm, không cần thay phần cứng). Ví dụ: 50 loa 1W hoặc 25 loa 2W hoặc 5 loa 10W. Cho tòa nhà lớn hơn: thêm 1 amp mở rộng thành tổng 100W hoặc dùng làm backup amplifier. Rất linh hoạt cho retrofit — chọn điện áp loa theo hệ thống có sẵn.'}
);

// ============ SIMPLEX - DETECTORS ============
QUESTIONS.push(
{brand:'SIMPLEX',cat:'Detectors',q:'4098-5601 là đầu báo:',options:['Địa chỉ IDNet','TrueAlarm Photoelectric conventional 2-Wire','MAPNET II','Beam'],correct:1,explain:'Đầu báo khói 4098-5601 và 4098-5603 là TrueAlarm Photoelectric Smoke Detector conventional cho mạch IDC thông thường — 2-Wire (5601) và 4-Wire (5603). Có bù trôi độ nhạy tự động, kiểm tra bằng nam châm.'},
{brand:'SIMPLEX',cat:'Detectors',q:'Độ nhạy chuẩn của 4098-5601:',options:['1.5 %/ft','2.8 %/ft','3.5 %/ft','5 %/ft'],correct:1,explain:'Đầu báo khói 4098-5601 (bản chuẩn) có độ nhạy danh định 2.8 %/ft obscuration. Bản đặc biệt 4098-9605 nhạy hơn (3.5 %/ft) — dùng cho ứng dụng cần phát hiện khói loãng như bảo tàng, di tích.'},
{brand:'SIMPLEX',cat:'Detectors',q:'Kiểm tra chức năng 4098-5601 bằng:',options:['Phần mềm','Kích từ tính (magnetic test)','Nút bấm','Reset panel'],correct:1,explain:'Đầu báo khói 4098-5601 kiểm tra chức năng bằng kích từ tính (magnetic test) — dùng nam châm áp vào vỏ để giả lập báo động và kiểm tra hoạt động. Nhân viên bảo trì không cần leo thang chạm trực tiếp vào detector.'},
{brand:'SIMPLEX',cat:'Detectors',q:'4098-9714 là:',options:['Conventional','TrueAlarm Analog Photoelectric IDNet/MAPNET II','2-Wire','Duct'],correct:1,explain:'Đầu báo khói 4098-9714 là TrueAlarm Analog Sensor cho giao tiếp IDNet hoặc MAPNET II. Truyền dữ liệu analog thực (không chỉ tín hiệu on/off) — tủ tự tính ngưỡng trung bình động để bù môi trường. Đây là thế hệ cũ hơn 4098-9733.'},
{brand:'SIMPLEX',cat:'Detectors',q:'Chu kỳ truyền của cảm biến TrueAlarm 4098-9714:',options:['Mỗi giây','Mỗi 4 giây / sensor','Mỗi 30 giây','Mỗi phút'],correct:1,explain:'Đầu báo TrueAlarm 4098-9714 truyền giá trị đo thực tế mỗi 4 giây/sensor về tủ. Tủ phân tích lịch sử dữ liệu để tính ngưỡng động, bù trôi, phát hiện Dirty/Almost Dirty. Đây là ưu điểm của Analog Addressable so với on/off.'},
{brand:'SIMPLEX',cat:'Detectors',q:'Số mức độ nhạy khói quang của TrueAlarm Analog:',options:['3','5','7 mức (0.2-3.7 %/ft)','10'],correct:2,explain:'Đầu báo khói TrueAlarm Analog (4098-9714/9733) có 7 mức độ nhạy quang từ 0.2% đến 3.7%/ft — mềm dẻo hơn hẳn conventional. Bản ion hóa chỉ có 3 mức (0.5, 0.9, 1.3 %/ft). Lập trình từ tủ, có thể chỉnh theo giờ (ban đêm nhạy hơn).'},
{brand:'SIMPLEX',cat:'Detectors',q:'4098-9714 có tương thích 4007ES không?',options:['Có','Không - phải dùng 4098-9733','Chỉ với module đặc biệt','Chỉ Class A'],correct:1,explain:'Đầu báo cũ 4098-9714 KHÔNG tương thích với tủ 4007ES. Nếu dự án dùng 4007ES phải chọn 4098-9733 (thế hệ mới). Đây là bẫy hay gặp khi retrofit — kiểm tra tương thích tủ/detector trước khi mua.'},
{brand:'SIMPLEX',cat:'Detectors',q:'4098-9733 khác 4098-9714:',options:['Ít mức nhạy hơn','Thêm ngưỡng 190°F & tương thích 4007ES','Không phải TrueAlarm','MAPNET only'],correct:1,explain:'Đầu báo TrueAlarm 4098-9733 (thế hệ mới) khác 4098-9714 ở: (1) thêm ngưỡng nhiệt 190°F (88°C) cho môi trường nóng (bếp công nghiệp), (2) tương thích cả 4007ES. Còn 4098-9714 chỉ có 135°F/155°F.'},
{brand:'SIMPLEX',cat:'Detectors',q:'Địa chỉ TrueAlarm được lưu ở đâu?',options:['Trong sensor','Ở base (thay sensor không cần lập trình lại)','Trong panel','DIP switch'],correct:1,explain:'Với dòng TrueAlarm SIMPLEX, địa chỉ được lưu ở base (đế detector), KHÔNG phải sensor. Ưu điểm: khi tháo sensor để bảo dưỡng, địa chỉ vẫn giữ nguyên. Thậm chí thay sensor loại khác (đổi từ khói sang nhiệt) cũng không phải lập trình lại panel.'},
{brand:'SIMPLEX',cat:'Detectors',q:'4098-9733E là:',options:['Bản Ethernet','E-Series đóng gói epoxy chịu ẩm cao','Explosion-proof','Extended range'],correct:1,explain:'Đầu báo 4098-9733E (hậu tố "E") là E-Series — đóng gói epoxy, tiếp điểm mạ vàng, vít inox, thermistor chịu ẩm cao. Thiết kế cho môi trường độ ẩm cao kéo dài: gara ô tô, kho lạnh, tầng hầm ẩm. Base E-Series cũng có cùng thiết kế.'},
{brand:'SIMPLEX',cat:'Detectors',q:'4098-9754 dùng công nghệ:',options:['MWMA','TrueSense (tương quan khói + nhiệt)','ISP','MAPNET'],correct:1,explain:'Đầu báo đa cảm biến 4098-9754 (TrueAlarm Multi-Sensor) dùng công nghệ TrueSense — phân tích tương quan khói và nhiệt đồng thời. Phát hiện đám cháy ngọn lửa hot-flaming (nhiệt cao, khói ít) sớm hơn từng cảm biến riêng lẻ.'},
{brand:'SIMPLEX',cat:'Detectors',q:'4098-9754 báo cáo dữ liệu qua:',options:['1 địa chỉ','Dual-point reporting qua 1 IDNet address','2 địa chỉ liên tiếp','Không có địa chỉ'],correct:1,explain:'Đầu báo 4098-9754 có dual-point reporting — báo cáo dữ liệu khói và nhiệt riêng biệt qua CÙNG 1 địa chỉ IDNet duy nhất. Ưu điểm: tủ phân biệt được đám cháy loại nào (âm ỉ hay bùng phát) mà chỉ tốn 1 slot địa chỉ.'},
{brand:'SIMPLEX',cat:'Detectors',q:'4098-9794 là:',options:['Sensor thường','TrueAlarm Sounder Base (còi tích hợp)','Isolator base','Beam'],correct:1,explain:'Đế còi 4098-9794 là TrueAlarm Sounder Base — kết hợp base cho detector analog + còi piezoelectric 88 dBA trong 1 đơn vị. Tiết kiệm chi phí và không gian: 1 vị trí lắp có cả detector và còi.'},
{brand:'SIMPLEX',cat:'Detectors',q:'Dòng tiêu thụ còi của 4098-9794 sounder base:',options:['5 mA','20 mA','50 mA','100 mA'],correct:1,explain:'Đế còi 4098-9794 có còi piezoelectric tiêu thụ chỉ 20 mA — rất hiệu quả điện năng. Dùng 24 VDC hoặc từ mạch NAC. Cho phép nhiều sounder base trên cùng loop mà không quá tải.'},
{brand:'SIMPLEX',cat:'Detectors',q:'4098-XAD là:',options:['Beam','Duct Detector (hút khí)','Sounder','Beacon'],correct:1,explain:'Đầu báo ống gió 4098-XAD là Air Aspiration Duct Smoke Detection — hút khí chủ động từ ống gió HVAC. Có 2 phiên bản: XAD-110 (1 đầu vào/1 sensor) và XAD-210 (2 đầu vào/2 sensor). Sensor TrueAlarm đặt riêng.'},
{brand:'SIMPLEX',cat:'Detectors',q:'Chiều dài ống cứng tối đa của 4098-XAD:',options:['10 m','25 m (82 ft)','50 m','100 m'],correct:1,explain:'Đầu báo ống gió 4098-XAD dùng ống cứng tối đa 25 m (82 ft) với đường kính Ø26.7 mm. Nếu dùng ống mềm Ø19 mm chỉ được 15 m (50 ft). Ống dài hơn thì tốc độ khí không đủ để đưa mẫu qua sensor.'},
{brand:'SIMPLEX',cat:'Detectors',q:'4098-XAD yêu cầu nguồn:',options:['Từ IDNet','24 VDC riêng biệt bắt buộc','Từ NAC','12 VDC'],correct:1,explain:'Đầu báo hút khí 4098-XAD BẮT BUỘC phải có nguồn 24 VDC riêng biệt — không chạy từ IDNet/MAPNET II. Lý do: quạt hút chủ động tiêu thụ dòng cao. Khi thiết kế phải chuẩn bị nguồn phụ giám sát.'},
{brand:'SIMPLEX',cat:'Detectors',q:'Cảnh báo bẩn tự động của TrueAlarm bao gồm:',options:['Dirty / Clean','Dirty / Almost Dirty / Excessively Dirty','1 mức','5 mức'],correct:1,explain:'Dòng đầu báo TrueAlarm SIMPLEX có 3 cấp cảnh báo bẩn tự động: Dirty (bẩn nhẹ, cần lịch bảo trì), Almost Dirty (gần đến ngưỡng), Excessively Dirty (bẩn nghiêm trọng, cần thay/vệ sinh gấp). Đây là tính năng predictive maintenance rất mạnh.'},
{brand:'SIMPLEX',cat:'Detectors',q:'Base isolator 4098-9767 dùng cho:',options:['IDNet thường','IDNet2 only','MAPNET II','Conventional'],correct:1,explain:'Đế cách ly Isolator2 Base 4098-9767 CHỈ dùng với tủ hỗ trợ IDNet2 (4007ES, 4010ES, 4100ES với IDNet2). Isolator2 phục hồi ngắn mạch nhanh hơn Isolator thường — thế hệ mới. Chú ý khi mua base cho tủ cũ IDNet thường phải chọn 4098-9766.'},

// ============ SIMPLEX - MODULES ============
{brand:'SIMPLEX',cat:'Modules',q:'4090-9001 là:',options:['Relay IAM','Supervised IAM (Individual Addressable Module)','Isolator','Zone Monitor'],correct:1,explain:'Module đầu vào 4090-9001 là Supervised IAM (Individual Addressable Module) — giám sát tiếp điểm khô N.O., truyền thông IDNet hoặc MAPNET II. Cấp cả nguồn và dữ liệu qua 1 đôi dây. Vỏ nhựa nhiệt dẻo đen, có LED nhấp nháy chỉ thị truyền thông.'},
{brand:'SIMPLEX',cat:'Modules',q:'4090-9051 khác 4090-9001:',options:['Có LED','Đóng gói epoxy, dây dẫn thay vì cọc vít','Class A','Không phân cực'],correct:1,explain:'Module 4090-9051 là bản đóng gói epoxy (kín, chịu ẩm cao) với dây dẫn màu (dài 203 mm) thay vì cọc vít. Trong khi 4090-9001 có cọc vít. Nhược điểm: 9051 KHÔNG có LED nên không kiểm tra được trạng thái truyền thông trực quan.'},
{brand:'SIMPLEX',cat:'Modules',q:'Chế độ T-Sense của 4090-9001 (IDNet) có mấy trạng thái?',options:['2','3','4 (bình thường/hở/ngắn/dòng giới hạn)','8'],correct:2,explain:'Chế độ T-Sense (chỉ có trên IDNet, không có trên MAPNET II) của module 4090-9001 phân biệt 4 trạng thái: bình thường / hở mạch / ngắn mạch / dòng giới hạn. Cho phép 1 điểm giám sát đồng thời cả tamper và waterflow — tiết kiệm module.'},
{brand:'SIMPLEX',cat:'Modules',q:'Khoảng cách IAM đến tiếp điểm tối đa:',options:['100 ft','500 ft (152 m); 400 ft nếu có 2081-9044','1000 ft','2500 ft'],correct:1,explain:'Module IAM (4090-9001/9051) đến tiếp điểm khô tối đa 500 ft (152 m) không bảo vệ; giảm còn 400 ft (122 m) khi dùng bộ bảo vệ quá áp 2081-9044 (dùng ngoài trời/nhiễu điện).'},
{brand:'SIMPLEX',cat:'Modules',q:'Tổng chiều dài dây IDNet/MAPNET II tối đa:',options:['3000 ft','5000 ft','10.000 ft (3.048 m)','20.000 ft'],correct:2,explain:'Tổng chiều dài dây trên 1 vòng IDNet/MAPNET II tối đa 10.000 ft (3.048 m) — tính CẢ T-Tap. Cần tính toán kỹ khi thiết kế loop rộng, tránh vượt giới hạn gây suy hao tín hiệu.'},
{brand:'SIMPLEX',cat:'Modules',q:'4090-9002 là:',options:['Input IAM','Relay IAM Form C','Zone Monitor','Isolator'],correct:1,explain:'Module 4090-9002 là Relay IAM — cung cấp 1 tiếp điểm relay Form C (1 NO + 1 NC). Relay latching tiêu thụ điện thấp, nguồn HOÀN TOÀN từ IDNet. Reset về OFF khi mất truyền thông (trạng thái an toàn fail-safe).'},
{brand:'SIMPLEX',cat:'Modules',q:'4090-9007 dùng để:',options:['Giám sát tiếp điểm','Selective signaling - điều khiển NAC theo địa chỉ IDNet','Cách ly','Relay 8A'],correct:1,explain:'Module 4090-9007 là Signal IAM — bổ sung tính năng selective signaling: điều khiển mạch thiết bị thông báo (NAC) theo địa chỉ IDNet. Cho phép kích hoạt còi/đèn của từng vùng riêng biệt chính xác. Đầu ra NAC được giám sát Class A/B.'},
{brand:'SIMPLEX',cat:'Modules',q:'⚠ Thiết bị A/V nào KHÔNG dùng với 4090-9007?',options:['4903-9425','SmartSync','4903-9433','4-wire A/V'],correct:1,explain:'⚠ Module 4090-9007 KHÔNG tương thích với thiết bị A/V SmartSync. Phải dùng loại 4 dây: 4903-9425, 9426, 9427, 9431, 9732, 9433. Đây là bẫy hay gặp khi thay thế — kiểm tra thiết bị A/V trước khi mua module.'},
{brand:'SIMPLEX',cat:'Modules',q:'4090-9008 có bao nhiêu tiếp điểm Form C?',options:['1','2 Form C độc lập','4','8'],correct:1,explain:'Module 4090-9008 (Dual Contact Relay IAM) có 2 tiếp điểm Form C độc lập (mỗi cái tải 2A), nhưng chỉ dùng 1 địa chỉ SLC — tiết kiệm địa chỉ. Hỗ trợ cả IDNet và MAPNET II.'},
{brand:'SIMPLEX',cat:'Modules',q:'4090-9010 có tải relay:',options:['1 A','2 A','5 A','8 A (High Amp Relay IAM)'],correct:3,explain:'Module 4090-9010 là 8 Amp Relay IAM — công suất cao (8A), phù hợp điều khiển quạt tăng áp, van motor, bơm chữa cháy nhỏ, chuông công suất lớn. Có Form A (NO) + Form B (NC). Nguồn hoàn toàn từ IDNet, không cần nguồn phụ.'},
{brand:'SIMPLEX',cat:'Modules',q:'4090-9116 là:',options:['Relay 8A','IDNet Addressable Isolator','Zone Monitor','Signal IAM'],correct:1,explain:'Module 4090-9116 là IDNet Addressable Isolator — cô lập tự động đoạn ngắn mạch trên vòng SLC IDNet. Địa chỉ tham chiếu (không chiếm dụng slot địa chỉ SLC thông thường). Tự phục hồi khi khắc phục sự cố.'},
{brand:'SIMPLEX',cat:'Modules',q:'Isolator đầu/cuối vòng phải cách FACU không quá:',options:['1 m','3 m','6 m (20 ft) close-nippled','30 m'],correct:2,explain:'Isolator đầu và cuối vòng SLC PHẢI lắp close-nippled trong ống dẫn, trong vòng 6 m (20 ft) của FACU — bắt buộc theo thiết kế. Ngoại lệ: FACU có module 4100-3107 IDNet+ hoặc IDNet cách ly điện thì không cần.'},
{brand:'SIMPLEX',cat:'Modules',q:'4090-9118 là:',options:['Chỉ relay','Relay + T-Sense Input (dual-point 1 địa chỉ)','Isolator','Security'],correct:1,explain:'Module 4090-9118 (Relay IAM with T-Sense Input) kết hợp 1 đầu ra relay + 1 đầu vào T-Sense đa trạng thái, dùng chỉ 1 địa chỉ IDNet/MAPNET II. Ứng dụng điển hình: điều khiển van gió (damper) + giám sát 2 trạng thái vị trí van (mở/đóng).'},
{brand:'SIMPLEX',cat:'Modules',q:'Phân biệt 4090-9118 và 4090-9119:',options:['9118 là input, 9119 là output','9118 T-Sense (supervised), 9119 unsupervised feedback','Cùng chức năng','9118 địa chỉ đơn'],correct:1,explain:'Phân biệt: 4090-9118 có T-Sense supervised (giám sát hở/ngắn mạch dây phản hồi) trong khi 4090-9119 chỉ có unsupervised feedback (không giám sát dây). Chọn 9118 khi yêu cầu giám sát chặt chẽ, chọn 9119 khi ứng dụng đơn giản.'},
{brand:'SIMPLEX',cat:'Modules',q:'4090-9120 là:',options:['1 điểm I/O','2 điểm','6 điểm I/O cấu hình được','16 điểm'],correct:2,explain:'Module 4090-9120 là 6-Point I/O Module — 6 điểm I/O linh hoạt (vào hoặc ra) trong 1 module IDNet. Cấu hình mỗi điểm theo yêu cầu qua lập trình panel. Tiết kiệm không gian và giảm số thiết bị cho ứng dụng nhiều điểm.'},
{brand:'SIMPLEX',cat:'Modules',q:'4090-9121 là:',options:['Fire Monitor','Security Monitor IAM','Sounder','Isolator'],correct:1,explain:'Module 4090-9121 là Security Monitor IAM — tích hợp giám sát an ninh (cửa, cửa sổ, motion detector, contact sensor) vào hệ thống báo cháy SIMPLEX qua IDNet. Kết hợp với tủ có UL 1076 (4020, 4100ES) tạo hệ thống báo cháy + an ninh trong 1.'},
{brand:'SIMPLEX',cat:'Modules',q:'Trạng thái mặc định của Relay IAM (4090-9002) khi mất IDNet:',options:['ON','OFF','Giữ nguyên','Nhấp nháy'],correct:1,explain:'Module Relay IAM 4090-9002 tự động reset về OFF khi mất nguồn IDNet — trạng thái an toàn fail-safe. Nghĩa là: nếu tủ hỏng hoặc dây đứt, tất cả thiết bị điều khiển bởi module này sẽ về trạng thái không hoạt động (an toàn).'},

// ============ SIMPLEX - ALARM DEVICES ============
{brand:'SIMPLEX',cat:'AlarmDevices',q:'Dòng 4099 là:',options:['Còi','Nút ấn báo cháy địa chỉ (Manual Station)','Đầu báo','Module'],correct:1,explain:'Dòng 4099 là Addressable Manual Stations — nút ấn báo cháy khẩn có địa chỉ, truyền thông IDNet hoặc MAPNET II. Có IAM tích hợp giám sát và báo trạng thái liên tục về panel. Reset bằng chìa khóa dùng chung với tủ Simplex.'},
{brand:'SIMPLEX',cat:'AlarmDevices',q:'4099-9001 là:',options:['Single action tiếng Anh','Double breakglass','Push','NO GRIP'],correct:0,explain:'Nút ấn 4099-9001 là Single action, tiếng Anh "FIRE ALARM PULL DOWN". Đạt UL, ULC, FM, CSFM, MEA — chấp nhận toàn thị trường Bắc Mỹ. Chỉ cần kéo cần 1 thao tác để kích hoạt.'},
{brand:'SIMPLEX',cat:'AlarmDevices',q:'4099-9002 là kiểu:',options:['Single action','Double action Breakglass','Push','NO GRIP'],correct:1,explain:'Nút ấn 4099-9002 là Double action Breakglass — cần 2 thao tác: đập vỡ kính trước rồi mới kéo cần. Chống kích hoạt vô tình, phù hợp khu vực có nguy cơ vandalism hoặc trẻ em có thể tiếp cận.'},
{brand:'SIMPLEX',cat:'AlarmDevices',q:'4099-9020 NO GRIP đáp ứng chuẩn:',options:['UL 268','California Title 24 ADA','NFPA 72','EN 54-11'],correct:1,explain:'Nút ấn 4099-9020 NO GRIP đáp ứng California Title 24 ADA (Americans with Disabilities Act) — cho phép kéo 1 tay, không cần kẹp hoặc xoay cổ tay. Bắt buộc cho các dự án ở California yêu cầu ADA compliance.'},
{brand:'SIMPLEX',cat:'AlarmDevices',q:'4901-9820 là:',options:['Địa chỉ IDNAC','TrueAlert Non-Addressable Horn','Strobe','Sounder base'],correct:1,explain:'Còi 4901-9820 là TrueAlert Non-Addressable Horn — chuông thông báo không địa chỉ lắp tường, vận hành theo mạch NAC đảo cực (reverse polarity). Có 2 chế độ chọn qua DIP switch: Free-Run và SmartSync.'},
{brand:'SIMPLEX',cat:'AlarmDevices',q:'Chế độ Free-Run của 4901-9820 khi SW1:',options:['SW1=OFF','SW1=ON','Bất kỳ','Không có Free-Run'],correct:0,explain:'Còi 4901-9820: SW1=OFF là Free-Run (mặc định xuất xưởng) — kêu liên tục khi NAC ở alarm. SW1=ON là SmartSync — nhận lệnh đồng bộ (Turn-ON/OFF, March Time, Temporal) từ NAC SmartSync.'},
{brand:'SIMPLEX',cat:'AlarmDevices',q:'⚠ Khi SW1=ON (SmartSync) mà không có sync module thì horn:',options:['Kêu liên tục','SẼ KHÔNG KÊU','Kêu nhỏ hơn','Kêu ngắt quãng'],correct:1,explain:'⚠ CẢNH BÁO QUAN TRỌNG: Với còi 4901-9820 ở chế độ SmartSync (SW1=ON), nếu KHÔNG kết nối SmartSync module (4905-9938), 4010 FACP hoặc 4009 IDNet NAC Extender thì horn SẼ KHÔNG KÊU — kể cả có báo cháy thật. Đây là lỗi cấu hình phổ biến khi lắp đặt.'},
{brand:'SIMPLEX',cat:'AlarmDevices',q:'Dòng 4903 là:',options:['Chỉ còi','TrueAlert 4-Wire A/V (chuông + đèn)','Chỉ đèn','MCP'],correct:1,explain:'Dòng 4903 là TrueAlert Non-Addressable A/V (Audio/Visual) — 4-Wire: NAC1 (terminals 1-2) điều khiển strobe, NAC2 (terminals 3-4) điều khiển horn. Cho phép bật/tắt riêng biệt còi và đèn theo lập trình tủ.'},
{brand:'SIMPLEX',cat:'AlarmDevices',q:'Dòng 4904 là:',options:['A/V','Chỉ strobe (đèn)','Chỉ horn','Sounder base'],correct:1,explain:'Dòng 4904 là TrueAlert Non-Addressable Strobe — CHỈ đèn chớp, không có còi. Kết nối 2-Wire NAC ở chế độ Free-Run: nháy tối thiểu 1 Hz, không cần sync module. Dùng khi khu vực chỉ cần tín hiệu quang.'},
{brand:'SIMPLEX',cat:'AlarmDevices',q:'Cường độ của 4903/4904 (mức nào):',options:['5,10,15','15, 75, 110 cd','30,60,90','20,40,60'],correct:1,explain:'Dòng còi/đèn 4903/4904 có 3 mức cường độ candela: 15 / 75 / 110 cd. Mỗi model cố định 1 mức — xác định rõ khi thiết kế và mua hàng, không đổi được sau lắp đặt (khác với dòng 4906 chọn được bằng jumper).'},
{brand:'SIMPLEX',cat:'AlarmDevices',q:'4906 chọn cường độ candela bằng:',options:['Phần mềm','Jumper cắm sau housing','DIP switch','Cố định'],correct:1,explain:'Dòng còi đèn 4906 (Multi-Candela High Intensity) chọn cường độ 135/177/185 cd bằng jumper cắm sau housing — ngay tại hiện trường. Giảm tồn kho nhiều model khác nhau. Sau khi chọn, cờ vàng chỉ thị mức đã chọn nhìn thấy qua cạnh lens.'},
{brand:'SIMPLEX',cat:'AlarmDevices',q:'Đèn strobe 4906 dùng loại đèn gì?',options:['LED','Xenon','Halogen','Neon'],correct:1,explain:'Strobe dòng 4906 dùng bóng Xenon flashtube (không phải LED). Xenon cho tia sáng cực mạnh, tức thời, phù hợp báo cháy cần chú ý ngay. Tuổi thọ ngắn hơn LED nhưng độ sáng cao hơn nhiều.'},
{brand:'SIMPLEX',cat:'AlarmDevices',q:'Sound damper 4905-9838 làm gì?',options:['Tăng âm 5dB','Giảm 5-6 dBA','Đồng bộ','Chuyển tone'],correct:1,explain:'Phụ kiện 4905-9838 là sound damper — giảm 5–6 dBA cho còi/đèn dòng 4906. Dùng ở cầu thang, phòng nhỏ, phòng nhiều phản âm để tránh còi quá to gây khó chịu. Sau khi lắp phải đo lại mức âm đảm bảo vẫn đáp ứng code.'},
{brand:'SIMPLEX',cat:'AlarmDevices',q:'Dòng 49AO là:',options:['Indoor A/V','TrueAlert ES Addressable Weatherproof (NEMA 3R)','Chỉ strobe','Sounder base'],correct:1,explain:'Dòng 49AO là TrueAlert ES Addressable Weatherproof A/V — chuẩn NEMA 3R chống mưa, dùng cho ngoài trời và môi trường độ ẩm mở rộng. Yêu cầu weatherproof mounting box chuyên dụng 49WPBB. Chỉ có ULC Listed (không UL).'},
{brand:'SIMPLEX',cat:'AlarmDevices',q:'49AO/49AV dùng SLC nào?',options:['IDNet','IDNAC SLC (2-Wire)','MAPNET II','MX'],correct:1,explain:'Dòng TrueAlert ES (49AO/49AV/49VO) dùng IDNAC SLC 2-Wire — điện áp 29 VDC ổn định kể cả khi tủ dùng pin. Ưu điểm: dây xa hơn 2–3 lần so với NAC thường, giám sát từng thiết bị đến tận appliance.'},
{brand:'SIMPLEX',cat:'AlarmDevices',q:'Dòng 49AV là:',options:['Weatherproof','TrueAlert ES Indoor A/V (địa chỉ)','Outdoor strobe','Voice'],correct:1,explain:'Dòng 49AV là TrueAlert ES Addressable Indoor A/V — còi + đèn có địa chỉ dùng trong nhà. Bản 49VO là chỉ Strobe. Cả 2 dòng dùng IDNAC SLC, có DIP switch 8-bit địa chỉ 1–127 truy cập từ mặt trước.'},
{brand:'SIMPLEX',cat:'AlarmDevices',q:'Số thiết bị TrueAlert ES tối đa / mạch IDNAC:',options:['32','63 (tổng trở dây max 26 Ω)','127','254'],correct:1,explain:'Còi đèn TrueAlert ES 49AV/49VO có tối đa 63 thiết bị active/mạch IDNAC; tổng trở dây max 26 Ω. Vượt quá số này phải chia thành nhiều mạch NAC. Class B cho phép T-Tap, Class A bắt buộc in/out.'},
{brand:'SIMPLEX',cat:'AlarmDevices',q:'DIP switch địa chỉ của 49AV có bao nhiêu bit?',options:['4','6','8 (1-127)','10'],correct:2,explain:'Còi đèn 49AV có DIP switch 8-bit gán địa chỉ 1–127, truy cập từ mặt trước (không cần tháo thiết bị). Cài địa chỉ trực tiếp tại hiện trường lúc lắp đặt, rất tiện.'},
{brand:'SIMPLEX',cat:'AlarmDevices',q:'Cường độ strobe 49AV có mấy mức:',options:['3','4','6 (15/30/75/110/135/185 cd)','8'],correct:2,explain:'Đèn strobe 49AV/49VO có 6 mức cường độ candela: 15/30/75/110/135/185 cd. Lập trình từ FACP hoặc chọn jumper tại thiết bị. Có cờ vàng chỉ thị mức đã chọn — dễ kiểm tra bằng mắt sau khi lắp.'},
{brand:'SIMPLEX',cat:'AlarmDevices',q:'T-Tap được phép trên IDNAC ở Class nào?',options:['A only','B only','A và B','Không cho phép'],correct:1,explain:'Trên IDNAC SLC, T-Tap CHỈ được phép ở Class B. Class A bắt buộc dây in/out (không T-Tap) để đảm bảo tính redundancy khi đứt cáp. Nắm rõ khi thiết kế mạch IDNAC.'},
{brand:'SIMPLEX',cat:'AlarmDevices',q:'Dây IDNAC bắt buộc loại nào?',options:['Dây đơn','Twisted pair (TWP)','Coaxial','Shielded only'],correct:1,explain:'Dây IDNAC SLC BẮT BUỘC là twisted pair (TWP) — dây xoắn đôi. Dây đơn (parallel) không đáp ứng yêu cầu IDNAC, sẽ có nhiễu và mất tín hiệu. Đây là yêu cầu kỹ thuật quan trọng của giao thức IDNAC.'},
);
