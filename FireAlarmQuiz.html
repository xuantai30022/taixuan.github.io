{brand:'GST-H',cat:'Detectors',q:'JTY-HM-GST102 là:',options:['Đầu báo khói tia tuyến tính (beam)','Đầu báo khói ống gió','Đầu báo nhiệt tuyến tính','Đầu báo phức hợp'],correct:0,explain:'JTY-HM-GST102 là đầu báo khói tia hồng ngoại tuyến tính (linear beam) — có 1 thân tích hợp phát và nhận, dùng gương phản chiếu (reflector) ở đầu kia. Bảo vệ không gian rộng và cao như kho, nhà thi đấu, nhà thờ. Lắp 1 phía tiết kiệm dây.'},
{brand:'GST-H',cat:'Detectors',q:'Chiều dài quang lộ của GST102:',options:['5-50 m','8-100 m','20-200 m','50-500 m'],correct:1,explain:'Đầu báo beam JTY-HM-GST102 có quang lộ 8–100 m (từ đầu báo đến gương phản chiếu). Diện tích bảo vệ tối đa 14 m × 100 m = 1.400 m² — chiều rộng tối đa 14 m mỗi bên trục beam.'},
{brand:'GST-H',cat:'Detectors',q:'GST102 khi bị che khuất quang lộ 30 giây sẽ:',options:['Ngắt hoạt động','Báo lỗi 30s → chuyển sang báo cháy','Reset','Không phản ứng'],correct:1,explain:'Đầu báo beam GST102 khi bị che khuất hoàn toàn quang lộ >30 giây sẽ báo lỗi 30 giây, sau đó CHUYỂN SANG BÁO CHÁY. Cơ chế "an toàn kép" này giả định che khuất kéo dài = có khói dày đặc. Khi sơn/sửa chữa chắn quang lộ phải đưa tủ về trạng thái test trước.'},
{brand:'GST-H',cat:'Detectors',q:'Cấp độ nhạy của GST102 có mấy mức?',options:['2','3 cấp','5','7'],correct:1,explain:'Đầu báo beam GST102 có 3 cấp độ nhạy chọn được — cấp 1 nhạy nhất (phát hiện khói loãng), cấp 3 ít nhạy nhất (dùng cho môi trường bụi bẩn). Chọn theo môi trường lắp đặt để tránh báo giả.'},

// ============ GST-H - MODULES ============
{brand:'GST-H',cat:'Modules',q:'GST-LD-8300B là module gì?',options:['Đầu vào (Input)','Điều khiển (Output)','Cách ly','Đầu vào/ra kép'],correct:0,explain:'Module đầu vào GST-LD-8300B (Input Module) thu tín hiệu tiếp điểm thường mở (NO) hoặc thường đóng (NC) từ thiết bị liên động PCCC: công tắc dòng chảy, công tắc áp suất, van tín hiệu… Vi xử lý ARM 32-bit, chịu nhiễu EMC tốt.'},
{brand:'GST-H',cat:'Modules',q:'Điện trở cuối tuyến cho GST-LD-8300B ở chế độ NC:',options:['3.9 kΩ','4.7 kΩ nối tiếp','4.7 kΩ song song','10 kΩ'],correct:1,explain:'Với module đầu vào GST-LD-8300B ở chế độ NC (常闭检线): lắp EOL 4.7 kΩ NỐI TIẾP đầu dây xa module. Còn chế độ NO (常开检线): 4.7 kΩ NỐI SONG SONG. Đặt sai loại/vị trí điện trở gây báo lỗi giám sát liên tục.'},
{brand:'GST-H',cat:'Modules',q:'GST-LD-8313 là module gì?',options:['Đầu vào','Điều khiển','Cách ly ngắn mạch (isolator)','I/O kép'],correct:2,explain:'Module cách ly GST-LD-8313 (Short-Circuit Isolator) bảo vệ tổng tuyến khỏi ngắn mạch. Khi có sự cố, module cô lập đoạn lỗi để phần còn lại của loop hoạt động bình thường. Sau khi khắc phục, cầu chì tự phục hồi (auto-reset) tái kết nối.'},
{brand:'GST-H',cat:'Modules',q:'Tải tối đa của GST-LD-8313 isolator:',options:['50 mA','100 mA','300 mA','500 mA'],correct:1,explain:'Module cách ly GST-LD-8313 có tải tối đa 100 mA. Khi thiết kế phải tính tổng dòng tiêu thụ của các thiết bị nằm sau module cách ly — nếu vượt 100 mA sẽ không hoạt động đúng.'},
{brand:'GST-H',cat:'Modules',q:'Đèn LED của GST-LD-8313 khi cách ly:',options:['LED đỏ nhấp nháy','LED vàng sáng liên tục','LED xanh sáng','Không sáng'],correct:1,explain:'Module cách ly GST-LD-8313 có LED VÀNG: bình thường không sáng, chỉ sáng liên tục khi có ngắn mạch và module đang cách ly. Dễ nhận biết vị trí sự cố khi kiểm tra hiện trường.'},
{brand:'GST-H',cat:'Modules',q:'GST-LD-8302C có tải đầu ra tối đa:',options:['1 A','2 A','5 A','10 A'],correct:2,explain:'Module chuyển mạch GST-LD-8302C (Switching Module) có relay đầu ra 5A/AC220V hoặc 5A/DC24V. Dùng cho bảng đa tuyến (multiline panel) để điều khiển thiết bị công suất vừa như bơm nhỏ, quạt. Có cách ly điện với bảng để bảo vệ tủ.'},
{brand:'GST-H',cat:'Modules',q:'GST-LD-8305 là module cho hệ thống gì?',options:['Chữa cháy khí','Bơm nước','PA (thông báo công cộng)','Van xả'],correct:2,explain:'Module GST-LD-8305 (Output Module / PA Switching) dùng cho hệ thống thông báo công cộng (PA): chuyển đổi giữa phát thanh bình thường và phát thanh cứu hỏa khi có báo cháy. Tự phản hồi trạng thái chuyển thành công về tủ.'},
{brand:'GST-H',cat:'Modules',q:'Điện trở cuối tuyến của GST-LD-8305:',options:['4.7 kΩ','10 kΩ','30 kΩ/1W song song','47 kΩ'],correct:2,explain:'Module PA GST-LD-8305 dùng điện trở EOL 30 kΩ/1W nối SONG SONG với loa cuối tuyến (xa module nhất). Khi nối vào PA thường phải nối tiếp thêm 2 tụ điện phân cực kép 250V-22μF giữa PA thường và module.'},
{brand:'GST-H',cat:'Modules',q:'Tải tối đa của GST-LD-8305 khi không có PA thường:',options:['50 W','100 W','180 W (60 loa)','250 W'],correct:2,explain:'Module PA GST-LD-8305 chịu tải tối đa 180 W/module khi không có PA thường — đủ cho 60 loa YXG3-3/YXJ3-4A (3W/loa). Nếu có PA thường thì chỉ chịu được 50 loa (~150W).'},
{brand:'GST-H',cat:'Modules',q:'GST-LD-8316-W có màu:',options:['Đen','Trắng','Đỏ','Vàng'],correct:1,explain:'Module vào/ra GST-LD-8316-W (Input/Output Module) có hậu tố "-W" nghĩa là màu trắng (white). Kết hợp 1 đầu vào giám sát + 1 relay đầu ra trên cùng 1 địa chỉ, tiết kiệm địa chỉ trên bus.'},
{brand:'GST-H',cat:'Modules',q:'GST-LD-8331 chiếm bao nhiêu địa chỉ?',options:['1','2 địa chỉ liên tiếp','4','8'],correct:1,explain:'Module I/O kép GST-LD-8331 (Dual I/O Module) có 2 kênh vào/ra độc lập nhưng chiếm 2 địa chỉ LIÊN TIẾP (địa chỉ con 1 và 2). Khi thiết kế địa chỉ phải để 2 slot liên tiếp — không được dùng địa chỉ lẻ/chẵn tách rời.'},
{brand:'GST-H',cat:'Modules',q:'GST-LD-8362H có tải relay đầu ra:',options:['AC220V/2A','AC250V/10A hoặc DC30V/10A','AC110V/5A','DC24V/3A'],correct:1,explain:'Module I/O tải lớn GST-LD-8362H có relay công suất cao AC250V/10A hoặc DC30V/10A — dùng cho thiết bị công suất cao như bơm, quạt tăng áp. Cao gấp đôi so với các module thường (thường 5A).'},
{brand:'GST-H',cat:'Modules',q:'GST-LD-8319 là module:',options:['Chỉ đầu vào','Chỉ đầu ra điều khiển','I/O kép','Cách ly'],correct:1,explain:'Module điều khiển GST-LD-8319 (Control Module) là module CHỈ ĐẦU RA — nhận lệnh từ tủ để kích hoạt relay điều khiển thiết bị liên động PCCC (bơm, quạt, cửa cuốn chống cháy). Không có kênh giám sát đầu vào.'},
{brand:'GST-H',cat:'Modules',q:'GST-LD-8364 dùng để điều khiển:',options:['Bơm nước','Còi/đèn cảnh báo tổng tuyến','Van gas','PA'],correct:1,explain:'Module GST-LD-8364 (Sound-Light Alarm) chuyên điều khiển còi/đèn cảnh báo địa chỉ trên tổng tuyến. Hỗ trợ điều khiển theo nhóm hoặc toàn bộ vòng lặp — phù hợp thiết kế cảnh báo phân vùng theo tầng.'},
{brand:'GST-H',cat:'Modules',q:'Vi xử lý trong module GST-LD-8300B là:',options:['8-bit AVR','16-bit PIC','32-bit ARM','8051'],correct:2,explain:'Module đầu vào GST-LD-8300B (và các module thế hệ mới) dùng vi xử lý ARM 32-bit. Ưu điểm: xử lý tín hiệu số nhanh, kháng nhiễu EMC tốt hơn hẳn thế hệ trước dùng vi xử lý 8-bit.'},
{brand:'GST-H',cat:'Modules',q:'JK-TX-GST6000D là:',options:['Đầu báo','Card I/O cho tủ GST6000/GST100','Module cách ly','Nút ấn'],correct:1,explain:'JK-TX-GST6000D là Card I/O mở rộng cho tủ báo cháy GST6000 series và GST100 — cắm trực tiếp vào khe card của tủ. Cung cấp thêm đầu vào IDC và đầu ra relay cho thiết bị liên động, không cần thêm tủ mở rộng.'},
{brand:'GST-H',cat:'Modules',q:'Khuyến nghị lắp module cách ly GST-LD-8313 mỗi bao nhiêu địa chỉ?',options:['16','32 địa chỉ','64','128'],correct:1,explain:'Khuyến nghị lắp 1 module cách ly GST-LD-8313 mỗi 32 địa chỉ, và ít nhất 1 module ở mỗi nhánh T-tap. Cách này giới hạn tối đa 32 thiết bị bị ảnh hưởng khi ngắn mạch, giúp khoanh vùng sự cố nhanh.'},
{brand:'GST-H',cat:'Modules',q:'Mã hóa địa chỉ của module GST-H bằng:',options:['DIP switch','Điện tử (electronic coding) qua GST-BMQ-2','Rotary switch','Jumper'],correct:1,explain:'Module GST-H mã hóa địa chỉ điện tử (electronic coding) qua bộ mã hóa GST-BMQ-2 hoặc trực tiếp từ tủ điều khiển. Phạm vi địa chỉ 1–242. Ưu điểm so với DIP switch: linh hoạt, không cần tháo module để đổi địa chỉ.'},

// ============ GST-H - ALARM DEVICES ============
{brand:'GST-H',cat:'AlarmDevices',q:'GST-HX-240B là:',options:['Đầu báo','Nút ấn','Còi đèn báo cháy địa chỉ','Module điều khiển'],correct:2,explain:'GST-HX-240B là còi đèn báo cháy địa chỉ (Sound-Light Alarm), đấu 4 dây với tổng tuyến GST. Kết hợp âm thanh (80–115 dB) và đèn chớp trong 1 thiết bị. Bộ điều khiển biết chính xác còi đèn nào đang hoạt động nhờ có địa chỉ.'},
{brand:'GST-H',cat:'AlarmDevices',q:'GST-HX-240B đấu nối bằng mấy dây?',options:['2 dây','3 dây','4 dây (2 tổng tuyến + 2 nguồn)','6 dây'],correct:2,explain:'Còi đèn GST-HX-240B đấu 4 dây: 2 dây tổng tuyến (không phân cực) + 2 dây nguồn DC24V riêng. Cần cấp cả 2 nguồn — thiếu nguồn 24V thì còi không kêu và đèn không sáng, chỉ báo lỗi trên tủ.'},
{brand:'GST-H',cat:'AlarmDevices',q:'Áp lực âm của GST-HX-240B tại 3m phía trước:',options:['70-90 dB','80-115 dB','90-100 dB','100-120 dB'],correct:1,explain:'Còi đèn GST-HX-240B đạt áp lực âm 80–115 dB tại 3m phía trước (trọng số A). Dải rộng vì phụ thuộc điện áp cấp và điều kiện lắp đặt — nên đo thực tế tại hiện trường để đảm bảo đáp ứng thiết kế.'},
{brand:'GST-H',cat:'AlarmDevices',q:'J-SAM-GST9121B là:',options:['Nút ấn báo cháy trong nhà','Nút ấn tại họng cứu hỏa','Còi báo','Đầu báo'],correct:0,explain:'J-SAM-GST9121B là nút ấn báo cháy thủ công (Manual Call Point) lắp trong nhà, IP40, đấu 2 dây tổng tuyến. Có LED nhấp nháy 3s/lần khi bình thường, sáng liên tục khi báo. Vi xử lý ARM 32-bit, cơ chế tự khóa cơ học chống ấn nhầm.'},
{brand:'GST-H',cat:'AlarmDevices',q:'Cách phục hồi GST9121B sau khi kích hoạt:',options:['Ấn thêm 1 lần','Chìa khóa chuyên dụng','Reset tại tủ','Chờ 30 giây tự phục hồi'],correct:1,explain:'Nút ấn GST9121B phục hồi bằng chìa khóa chuyên dụng riêng của GST. Đảm bảo mỗi tủ điều hành có sẵn chìa khóa dự phòng — thiếu chìa không thể reset. Reset tại nút không đồng thời reset alarm ở tủ (phải reset ở tủ nữa).'},
{brand:'GST-H',cat:'AlarmDevices',q:'J-SAM-GST9124 là:',options:['Nút ấn MCP thông thường','Nút ấn tại họng cứu hỏa','Còi báo','Nút stop khí'],correct:1,explain:'J-SAM-GST9124 là nút ấn chữa cháy tại họng cứu hỏa (Hydrant Station Button), lắp trong tủ họng. Khi ấn: khởi động bơm chữa cháy đồng thời báo về tủ báo cháy. Có 2 đèn: đỏ (đã ấn) + xanh (bơm đang chạy - phản hồi từ bơm).'},
{brand:'GST-H',cat:'AlarmDevices',q:'Cấp bảo vệ của GST9124:',options:['IP40','IP54','IP65','IP67'],correct:2,explain:'Nút ấn tại họng GST9124 đạt IP65 — bụi kín, chống tia nước. Cao hơn nút MCP thường (IP40) vì lắp trong tủ họng cứu hỏa có độ ẩm cao, đôi khi nước bắn khi thao tác.'},
{brand:'GST-H',cat:'AlarmDevices',q:'GST9124 có mấy đèn LED phản hồi?',options:['1 đèn','2 (đỏ khởi động + xanh phản hồi từ bơm)','3','4'],correct:1,explain:'Nút ấn tại họng GST9124 có 2 LED phân biệt: LED đỏ sáng khi đã ấn nút (đã kích hoạt) + LED xanh sáng khi bơm chạy (nhận tín hiệu phản hồi từ bơm). Nhân viên hiện trường biết ngay bơm đã hoạt động hay chưa.'},
{brand:'GST-H',cat:'AlarmDevices',q:'GST9124 có mấy dây kết nối tổng cộng?',options:['2 (tổng tuyến)','3 (tổng tuyến + nguồn)','5 (2 tổng tuyến + 3 bơm)','7'],correct:2,explain:'Nút GST9124 đấu 5 dây: 2 dây tổng tuyến (SLC không phân cực) + 3 dây bơm (dây 24V ra, dây phản hồi, dây chung). Phải phân biệt rõ 3 dây bơm khi đấu — đấu sai sẽ không có tín hiệu phản hồi bơm.'},
{brand:'GST-H',cat:'AlarmDevices',q:'GST9124 khi mất tổng tuyến thì:',options:['Ngừng hoạt động','Vẫn khởi động bơm và sáng đèn chỉ thị','Chỉ báo lỗi','Reset về mặc định'],correct:1,explain:'Nút ấn tại họng GST9124 có tính năng đặc biệt: hoạt động độc lập khi mất tổng tuyến. Ngay cả khi đứt cáp SLC vẫn khởi động được bơm và sáng đèn chỉ thị. Đảm bảo bơm luôn khả dụng trong tình huống khẩn cấp.'},
{brand:'GST-H',cat:'AlarmDevices',q:'Cấp bảo vệ của J-SAM-GST9221B/W:',options:['IP40','IP54','IP65','IP67'],correct:3,explain:'Nút ấn báo cháy J-SAM-GST9221B/W đạt IP67 — chịu ngâm nước tạm thời (1m/30 phút). Chuyên dùng cho hầm dẫn cáp/ống kỹ thuật (pipe gallery) có nguy cơ ngập. Kín hoàn toàn, cáp bịt kín sau khi đấu.'},
{brand:'GST-H',cat:'AlarmDevices',q:'Lỗ lắp của GST9221B:',options:['60 mm','90 mm','122 mm','150 mm'],correct:2,explain:'Nút ấn IP67 GST9221B có khoảng cách lỗ lắp 122 mm — khác với 60 mm của GST9121B thường. Khi thiết kế vị trí lắp phải chuẩn bị hộp âm/khung phù hợp, không dùng chung đế với GST9121B.'},
{brand:'GST-H',cat:'AlarmDevices',q:'Chu kỳ biến điệu âm báo cháy của GST-HX-240B:',options:['1-2s','3.5-4.8s','5-8s','10s'],correct:1,explain:'Còi đèn GST-HX-240B có 2 âm điệu: âm báo cháy chu kỳ 3.5–4.8 giây (leo thang, đặc trưng cho báo cháy) và âm bíp chu kỳ 0.6–1.0 giây (dùng cho pre-alarm hoặc thông báo). Chọn âm phù hợp mục đích khu vực.'},
);

// ============ GST-UL - CONTROL PANEL ============
QUESTIONS.push(
{brand:'GST-UL',cat:'ControlPanel',q:'Tất cả tủ GST-UL đạt tiêu chuẩn:',options:['GB 29837','UL864/NFPA72','EN 54','VdS'],correct:1,explain:'Dòng GST-UL là sản phẩm GST tuân thủ tiêu chuẩn Bắc Mỹ — UL864 10th Edition kết hợp NFPA72. Khác với GST-H (dòng cho châu Á tuân thủ GB Trung Quốc và EN 54). Khi dự án ở Mỹ/Canada bắt buộc chọn GST-UL.'},
{brand:'GST-UL',cat:'ControlPanel',q:'GST-M200 tối đa bao nhiêu điểm địa chỉ:',options:['128','240 điểm/vòng','484','1452'],correct:1,explain:'Tủ báo cháy nhỏ GST-M200 (Intelligent FACP) hỗ trợ 240 điểm địa chỉ/vòng. Có thể mở rộng thành 2 vòng khi cắm thêm card LC200 (tổng 480 điểm). Phù hợp tòa nhà cỡ vừa: trung tâm thương mại nhỏ, khách sạn 3–4 tầng.'},
{brand:'GST-UL',cat:'ControlPanel',q:'GST-IFP4M tối đa bao nhiêu điểm:',options:['240','1.000','1.452','3.000'],correct:2,explain:'Tủ báo cháy lớn GST-IFP4M (Addressable FACP) có 6 vòng Class A × 242 điểm/vòng = tối đa 1.452 điểm. Đủ cho tòa nhà 30+ tầng. Trong khi GST-M200 chỉ đạt 480 điểm — chênh lệch quy mô rất lớn.'},
{brand:'GST-UL',cat:'ControlPanel',q:'GST-M200 có bao nhiêu NAC:',options:['1 × 1.5A','2 × Class B, 1.2A mỗi mạch','4 × 3A','2 × 2.5A'],correct:1,explain:'Tủ GST-M200 có 2 mạch NAC (Notification Appliance Circuit) Class B (Style Y), mỗi mạch tối đa 1.2A. Cấp nguồn cho còi/đèn cảnh báo TrueAlert non-addressable. Có thêm SmartSync synchronization tích hợp.'},
{brand:'GST-UL',cat:'ControlPanel',q:'GST-M200 hỗ trợ tính năng NFPA72 quan trọng:',options:['PAS (Positive Alarm Sequence)','VESDA','Modbus','BACnet'],correct:0,explain:'Tủ GST-M200 hỗ trợ PAS (Positive Alarm Sequence) per-point theo NFPA72 — yêu cầu xác nhận báo động 2 lần trước khi kích hoạt NAC. Cơ chế này giảm báo giả rất hiệu quả trong khách sạn, bệnh viện.'},
{brand:'GST-UL',cat:'ControlPanel',q:'Auto silent timer của NAC trên GST-M200:',options:['1 phút','3 phút','5 phút','10 phút'],correct:2,explain:'Tủ GST-M200 có auto silent timer 5 phút — nếu không có tác động từ vận hành viên, NAC sẽ tự tắt còi sau 5 phút để giảm phiền nhiễu người trong tòa nhà. Nhưng LED cảnh báo trên tủ vẫn sáng cho đến khi reset.'},
{brand:'GST-UL',cat:'ControlPanel',q:'Dây SLC khuyến nghị của GST-M200:',options:['22 AWG','18 AWG','17-14 AWG, tối đa 4000 ft','12 AWG'],correct:2,explain:'Tủ GST-M200 khuyến nghị dây SLC tối thiểu 17 AWG, lý tưởng 14 AWG, tối đa 4000 ft (~1220m) dùng xoắn đôi. Nếu tòa nhà lớn hơn hoặc dây dài hơn, phải nâng cấp lên GST-IFP4M có capacity cao hơn.'},
{brand:'GST-UL',cat:'ControlPanel',q:'GST-IFP4M có màn hình:',options:['LCD 128×64','7 in TFT cảm ứng 800×480','2×20 LCD','10 in cảm ứng'],correct:1,explain:'Tủ báo cháy GST-IFP4M có màn hình 7 inch TFT cảm ứng độ phân giải 800×480 — thao tác trực tiếp trên màn hình, dễ dùng cho operator. So sánh: GST-M200 chỉ dùng LCD 128×64 nhỏ hơn nhiều.'},
{brand:'GST-UL',cat:'ControlPanel',q:'Lịch sử sự kiện của GST-IFP4M:',options:['1.000','10.000','100.000','1.000.000'],correct:2,explain:'Tủ GST-IFP4M lưu 100.000 sự kiện — đủ dùng nhiều năm cho hệ thống lớn, hỗ trợ USB backup định kỳ. Trong khi GST-M200 chỉ 1.000 sự kiện, cần export định kỳ nếu hệ thống bận rộn.'},
{brand:'GST-UL',cat:'ControlPanel',q:'Số vòng SLC Class A tối đa của GST-IFP4M:',options:['2','4','6','8'],correct:2,explain:'Tủ GST-IFP4M hỗ trợ 1–6 vòng Class A closed ring. Class A đảm bảo truyền thông ngay cả khi đứt 1 điểm trên vòng (vòng khép kín). Vòng 5 và 6 cần thêm battery box phụ.'},
{brand:'GST-UL',cat:'ControlPanel',q:'GST-IFP4M vòng 5 và 6 cần thêm gì?',options:['Card mạng','Battery box phụ','Card BACnet','Không cần gì'],correct:1,explain:'⚠ Với tủ GST-IFP4M, khi mở rộng lên vòng 5 và 6 yêu cầu battery box phụ ngoài tủ chính. Lý do: nhiều thiết bị hơn = nhu cầu ắc-quy dự phòng lớn hơn. Phải lên kế hoạch không gian và ngân sách lắp đặt.'},
{brand:'GST-UL',cat:'ControlPanel',q:'GST-IFP4M có sẵn giao thức tích hợp BMS:',options:['Modbus RTU','BACnet built-in (cần auth code)','LonWorks','KNX'],correct:1,explain:'Tủ GST-IFP4M có BACnet built-in — tích hợp trực tiếp với HVAC và BMS (Building Management System) mà không cần gateway ngoài. Chỉ cần mua auth code để mở tính năng. Ưu điểm lớn cho tòa nhà thông minh.'},
{brand:'GST-UL',cat:'ControlPanel',q:'Điện trở cuối vòng NAC1 của GST-IFP4M là:',options:['1 kΩ','4.7 kΩ','10 kΩ','20 kΩ'],correct:1,explain:'Tủ GST-IFP4M: NAC EOLR = 4.7 kΩ (chuẩn); AUX EOLR = 1 kΩ. Khi cài NAC2 làm AUX phải đổi điện trở sang 1 kΩ — nếu để 4.7 kΩ sẽ báo lỗi giám sát liên tục.'},
{brand:'GST-UL',cat:'ControlPanel',q:'GST-IFP4M-S khác gì GST-IFP4M?',options:['Nhiều điểm hơn','Tủ thấp hơn (573mm) & ZCP tối đa 8','Không có BACnet','2 CPU'],correct:1,explain:'Tủ GST-IFP4M-S (hậu tố "-S") là bản nhỏ gọn hơn: chiều cao 573mm (so với 840mm của IFP4M), nhưng ZCP giảm còn tối đa 8 (thay vì 32). Phù hợp khoang tủ hẹp; đánh đổi ZCP để có kích thước nhỏ.'},
{brand:'GST-UL',cat:'ControlPanel',q:'GST-MNA2C truyền qua giao thức:',options:['Ethernet','CAN Class A','Fiber Optic','RS485'],correct:1,explain:'Bảng hiển thị mạng GST-MNA2C (Network Annunciator) truyền qua CAN Class A — tối đa 3000m/node với dây 16AWG, hỗ trợ 250 node. Còn bản GST-MNA2F dùng Fiber Optic tối đa 20 km/node.'},
{brand:'GST-UL',cat:'ControlPanel',q:'Khoảng cách truyền tối đa của GST-MNA2F (Fiber):',options:['1 km','5 km','20 km','100 km'],correct:2,explain:'Bảng hiển thị GST-MNA2F truyền qua cáp quang đơn mode LC tối đa 20 km, suy giảm ≤-10 dB. Phù hợp tòa nhà phân tán, khu phức hợp lớn không bị nhiễu điện từ. Chi phí cao hơn CAN nhưng đáng cho khoảng cách xa.'},
{brand:'GST-UL',cat:'ControlPanel',q:'GST-MP16 là:',options:['Panel báo cháy','Master Panel âm thanh khẩn cấp 16 vùng','Repeater','NAC extender'],correct:1,explain:'GST-MP16 là Master Panel âm thanh khẩn cấp 16 vùng — tích hợp voice alarm + điện thoại cứu hỏa (fire phone), amplifier 50/100W. Cho phép operator nói trực tiếp qua loa các vùng để hướng dẫn sơ tán.'},
{brand:'GST-UL',cat:'ControlPanel',q:'GVA-100 có công suất:',options:['25W','50W','100W','200W'],correct:2,explain:'GVA-100 là Voice Evacuation System công suất 100W — dòng GVA có các bản 25/50/100W (cabinet nhỏ 14.5×18×4 in) và 150/200W (cabinet lớn 14.5×27×4 in). Chọn công suất theo diện tích cần phủ loa.'},
{brand:'GST-UL',cat:'ControlPanel',q:'Nguồn loa của GVA series:',options:['4/8 Ω','25/70 VRMS, Class A hoặc B','12/24V DC','120V AC'],correct:1,explain:'Voice Evacuation GVA dùng nguồn loa 25/70 VRMS (constant voltage system) — cho phép chọn Class A (dây in/out) hoặc Class B (T-tap). Ưu điểm: dây dài, loa nhiều dễ kết nối song song mà không lo tổng trở.'},
{brand:'GST-UL',cat:'ControlPanel',q:'GVX-RM có khoảng cách kết nối tối đa:',options:['1000 ft','2000 ft','5000 ft','10000 ft'],correct:2,explain:'GVX-RM là Remote Microphone Panel — khoảng cách tối đa 5000 ft (~1520m) từ tủ chính. Tối đa 5 GVX-RM/GVX-SC (Switch Controller). Đặt tại quầy lễ tân, phòng bảo vệ để operator phát thông báo nhanh.'},
{brand:'GST-UL',cat:'ControlPanel',q:'Tổng công suất tối đa khi ghép nhiều GVX expander:',options:['500 W','1000 W','2000 W','5000 W'],correct:2,explain:'Ganging (ghép nối) các GVX Expander (25/50/100W mỗi module) có thể lên tới tổng 2000W. Đây là ưu điểm mở rộng — không cần thay tủ khi tòa nhà phát triển thêm.'},
{brand:'GST-UL',cat:'ControlPanel',q:'Tháo microphone khỏi GVA panel sẽ:',options:['Tự khôi phục','Không có tác động','⚠ Gây Trouble','Reset hệ thống'],correct:2,explain:'⚠ Tháo microphone khỏi Voice Evac panel GVA sẽ gây Trouble (báo sự cố) trên tủ — vì hệ thống giám sát liên tục sự có mặt của micro. Không tháo khi hệ thống đang vận hành, nếu cần bảo trì phải cô lập trước.'},
);

// ============ GST-UL - SYSTEM KNOWLEDGE ============
QUESTIONS.push(
{brand:'GST-UL',cat:'SystemKnowledge',q:'GST-UL khác GST-H ở điểm cốt lõi:',options:['Chỉ khác vỏ tủ','Chuẩn: GST-UL theo UL864/NFPA72 (Bắc Mỹ), GST-H theo GB (TQ) — thiết bị KHÔNG lẫn được','Chỉ khác giá','Cùng nhà máy'],correct:1,explain:'GST-UL và GST-H là 2 dòng sản phẩm phân biệt của hãng GST cho 2 thị trường: GST-UL đạt UL864 10th Edition + NFPA72 (Mỹ/Canada), GST-H đạt GB (Trung Quốc). Cả 2 cùng dùng SLC 2 dây không phân cực và địa chỉ 1–242 (chung công nghệ), NHƯNG thiết bị KHÔNG lẫn được: firmware khác nhau, tone còi theo tiêu chuẩn khác, marking khác. Dự án ở Mỹ bắt buộc GST-UL; dự án VN có thể dùng cả 2.'},
{brand:'GST-UL',cat:'SystemKnowledge',q:'Chuẩn NFPA72 (Mỹ) quy định điều gì quan trọng?',options:['Chỉ về pin','Bộ chuẩn thiết kế + lắp đặt + bảo trì hệ thống báo cháy — bắt buộc tại Mỹ/Canada','Chỉ tester','Chuẩn màu'],correct:1,explain:'NFPA72 (National Fire Alarm and Signaling Code) là bộ chuẩn bao trùm của Mỹ cho hệ thống báo cháy: yêu cầu về thiết kế, lắp đặt, thử nghiệm, bảo trì, thông báo (Notification Appliance), pin dự phòng, WALKTEST, DACT reporting. Mọi tủ FACP tại Mỹ (bao gồm GST-UL, SIMPLEX) phải tuân thủ NFPA72. Việt Nam đang tham chiếu NFPA cho các dự án lớn có yếu tố nước ngoài.'},
{brand:'GST-UL',cat:'SystemKnowledge',q:'PAS (Positive Alarm Sequence) trên GST-M200 hoạt động thế nào?',options:['Chỉ báo động','Xác nhận 2 lần: đầu báo alarm → operator có 15s ack → nếu không ack thì kích hoạt NAC','Chậm hơn','Ngắt hệ thống'],correct:1,explain:'PAS per-point theo NFPA72: khi đầu báo kích hoạt, tủ KHÔNG kích hoạt NAC ngay mà chờ 15 giây cho operator xác nhận. Nếu operator ack (nhấn nút xác nhận), tủ chờ thêm 3 phút để investigate. Nếu không ack, tự động kích hoạt NAC. Cơ chế này giảm báo giả trong khách sạn/bệnh viện — nơi nhân viên có thể check ngay xem có cháy thật không. GST-M200 hỗ trợ PAS per-point (từng đầu báo có PAS riêng).'},
{brand:'GST-UL',cat:'SystemKnowledge',q:'Kiến trúc mở rộng GST-IFP4M: tối đa bao nhiêu điểm và mạng bao nhiêu tủ?',options:['1452 điểm/tủ','1452 điểm/tủ × 250 tủ trong mạng CAN Class A','500 điểm','Không mạng được'],correct:1,explain:'GST-IFP4M standalone: 6 vòng Class A × 242 điểm = 1.452 điểm. Ghép mạng CAN Class A: tối đa 250 node (mỗi node là 1 tủ FACP hoặc annunciator MNA2C/MNA2F). Tổng dung lượng mạng: 1.452 × 250 = 363.000 điểm — con số khổng lồ, đủ cho khu đô thị lớn. Thực tế hiếm khi cần vượt 50 tủ trong 1 mạng.'},
{brand:'GST-UL',cat:'SystemKnowledge',q:'Class A trên SLC của GST-IFP4M là gì?',options:['Class chất lượng','Loop khép kín (closed ring) — cáp đi từ tủ ra và về lại tủ, chống đứt cáp 1 điểm','Class A giá cao','Không dùng T-tap'],correct:1,explain:'SLC Class A (Style 6 theo NFPA) là cấu trúc vòng khép kín: cáp đi từ tủ đến thiết bị đầu tiên, qua tất cả các thiết bị, rồi về lại tủ. Khi đứt cáp 1 chỗ, tủ vẫn giao tiếp được tất cả thiết bị từ 2 hướng. Class A của GST-IFP4M dùng dây 18AWG tối đa 1300 m/vòng. So sánh: Class B (Style 4) rẻ hơn nhưng đứt cáp là mất phần sau. Chuẩn UL cho các tòa nhà lớn thường yêu cầu Class A.'},
{brand:'GST-UL',cat:'SystemKnowledge',q:'Điện trở EOL trên NAC của GST-IFP4M:',options:['1 kΩ luôn','4.7 kΩ NAC / 1 kΩ AUX — sai giá trị sẽ báo lỗi giám sát','10 kΩ','Không cần EOL'],correct:1,explain:'Tủ GST-IFP4M: EOL cho NAC là 4.7 kΩ, cho AUX là 1 kΩ. Khi cấu hình NAC2 làm AUX output, PHẢI đổi điện trở cuối vòng sang 1 kΩ — nếu để 4.7 kΩ tủ sẽ báo trouble liên tục. EOL giúp tủ phát hiện đứt dây (không có điện trở) và ngắn mạch (0 Ω). Chọn EOL theo tài liệu tủ và loại thiết bị đầu cuối.'},
{brand:'GST-UL',cat:'SystemKnowledge',q:'Fiber Optic của GST-MNA2F đạt 20 km — dùng loại cáp nào?',options:['Multi-mode','Single-mode LC (đơn mode) — suy giảm ≤-10 dB','Coaxial','Đồng'],correct:1,explain:'Cáp quang cho bảng hiển thị mạng GST-MNA2F là single-mode LC (đầu nối LC, sợi đơn mode). Đơn mode có core rất nhỏ (~9 µm) chỉ truyền 1 mode ánh sáng, cho phép khoảng cách xa (đến 20 km) với suy giảm ≤-10 dB. Multi-mode (core lớn ~50 µm) chỉ đạt vài km. Chi phí cáp single-mode cao hơn nhưng cần thiết cho khu đô thị/campus lớn không bị nhiễu điện từ.'},
{brand:'GST-UL',cat:'SystemKnowledge',q:'Tòa nhà 30 tầng ở Mỹ, 1200 detector — chọn tủ GST-UL nào?',options:['GST-M200 (240)','GST-IFP4M-S (1452 điểm nhưng ZCP hạn chế)','GST-IFP4M (1452 điểm, 32 ZCP, 6 vòng Class A)','Cả GST-H'],correct:2,explain:'Tòa nhà 30 tầng cần: (1) capacity >1200 → GST-M200 (240) và GST-IFP4M-S (chỉ 8 ZCP) không đủ; (2) nhiều ZCP để hiển thị theo tầng → GST-IFP4M có 32 ZCP; (3) Class A cho tin cậy cao tòa nhà cao. Đáp án đúng: GST-IFP4M standalone hoặc mạng 2 tủ. Không dùng GST-H vì dự án ở Mỹ bắt buộc UL864. Chia 6 vòng Class A × 200 điểm/vòng (chừa dự phòng 20%).'},
{brand:'GST-UL',cat:'SystemKnowledge',q:'Voice Evacuation GVA-100 phát thông báo thế nào?',options:['Chỉ tone','Digital Message Repeater (DMR) tích hợp phát thông báo thoát hiểm tự động khi alarm + micro override','Chỉ micro','Radio'],correct:1,explain:'GVA-100 Voice Evacuation System có Digital Message Repeater (DMR) tích hợp — lưu sẵn thông báo thoát hiểm bằng giọng nói (MP3 8 MB). Khi có alarm: DMR tự phát lặp thông báo "Please evacuate through the nearest exit…". Operator có thể nhấn microphone override để phát trực tiếp bằng giọng nói. Chuẩn NFPA72 khuyến khích voice evacuation cho tòa nhà >30m vì rõ ràng hơn tone còi.'},
{brand:'GST-UL',cat:'SystemKnowledge',q:'Ghép nhiều GVX Expander tối đa bao nhiêu W?',options:['500W','1000W','2000W tổng — không giới hạn quy mô','Vô hạn'],correct:2,explain:'GVX Expander (25/50/100W mỗi module) ghép nối (ganging) được đến tổng 2000W. Đủ phủ tòa nhà cực lớn: 2000W chia thành ~200 loa 10W hoặc 20 loa 100W. GVX-RM (Remote Microphone) đặt cách 5000 ft (1520m) từ tủ chính — cho phép operator tại lễ tân/phòng bảo vệ phát thông báo. Ghép nhiều expander tăng công suất mà không cần thay tủ.'},
{brand:'GST-UL',cat:'SystemKnowledge',q:'BACnet built-in trên GST-IFP4M dùng để làm gì?',options:['Kết nối Internet','Tích hợp với BMS/HVAC — điều khiển quạt hút khói, thang máy khi cháy, không cần gateway ngoài','Chỉ đọc log','Backup'],correct:1,explain:'BACnet là chuẩn giao tiếp cho tòa nhà thông minh (BMS - Building Management System). Khi báo cháy, GST-IFP4M gửi lệnh BACnet đến HVAC để: dừng quạt điều hòa (không lan khói), khởi động quạt hút khói tăng áp cầu thang, đóng cửa chống cháy, đưa thang máy về tầng trệt. BACnet built-in nghĩa là tích hợp trực tiếp không cần gateway ngoài — chỉ cần mua auth code. Ưu điểm lớn cho tòa nhà thông minh.'},
{brand:'GST-UL',cat:'SystemKnowledge',q:'Chuẩn dây SLC 17 AWG tối đa 4000 ft — vì sao dùng đơn vị Mỹ?',options:['Truyền thống','GST-UL cho thị trường Mỹ, chuẩn Bắc Mỹ dùng AWG + ft — không phải mm² và km','Ngẫu nhiên','Kỹ thuật viên'],correct:1,explain:'AWG (American Wire Gauge) là hệ đo tiết diện dây của Mỹ: 17 AWG ≈ 1.15 mm², 14 AWG ≈ 2.08 mm². 1 ft ≈ 0.3048 m; 4000 ft ≈ 1220 m. Tài liệu GST-UL dùng AWG + ft vì đối tượng là kỹ sư Bắc Mỹ. Đối chiếu khi thi công ở VN: 17 AWG ≈ 1.0-1.5 mm² thông dụng ở VN. GST-H dùng mm² + km trực tiếp.'},
{brand:'GST-UL',cat:'SystemKnowledge',q:'Auto silent timer 5 phút của NAC có tác dụng gì?',options:['Tắt vĩnh viễn','Nếu không ai xử lý sau 5 phút, tự tắt còi giảm phiền nhiễu nhưng vẫn giữ alarm trên tủ','Nút gọi','Test'],correct:1,explain:'Auto silent timer 5 phút: sau khi kích hoạt NAC 5 phút không có operator ack/reset, tủ tự tắt còi/loa NAC — nhưng vẫn giữ trạng thái alarm trên tủ (LED sáng, log lưu). Mục đích: giảm phiền nhiễu cho người trong tòa nhà (đặc biệt về đêm) khi báo giả nhưng không có ai xử lý ngay. Sau khi tắt tự động, alarm chỉ reset khi operator vào tủ nhấn reset.'},
{brand:'GST-UL',cat:'SystemKnowledge',q:'WALKTEST silent/audible dùng khi nào?',options:['Chỉ audible','Silent: bảo trì hệ thống đang vận hành (không kích còi làm hoảng); Audible: test khi trống người','Ngẫu nhiên','Chỉ audible'],correct:1,explain:'WALKTEST cho phép 1 kỹ thuật viên tự kiểm tra toàn bộ đầu báo/nút ấn mà không cần đồng đội. Silent WALKTEST: khi kích hoạt detector, tủ ghi log + nháy LED nhưng KHÔNG kích còi — phù hợp bảo trì tòa nhà đang vận hành (khách sạn, bệnh viện). Audible WALKTEST: kích còi ngắn 1 lần khi test — phù hợp test cuối kỳ khi tòa nhà trống người. GST-M200 và GST-IFP4M đều hỗ trợ cả 2 chế độ.'},
{brand:'GST-UL',cat:'SystemKnowledge',q:'Redundancy CPU option trên GST-IFP4M nghĩa là gì?',options:['2 CPU cùng chạy','CPU chính hỏng → CPU dự phòng tự chuyển sang → hệ thống không downtime','Backup file','2 tủ'],correct:1,explain:'Redundancy CPU: tủ GST-IFP4M có tùy chọn CPU dự phòng — khi CPU chính hỏng (rất hiếm nhưng có thể xảy ra), CPU backup tự động chuyển sang giám sát trong <1 giây. Hệ thống báo cháy không downtime. Rất quan trọng cho bệnh viện critical, trung tâm dữ liệu — nơi mất giám sát 1 giờ đã là rủi ro lớn. Chi phí thêm ~15-20% tủ nhưng đáng cho ứng dụng critical.'},
{brand:'GST-UL',cat:'SystemKnowledge',q:'GST-IFP4M-S vs GST-IFP4M — vì sao S giới hạn 8 ZCP?',options:['Ngẫu nhiên','Tủ nhỏ hơn (573mm cao vs 840mm) → ít slot phần cứng → ít ZCP','Rẻ hơn nên hạn chế','Chuẩn khác'],correct:1,explain:'GST-IFP4M-S là bản slim (thấp 573mm thay vì 840mm) — thiết kế cho khoang tủ hẹp. Do tủ thấp hơn 267mm, ít slot phần cứng bên trong nên giới hạn ZCP xuống 8 (thay vì 32 của bản thường). Đánh đổi: được kích thước nhỏ, mất khả năng nhiều ZCP. Chọn -S khi tòa nhà không cần nhiều điểm hiển thị từ xa hoặc khoang tủ hạn chế.'},
{brand:'GST-UL',cat:'SystemKnowledge',q:'Vì sao GST-UL và GST-H không thể dùng chung thiết bị dù cùng địa chỉ 1-242?',options:['Chỉ khác marketing','Firmware khác, tone còi theo tiêu chuẩn khác (NFPA vs GB), marking khác, phần mềm định nghĩa khác','Cùng dùng được','Chỉ khác màu'],correct:1,explain:'Dù cùng SLC 2 dây không phân cực và địa chỉ 1–242, nhưng GST-UL và GST-H khác biệt cốt lõi: (1) Firmware: PAS, WALKTEST theo NFPA (chỉ có ở UL); (2) Tone còi: NFPA temporal 3 (UL) vs GB tone (H); (3) Marking: FIRE tiếng Anh (UL) vs 火警 tiếng Trung (H); (4) Phần mềm định nghĩa: GST-IFPx-Def Tool (UL) khác GST-H tool. Không dùng chung được — mua đúng dòng theo dự án.'}
);
