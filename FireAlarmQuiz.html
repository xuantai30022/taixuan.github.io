QUESTIONS.push(
{brand:'MIX',cat:'ALL',q:'Hãng nào dùng công nghệ LSN (Local Security Network)?',options:['GST','SIMPLEX','BOSCH','Notifier'],correct:2,explain:'LSN (Local Security Network) là công nghệ bus độc quyền của BOSCH — với 2 thế hệ: LSN classic (127 điểm/loop) và LSN improved (254 điểm/loop). SIMPLEX dùng IDNet/IDNAC/MAPNET II hoàn toàn khác. GST dùng SLC 2 dây không phân cực. Nắm rõ để tránh nhầm khi tra spec.'},
{brand:'MIX',cat:'ALL',q:'Giao thức IDNet/IDNAC là của hãng:',options:['BOSCH','GST','SIMPLEX','Cả 3'],correct:2,explain:'IDNet (Addressable Initiation) và IDNAC (Addressable Notification) là 2 giao thức đặc trưng của SIMPLEX (Johnson Controls). BOSCH có LSN riêng, GST có SLC riêng — không hãng nào khác dùng tên IDNet/IDNAC. Đây là dấu hiệu nhận diện SIMPLEX chắc chắn.'},
{brand:'MIX',cat:'ALL',q:'Hãng nào có 2 dòng sản phẩm theo chuẩn EN 54 và chuẩn UL864?',options:['BOSCH','GST (GST-H theo GB/EN, GST-UL theo UL864)','SIMPLEX','Cả 3'],correct:1,explain:'GST là hãng duy nhất có 2 dòng phân biệt theo chuẩn: GST-H (Hải Vịnh, theo GB Trung Quốc và tham chiếu EN 54) cho thị trường châu Á, và GST-UL (theo UL864/NFPA72) cho Bắc Mỹ. Chọn đúng dòng theo dự án.'},
{brand:'MIX',cat:'ALL',q:'Chuẩn UL864 áp dụng cho hãng nào?',options:['BOSCH FPA-5000','GST-UL & SIMPLEX','GST-H','Chỉ SIMPLEX'],correct:1,explain:'UL864 là chuẩn Bắc Mỹ cho hệ thống báo cháy. Trong 4 dòng: chỉ GST-UL và SIMPLEX đạt UL864 hoàn chỉnh. BOSCH FPA-5000 chủ yếu theo EN 54 (VdS, CPD 0786), GST-H theo GB Trung Quốc.'},
{brand:'MIX',cat:'ALL',q:'Số điểm/loop tối đa: 254 là đặc trưng của:',options:['BOSCH LSN improved','GST-H','SIMPLEX 2050FS','SIMPLEX IDNet'],correct:0,explain:'BOSCH LSN improved đạt 254 điểm/loop — cao nhất trong các giao thức phổ biến. GST-H tối đa 242 điểm/vòng. SIMPLEX IDNet chỉ 200 (4008) hoặc 250 (4010ES với IDNet2). SIMPLEX 2050FS chỉ 50 điểm MX loop.'},
{brand:'MIX',cat:'ALL',q:'Số điểm/loop tối đa: 242 điểm là của hãng:',options:['BOSCH','GST-H','SIMPLEX','Notifier'],correct:1,explain:'GST-H (và cả GST-UL) dùng SLC hỗ trợ 242 điểm địa chỉ/vòng (đánh số từ 1–242). Con số 242 rất riêng biệt — nếu tra spec thấy "242 điểm" gần như chắc chắn là GST. BOSCH 254, SIMPLEX 200/250.'},
{brand:'MIX',cat:'ALL',q:'Kiến trúc plug-and-play tự nhận diện module là của:',options:['BOSCH FPA-5000','GST-H','SIMPLEX 2004FS','GST-UL'],correct:0,explain:'Kiến trúc module plug-and-play tự nhận diện (auto-detect) khi cắm vào housing là đặc trưng của BOSCH FPA-5000. Cho phép thay thế module không cần lập trình lại. GST và SIMPLEX không có tính năng plug-and-play mức module chức năng như vậy.'},
{brand:'MIX',cat:'ALL',q:'Công nghệ Dual-Ray (2 LED hồng ngoại + xanh lam) là của:',options:['BOSCH AVENAR 4000','GST-UL DI-M9101N','SIMPLEX TrueAlarm','Notifier FCPS'],correct:0,explain:'Dual-Ray technology (2 LED: hồng ngoại + xanh lam) là công nghệ đặc trưng của đầu báo BOSCH AVENAR 4000 dòng dual-optical (FAP-425-DO-R, DOT-R, DOTC-R). Đáp ứng cả cháy TF1 (giấy) và TF9 (dầu) — bao phủ dải rộng nhất trong các test EN.'},
{brand:'MIX',cat:'ALL',q:'Công nghệ MWMA (Multi-Wave Multi-Angle) là của:',options:['BOSCH','GST-UL','SIMPLEX TrueAlarm','Notifier'],correct:1,explain:'MWMA (Multi-Wave Multi-Angle photoelectric) là công nghệ khói riêng của GST-UL dòng đầu báo DI-M910x. Phát nhiều bước sóng và thu ở nhiều góc để phân biệt khói thật với bụi/hơi nước. Không nhầm với TrueAlarm (SIMPLEX) hay ISP (BOSCH).'},
{brand:'MIX',cat:'ALL',q:'Công nghệ TrueSense (tương quan khói+nhiệt) là của:',options:['BOSCH','GST-H','SIMPLEX (4098-9754)','Notifier'],correct:2,explain:'TrueSense là công nghệ của SIMPLEX ứng dụng trên đầu báo đa cảm biến 4098-9754 (TrueAlarm Multi-Sensor). Phân tích tương quan khói+nhiệt đồng thời — phát hiện đám cháy ngọn lửa hot-flaming sớm hơn từng cảm biến riêng lẻ.'},
{brand:'MIX',cat:'ALL',q:'CAN loop kết nối tối đa 32 node là đặc trưng của:',options:['BOSCH FPA-5000','GST-H','SIMPLEX 4100ES','GST-UL'],correct:0,explain:'Mạng CAN loop hoặc Ethernet loop tối đa 32 node là đặc trưng của BOSCH FPA-5000 (bao gồm MPC + Remote Keypad + OPC server). GST-MNA2C dùng CAN nhưng tối đa 250 node. SIMPLEX dùng ES Net hoặc 4120 network.'},
{brand:'MIX',cat:'ALL',q:'Điện áp IDNAC 29 VDC ổn định (kể cả pin) là đặc trưng của:',options:['BOSCH','GST-H','SIMPLEX (dòng ES)','GST-UL'],correct:2,explain:'IDNAC SLC duy trì 29 VDC ổn định kể cả khi tủ dùng pin — đặc trưng độc quyền của SIMPLEX dòng ES (4007ES, 4010ES, 4017ES, 4100ES). Ưu điểm: khoảng cách dây gấp 2–3 lần NAC thường. Các hãng khác dùng 24V DC.'},
{brand:'MIX',cat:'ALL',q:'Panel có 6 vòng SLC Class A hỗ trợ 1452 điểm:',options:['BOSCH FPA-1200','GST200H/2','GST-IFP4M','SIMPLEX 2050FS'],correct:2,explain:'Tủ báo cháy GST-IFP4M có 6 vòng Class A × 242 điểm = 1.452 điểm — con số đặc trưng. Đừng nhầm với GST1500H (6 vòng × 242 điểm, cũng 1452 nhưng đây là dòng GST-H theo chuẩn GB, còn GST-IFP4M theo UL864).'},
{brand:'MIX',cat:'ALL',q:'Tủ báo cháy hỗ trợ tối đa 3000 điểm địa chỉ:',options:['BOSCH FPA-5000','GST9000H','SIMPLEX 4100ES','GST-IFP4M'],correct:2,explain:'Tủ 4100ES của SIMPLEX hỗ trợ tối đa 3.000 điểm địa chỉ — tủ lớn nhất dòng SIMPLEX. GST9000H có 14.520 điểm nhưng chia thành 60 vòng nhỏ (mỗi vòng 242), khác kiến trúc so với 4100ES.'},
{brand:'MIX',cat:'ALL',q:'Đặc điểm chỉ có ở SIMPLEX (không có ở BOSCH/GST):',options:['LSN','IDNet2 với short circuit isolating dual loop','SLC 242 điểm','FM200'],correct:1,explain:'IDNet2 SLC với short circuit isolating dual loop tích hợp là đặc trưng riêng của SIMPLEX (4010ES, 4100ES). Không cần isolator ngoài, dùng cả dây bọc lẫn không bọc. BOSCH dùng LSN improved, GST dùng SLC nhưng cả 2 đều không có short circuit isolating dual loop tích hợp như vậy.'},
{brand:'MIX',cat:'ALL',q:'Đặc điểm chỉ có ở BOSCH:',options:['LSN improved với 254 điểm/loop','IDNet','MX loop','SLC 242'],correct:0,explain:'LSN improved 254 điểm/loop là đặc trưng độc quyền của BOSCH. Đây là con số cao nhất trong các giao thức phổ biến, cho phép giảm số module bus khi thiết kế. Cùng với ISP + Dual-Ray, LSN là bộ 3 dấu hiệu nhận diện BOSCH.'},
{brand:'MIX',cat:'ALL',q:'Đặc điểm chỉ có ở GST (không có BOSCH/SIMPLEX):',options:['SLC không phân cực','Tủ điều khiển chữa cháy khí GST-QKP có sẵn menu delay','BACnet','IDNet'],correct:1,explain:'Tủ chữa cháy khí GST-QKP01H/02H/04H là dòng chuyên biệt của GST-H với menu trễ xả 0–30 giây tích hợp sẵn. BOSCH và SIMPLEX cần cấu hình logic bên ngoài hoặc dùng tủ suppression riêng (SIMPLEX 4004R) — GST tích hợp đơn giản hơn cho ứng dụng gas suppression.'},
{brand:'MIX',cat:'ALL',q:'Công nghệ MX loop (Foundation Series) là của:',options:['BOSCH','GST','SIMPLEX (2050FS/2250FS)','Notifier'],correct:2,explain:'MX loop là công nghệ của SIMPLEX Foundation Series — dùng trên tủ 2050FS (50 điểm) và 2250FS (250 điểm). Ưu điểm retrofit-friendly: 3 phương án địa chỉ hóa (DIP, Soft, QR code). MX khác hẳn IDNet cao cấp hơn của các tủ ES.'},
{brand:'MIX',cat:'ALL',q:'MAPNET II là giao thức thế hệ cũ của:',options:['BOSCH','GST','SIMPLEX','GST-UL'],correct:2,explain:'MAPNET II là giao thức addressable thế hệ cũ của SIMPLEX — vẫn được các tủ 4020, 4100, 4100ES backward compatible để bảo toàn đầu tư thiết bị cũ. Tủ 4007ES/4010ES thì chuyển sang IDNet+/IDNet2 hiện đại hơn.'},
{brand:'MIX',cat:'ALL',q:'Hãng nào tích hợp chuẩn UL 1076 (Security) trong tủ báo cháy?',options:['BOSCH','GST-UL','SIMPLEX 4020, 4100ES','Cả 3'],correct:2,explain:'Tủ 4020 và 4100ES của SIMPLEX đạt cả UL 864 (báo cháy) và UL 1076 (Security System) — cùng 1 tủ phục vụ cả báo cháy lẫn báo động an ninh. Đặc điểm riêng của SIMPLEX; BOSCH và GST-UL không có tủ 2-in-1 UL864+UL1076 tương tự.'},
{brand:'MIX',cat:'ALL',q:'BACnet built-in (tích hợp BMS) trên tủ FACP là của:',options:['BOSCH','GST-IFP4M','SIMPLEX 4100ES','GST-UL & SIMPLEX'],correct:3,explain:'Cả GST-IFP4M (BACnet built-in cần auth code) và SIMPLEX 4100ES (BACnet ASHRAE interface) đều tích hợp BACnet cho BMS. BOSCH FPA-5000 tích hợp BIS qua OPC server thay vì BACnet trực tiếp — cách tiếp cận khác nhau tuy đều đạt mục tiêu.'},
{brand:'MIX',cat:'ALL',q:'Hãng nào có VESDA Air Aspiration lên đến 127 điểm?',options:['BOSCH FPA-5000','GST-UL','SIMPLEX 4010ES','GST-H'],correct:2,explain:'Tủ 4010ES của SIMPLEX hỗ trợ tích hợp đến 127 hệ thống VESDA Air Aspiration (module tùy chọn). Đây là điểm rất mạnh cho phòng sạch, trung tâm dữ liệu, di tích — nơi cần hệ thống hút khí nhạy cao. Các hãng khác không tích hợp VESDA sâu như vậy.'},
{brand:'MIX',cat:'ALL',q:'Hãng nào có Foundation Series (2004FS, 2008FS, 2050FS, 2250FS)?',options:['BOSCH','GST','SIMPLEX','Notifier'],correct:2,explain:'Foundation Series là dòng tủ nhỏ-vừa của SIMPLEX: 2004FS/2008FS (conventional), 2050FS/2250FS (MX addressable). Tất cả dùng chung nền tảng phần mềm, phụ kiện. Đây là dòng entry-level phổ biến trong dự án Bắc Mỹ.'},
{brand:'MIX',cat:'ALL',q:'Panel Controller MPC-1300-C là của:',options:['BOSCH FPA-5000','GST','SIMPLEX','GST-UL'],correct:0,explain:'MPC-1300-C là Panel Controller (bộ điều khiển hiển thị và xử lý) của tủ BOSCH FPA-5000. Có TFT màu 5.7 inch, 22 phím cố định + key switch + màn hình cảm ứng. Nếu thấy ký hiệu MPC-1300-C trong bản vẽ chắc chắn là BOSCH.'},
{brand:'MIX',cat:'ALL',q:'Về đầu báo Air-Aspiration (hút khí): JTY-GXF-GST1D là của hãng nào?',options:['BOSCH','GST-H','SIMPLEX 4098-XAD','GST-UL'],correct:1,explain:'Đầu báo hút khí JTY-GXF-GST1D (Air-Sampling 1 ống) là của GST-H — dùng laser phân tích, có 4 cấp báo động (Pre-warning/Fire1/Fire2/Fire), giao tiếp RS-485 MODBUS. SIMPLEX có 4098-XAD tương tự nhưng tên khác hoàn toàn.'},
{brand:'MIX',cat:'ALL',q:'Tủ FPA-1200 tối đa 2 module LSN-0300-A tức 254 điểm là của:',options:['BOSCH','GST','SIMPLEX','Notifier'],correct:0,explain:'Tủ báo cháy FPA-1200 của BOSCH giới hạn tối đa 2 module LSN-0300-A × 127 điểm = 254 phần tử. Đây là "trần" của FPA-1200 — muốn nhiều hơn phải nâng cấp lên FPA-5000. Con số 254 và tên LSN-0300-A đều đặc trưng BOSCH.'},
{brand:'MIX',cat:'ALL',q:'ECS (Emergency Communications Systems) 8 kênh audio digital là của:',options:['BOSCH','GST','SIMPLEX 4100ES','GST-UL'],correct:2,explain:'ECS (Emergency Communications Systems) với 8 kênh digital audio hoặc 2 kênh analog audio là tính năng của tủ SIMPLEX 4100ES. Phục vụ thông báo khẩn cấp đa mục đích (fire, weather, security) trong tòa nhà lớn.'},
{brand:'MIX',cat:'ALL',q:'Tủ báo cháy conventional lớn nhất về IDC là:',options:['BOSCH FPC-500-8 (8 zones/256 detectors)','GST100','SIMPLEX 2008FS','GST-M200'],correct:0,explain:'Tủ FPC-500-8 của BOSCH có 8 vùng × 32 detector = 256 đầu báo — lớn nhất trong nhóm conventional so sánh. SIMPLEX 2008FS chỉ 8 IDC × 30 = 240 detector. GST100 (128 điểm) và GST-M200 (240) là addressable nên không so sánh trực tiếp.'},
{brand:'MIX',cat:'ALL',q:'Cấp bảo vệ IP 67 cho MCP (Manual Call Point) outdoor là:',options:['BOSCH FMC-420RW Form H','GST9121B','SIMPLEX 4099','GST9124'],correct:0,explain:'Nút ấn báo cháy BOSCH FMC-420RW Form H (outdoor) đạt IP 67 — cao nhất cho MCP dùng ngoài trời. GST9221B/W cũng có IP67 nhưng dành cho hầm dẫn cáp/ống kỹ thuật. GST9121B chỉ IP40 (trong nhà). SIMPLEX 4099 không có bản outdoor IP67.'},
{brand:'MIX',cat:'ALL',q:'ES Net Peer-to-Peer network là công nghệ mạng của:',options:['BOSCH','GST','SIMPLEX','GST-UL'],correct:2,explain:'ES Net Peer-to-Peer network (Class B hoặc X) là mạng riêng của SIMPLEX dòng ES — dùng trên 4007ES, 4010ES, 4017ES, 4100ES. Kết nối các tủ thành mạng ngang hàng, khác biệt hoàn toàn với BIS (BOSCH) hay CAN mạng (GST).'},
{brand:'MIX',cat:'ALL',q:'Chuẩn EN 54-11 Type A cho nút ấn single action là của:',options:['BOSCH FMC-420RW','GST9121B','SIMPLEX 4099','GST9124'],correct:0,explain:'Nút ấn FMC-420RW của BOSCH đạt EN 54-11 Type A (single action, 1 thao tác nhấn). Trong khi FMC-210-DM của BOSCH đạt Type B (double action, 2 thao tác). GST và SIMPLEX theo chuẩn khác (GB, UL 38) nên không có EN 54-11 marking.'},
{brand:'MIX',cat:'ALL',q:'Cảnh báo bẩn 3 cấp Dirty/Almost Dirty/Excessively Dirty là:',options:['BOSCH ISP','GST bù trôi','SIMPLEX TrueAlarm','MWMA'],correct:2,explain:'Cảnh báo bẩn 3 cấp (Dirty / Almost Dirty / Excessively Dirty) là đặc trưng của dòng đầu báo SIMPLEX TrueAlarm. Cho phép predictive maintenance — biết trước khi detector cần vệ sinh/thay. BOSCH có drift compensation nhưng không có 3-tier alerts như vậy.'},
{brand:'MIX',cat:'ALL',q:'Số hãng dùng SLC 2 dây KHÔNG phân cực là:',options:['Chỉ 1 (BOSCH)','2 (GST-H và GST-UL)','3 hãng','Không có'],correct:1,explain:'Cả 2 dòng của GST — GST-H và GST-UL — đều dùng SLC 2 dây không phân cực (đấu ngược cực vẫn hoạt động). Đây là điểm nhận diện GST rất rõ ràng. BOSCH LSN và SIMPLEX IDNet cũng có tính chất tương tự nhưng dùng tên và giao thức khác.'},
{brand:'MIX',cat:'ALL',q:'FSP-5000-RPS là phần mềm cấu hình của:',options:['BOSCH','GST','SIMPLEX','GST-UL'],correct:0,explain:'FSP-5000-RPS Programming Software là phần mềm cấu hình chính của BOSCH — dùng cho cả tủ FPA-5000 và FPA-1200. Kết nối qua USB hoặc Ethernet. Đây là dấu hiệu chắc chắn của BOSCH trong hồ sơ dự án.'},
{brand:'MIX',cat:'ALL',q:'Tủ nào hỗ trợ Cellular 4G/LTE communicator?',options:['BOSCH FPA-5000','GST-IFP4M','SIMPLEX 2050FS/2250FS','GST-M200'],correct:2,explain:'Tủ 2050FS và 2250FS của SIMPLEX (Foundation Series) hỗ trợ DACT 2 đường + IP (Fibro) + Cellular 4G/LTE (tùy chọn) + Ethernet — nhiều đường truyền thông nhất trong dòng entry-level. Tăng độ tin cậy khi báo về trung tâm.'},
{brand:'MIX',cat:'ALL',q:'SafeLINC Cloud (giám sát từ xa qua CSG) là dịch vụ của:',options:['BOSCH','GST','SIMPLEX','Notifier'],correct:2,explain:'SafeLINC Cloud qua Connected Services Gateway (CSG) là dịch vụ giám sát từ xa của SIMPLEX — dùng trên tủ 2050FS, 2250FS, 4100ES. Cho phép quản lý qua web/mobile app. BOSCH có Remote Services riêng, GST không có tương đương.'},
{brand:'MIX',cat:'ALL',q:'BOSCH Remote Services để giám sát từ xa qua:',options:['Cellular','Ethernet (cần license)','Modbus','RS485'],correct:1,explain:'BOSCH Remote Services là dịch vụ giám sát từ xa qua Ethernet (cần cấu hình mạng và license). Tương tự SafeLINC của SIMPLEX nhưng của BOSCH. Ưu điểm: kỹ thuật viên có thể check status tủ mà không cần đến hiện trường.'},
{brand:'MIX',cat:'ALL',q:'Tủ có 2 loại giao tiếp NAC (Class B TrueAlert + IDNAC addressable):',options:['BOSCH FPA-5000','GST-IFP4M','SIMPLEX 4100ES','GST-M200'],correct:2,explain:'Tủ 4100ES của SIMPLEX hỗ trợ đồng thời NAC extender 4009 IDNet + IDNAC SLC + tương thích TrueAlert ES (addressable) và TrueAlert (non-addressable). Linh hoạt kết nối nhiều loại thiết bị thông báo — phù hợp mở rộng dần từ hệ thống cũ.'},
{brand:'MIX',cat:'ALL',q:'Đặc điểm chỉ có ở BOSCH AVENAR 4000 (không có ở đầu báo hãng khác):',options:['Isolator tích hợp','Bù trôi','ISP + Dual-Ray + drift compensation + EMC monitoring','Địa chỉ tự động'],correct:2,explain:'Bộ tổ hợp ISP (Intelligent Signal Processing) + Dual-Ray + drift compensation + EMC monitoring là đặc trưng riêng của đầu báo BOSCH AVENAR 4000. Không có hãng nào tích hợp đủ 4 tính năng này trong 1 detector. Nếu thấy tên "AVENAR 4000" là chắc chắn BOSCH.'},
{brand:'MIX',cat:'ALL',q:'Điểm khác biệt về ngôn ngữ vận hành:',options:['BOSCH đa ngôn ngữ (DE/EN/ES/PT/PL/FR)','GST-H tiếng Trung + Anh','GST-UL tiếng Anh + Trung phồn thể; SIMPLEX Unicode dual','Tất cả đều đúng'],correct:3,explain:'Mỗi hãng có chiến lược ngôn ngữ khác nhau: BOSCH ưu tiên châu Âu (đa ngôn ngữ DE/EN/ES/PT/PL/FR…), GST-H tiếng Trung + Anh (một số có tiếng Việt), GST-UL Anh + Trung phồn thể (Đài Loan/HK), SIMPLEX 4007ES/4017ES hỗ trợ dual language Unicode+ (custom background).'},
{brand:'MIX',cat:'ALL',q:'Về thời gian trễ xả khí (delay time) chữa cháy khí:',options:['BOSCH có sẵn','GST-QKP: 0-30 giây cài đặt qua menu','SIMPLEX 4004R','Cả 3'],correct:1,explain:'Tủ chữa cháy khí GST-QKP01H/02H/04H của GST-H có menu delay 0–30 giây tích hợp sẵn, cài trực tiếp từ tủ. SIMPLEX 4004R có timer tương tự nhưng cấu hình khác (qua operator panel). BOSCH cần lập trình logic riêng qua FSP-5000-RPS — không có tủ chuyên biệt cho gas suppression.'},
{brand:'MIX',cat:'ALL',q:'Isolator2 base (phục hồi ngắn mạch nhanh hơn) là đặc trưng của:',options:['BOSCH','GST','SIMPLEX (4098-9766/9767)','GST-UL'],correct:2,explain:'Isolator2 Base 4098-9766/9767 là đặc trưng của SIMPLEX IDNet2 (dòng ES thế hệ mới). Phục hồi ngắn mạch nhanh hơn Isolator thường. Chỉ dùng với panel hỗ trợ IDNet2 (4007ES, 4010ES, 4100ES). Không dùng cho tủ IDNet đời cũ.'},
{brand:'MIX',cat:'ALL',q:'Tính năng WALKTEST silent hoặc audible có ở hãng nào?',options:['BOSCH','GST-M200 và GST-IFP4M','SIMPLEX','Cả GST-UL & SIMPLEX'],correct:3,explain:'Cả GST-UL (M200, IFP4M) và SIMPLEX (2050FS 8 nhóm WALKTEST, 4020 US Patent WALKTEST) đều có tính năng WALKTEST silent/audible. Đây là công cụ kiểm tra hệ thống không kích hoạt tín hiệu thật — quan trọng khi bảo trì tòa nhà đang vận hành.'},

// === SO SÁNH GIAO THỨC CHÉO ===
{brand:'MIX',cat:'ALL',q:'So sánh số điểm/loop cao nhất giữa 3 hãng:',options:['BOSCH cao nhất','LSN improved (BOSCH) 254 > IDNet2/MX (SIMPLEX) 250 > SLC (GST) 242','GST cao nhất','SIMPLEX cao nhất'],correct:1,explain:'Xếp hạng điểm/loop tối đa (cao xuống thấp): BOSCH LSN improved 254 → SIMPLEX IDNet2/2250FS MX 250 → GST-H/GST-UL SLC 242 → SIMPLEX IDNet đời cũ 200 → SIMPLEX 2050FS MX 50. Con số 242 là "vân tay" của GST. Con số 254 là "vân tay" của BOSCH LSN improved. Chênh lệch không lớn nhưng phản ánh triết lý thiết kế khác nhau.'},
{brand:'MIX',cat:'ALL',q:'Điện áp bus SLC — cả 3 hãng dùng chung điểm gì?',options:['Đều 12V','Cả 3 dùng nguồn danh định 24V DC trên bus 2 dây — dải hoạt động 15-33V','12V và 48V khác','Chỉ SIMPLEX 29V'],correct:1,explain:'Điểm chung: cả BOSCH LSN, GST SLC, SIMPLEX IDNet đều dùng bus 24V DC danh định trên 2 dây (dải 15-33V). Đây là chuẩn ngành báo cháy. ĐIỂM KHÁC BIỆT LỚN: SIMPLEX IDNAC (chỉ notification, không phải initiation) giữ nghiêm 29V DC ổn định kể cả pin — đảm bảo còi/đèn hoạt động ổn định. BOSCH và GST dùng 24V thường cho cả init lẫn notification.'},
{brand:'MIX',cat:'ALL',q:'Cách xử lý ngắn mạch trên loop khác nhau thế nào?',options:['Giống nhau','BOSCH & SIMPLEX IDNet2: isolator tích hợp trong thiết bị; GST: dùng module isolator riêng (GST-LD-8313 mỗi 32 địa chỉ)','Chỉ tủ xử lý','Không hãng nào hỗ trợ'],correct:1,explain:'3 cách tiếp cận xử lý ngắn mạch: (1) BOSCH LSN — isolator tích hợp SẴN trong mọi đầu báo AVENAR 4000 (2 isolator/thiết bị); (2) SIMPLEX IDNet2 — short circuit isolation TÍCH HỢP TRONG BUS (không cần isolator riêng); (3) GST-H/GST-UL — dùng MODULE ISOLATOR RIÊNG (GST-LD-8313 cho GST-H, DC-M9503 cho GST-UL) lắp mỗi 32 địa chỉ. Cách tiếp cận khác nhau nhưng đều đạt mục tiêu bảo vệ loop.'},
{brand:'MIX',cat:'ALL',q:'Truyền dữ liệu analog (giá trị đo thực) là đặc trưng của:',options:['Chỉ BOSCH','SIMPLEX TrueAlarm (4 giây/sensor) — BOSCH và GST truyền on/off với thuật toán ISP/MWMA ở đầu báo','GST','Cả 3'],correct:1,explain:'Cách phân tích tín hiệu khác nhau: (1) SIMPLEX TrueAlarm — sensor gửi GIÁ TRỊ ĐO THỰC (analog) mỗi 4 giây về tủ, tủ quyết định báo động; (2) BOSCH AVENAR 4000 với ISP — thuật toán chạy TRÊN đầu báo, gửi tín hiệu on/off "thông minh" về tủ; (3) GST-UL DI-M910x với MWMA — tương tự BOSCH, xử lý ở đầu báo. Ưu điểm SIMPLEX: dễ chỉnh ngưỡng, tính lịch sử; Ưu điểm BOSCH/GST: giảm tải bus, phản ứng nhanh.'},
{brand:'MIX',cat:'ALL',q:'Mở rộng mạng lớn nhất — hãng nào?',options:['GST9000H 14.520 điểm/1 tủ','BOSCH FPA-5000 mạng 32 node × 1024 = 32.768 điểm','SIMPLEX 4100ES 3000 điểm','Tất cả bằng nhau'],correct:1,explain:'Xếp hạng mở rộng mạng cực đại: (1) BOSCH FPA-5000 mạng — 32 node × 1024 điểm = 32.768 điểm (lớn nhất); (2) GST-IFP4M mạng CAN — 250 node × 1452 = 363.000 điểm (lý thuyết nhưng ít khi dùng hết); (3) SIMPLEX 4100ES + ES Net — không có số cụ thể nhưng thực tế ~100+ tủ. Chú ý: các số này là "trần lý thuyết", dự án thực tế hiếm khi cần >50 tủ trong 1 mạng.'},
{brand:'MIX',cat:'ALL',q:'Voice Evacuation tích hợp trong FACP — hãng nào có?',options:['Chỉ BOSCH','SIMPLEX 4017ES (amp 50W tích hợp) và GST-UL GVA/GVX/MP16 (tủ riêng nhưng cùng thương hiệu)','GST-H','Cả 3'],correct:1,explain:'Voice evacuation: (1) SIMPLEX 4017ES tích hợp amplifier 50W trong tủ FACP — 1 tủ vừa báo cháy vừa voice, gọn nhất; (2) GST-UL có dòng riêng GVA/GVX Voice Evacuation + GST-MP16 Master Panel — tách biệt với FACP, kết nối qua NAC/RS232; (3) BOSCH kết nối hệ audio Praesideo/PAVIRO riêng qua module IOS-0020-A/IOS-0232-A — cần audio system riêng, không tích hợp trong FACP. Kiến trúc khác nhau tùy triết lý hãng.'},
{brand:'MIX',cat:'ALL',q:'Kiến trúc plug-and-play module là đặc trưng độc quyền của:',options:['BOSCH FPA-5000 (module chức năng tự nhận diện)','GST','SIMPLEX','Cả 3'],correct:0,explain:'Plug-and-play mức module chức năng (LSN-0300-A, FLM-420-NAC, BCM-0000-B…) là đặc trưng riêng của BOSCH FPA-5000. Cắm module vào housing, tủ tự nhận diện loại + tự cấu hình. Thay module hỏng không cần lập trình lại. GST và SIMPLEX có plug-and-play mức thiết bị bus (detector, MCP thay được không cần lập trình lại vì địa chỉ ở base), nhưng KHÔNG có plug-and-play mức module chức năng trong tủ như BOSCH.'},
{brand:'MIX',cat:'ALL',q:'Ngôn ngữ ứng dụng của 3 hãng:',options:['Đều đa ngôn ngữ','BOSCH: EU-centric (DE/EN/ES/PT/PL/FR); GST-H: Trung/Anh (một số có Việt); GST-UL: Anh + Trung phồn thể; SIMPLEX: Unicode dual (custom)','Chỉ tiếng Anh','Ngẫu nhiên'],correct:1,explain:'Chiến lược ngôn ngữ khác nhau phản ánh thị trường mục tiêu: BOSCH châu Âu → đa ngôn ngữ EU (DE, EN, ES, PT, PL, FR, NL, IT, CS, RU, TR, RO); GST-H (Hải Vịnh) → Trung + Anh, một số bản có tiếng Việt cho thị trường VN; GST-UL → Anh + Trung phồn thể (Đài Loan/Hong Kong); SIMPLEX 4007ES/4017ES → dual language Unicode+ (chọn 2 ngôn ngữ bất kỳ, custom background). Ở Việt Nam, GST-H có tiếng Việt là lợi thế lớn.'},
{brand:'MIX',cat:'ALL',q:'Chuẩn nào 3 hãng áp dụng khác nhau?',options:['UL toàn cầu','BOSCH → EN 54 (EU) + VdS; GST-H → GB (TQ); GST-UL & SIMPLEX → UL864/NFPA72 (Bắc Mỹ)','Chỉ 1 chuẩn','ISO 9001'],correct:1,explain:'Bản đồ chuẩn: (1) BOSCH → EN 54 (chuẩn châu Âu) + VdS G 205106 (Đức) + CPD 0786 (EU) + DIBt (Đức); (2) GST-H → GB 4715, GB 4716, GB 16806, GB 29837 (chuẩn Trung Quốc); (3) GST-UL & SIMPLEX → UL 864 10th Edition + NFPA 72 + ULC (Canada) + CSFM (California) + FM Approved + MEA (NYC). Chọn hãng theo yêu cầu chuẩn của cơ quan quản lý (AHJ) tại địa phương.'},
{brand:'MIX',cat:'ALL',q:'Nhận diện nhanh giao thức qua dấu hiệu:',options:['Chỉ nhìn tủ','LSN + 254 điểm = BOSCH; SLC + 242 điểm = GST; IDNet/IDNAC = SIMPLEX; MAPNET II = SIMPLEX cũ','Không phân biệt được','Chỉ qua serial'],correct:1,explain:'Bí kíp nhận diện giao thức khi đọc hồ sơ dự án: (1) Thấy "LSN improved" hoặc "254 điểm/loop" hoặc "LSN-0300-A/LSN-1500-A" → BOSCH; (2) Thấy "SLC 2 dây không phân cực" + "242 điểm" hoặc mã "GST-*" → GST (kiểm tra thêm chuẩn UL hay GB để phân biệt UL vs H); (3) Thấy "IDNet", "IDNAC", "IDNet2", "IDNet+", "TrueAlarm" → SIMPLEX; (4) Thấy "MAPNET II" → SIMPLEX đời cũ; (5) Thấy "MX loop" + "Foundation Series" → SIMPLEX 2050FS/2250FS.'},
{brand:'MIX',cat:'ALL',q:'Nếu dự án ở Việt Nam yêu cầu chuẩn UL, chọn hãng nào?',options:['Chỉ SIMPLEX','GST-UL hoặc SIMPLEX (đều đạt UL864/NFPA72) — BOSCH cần chọn dòng UL riêng, GST-H không phù hợp','Chỉ BOSCH','Không hãng nào'],correct:1,explain:'Dự án ở VN yêu cầu chuẩn UL (thường do chủ đầu tư nước ngoài hoặc dự án có yếu tố Mỹ): (1) GST-UL — đạt UL864 10th Edition + NFPA72, giá phù hợp thị trường VN, có đại lý địa phương tốt; (2) SIMPLEX — đạt UL864 + đầy đủ ULC/CSFM/FM/MEA, giá cao hơn nhưng tính năng cao cấp; (3) BOSCH — chủ yếu EN 54, có 1 số sản phẩm UL (như W-HSR do Cooper Wheelock), nhưng dòng chính không phải UL; (4) GST-H — GB Trung Quốc, KHÔNG phù hợp yêu cầu UL.'},
{brand:'MIX',cat:'ALL',q:'Retrofit hệ thống conventional cũ lên addressable — hãng nào tối ưu?',options:['BOSCH','SIMPLEX Foundation Series (2050FS/2250FS) — 3 phương án địa chỉ, dùng dây cũ, giá thấp','Chỉ GST','Không hãng nào'],correct:1,explain:'Retrofit từ conventional lên addressable: (1) SIMPLEX 2050FS/2250FS Foundation Series là tối ưu — dùng MX loop tương thích dây cũ, 3 phương án địa chỉ hóa (DIP/Soft/QR), DACT + IP + Cellular tích hợp, giá phù hợp; (2) GST-UL M200 cũng OK nhưng ít linh hoạt hơn; (3) BOSCH có thể retrofit qua LSN classic nhưng cần nhiều module bus hơn, giá cao. SIMPLEX Foundation Series thiết kế RIÊNG cho retrofit — chi phí thấp hơn thay thế hoàn toàn 40-60%.'},
{brand:'MIX',cat:'ALL',q:'Voice Evacuation + Mass Notification (MNS) cho sân bay/campus:',options:['GST-UL GVA','SIMPLEX 4100ES với ECS 8 kênh audio + UL 2572 MNS','BOSCH Praesideo','Chỉ MP16'],correct:1,explain:'Sân bay/campus lớn yêu cầu Mass Notification System (MNS) đa mục đích: báo cháy + khủng bố + thời tiết + an ninh. Giải pháp mạnh nhất: SIMPLEX 4100ES với ECS (Emergency Communications Systems) 8 kênh digital audio hoặc 2 kênh analog — cho phép phát nội dung khác nhau tại các vùng khác nhau đồng thời. Đạt UL 2572 (chuẩn MNS bắt buộc ở sân bay Mỹ). BOSCH có Praesideo cho voice nhưng không tối ưu cho MNS như 4100ES; GST-UL GVA/MP16 phù hợp tòa nhà thương mại vừa.'},
{brand:'MIX',cat:'ALL',q:'Hệ thống báo cháy + báo động an ninh trong 1 tủ:',options:['BOSCH BIS','SIMPLEX 4020/4100ES (UL 864 + UL 1076) trên cùng IDNet — 1 tủ 2 hệ thống','GST','Không hãng nào'],correct:1,explain:'Tích hợp fire alarm + security trong 1 tủ FACP: chỉ SIMPLEX 4020 và 4100ES đạt cả UL 864 (fire) và UL 1076 (security). Dùng module 4090-9121 Security Monitor IAM giám sát cửa/motion/contact sensor trên cùng SLC IDNet. Ưu điểm: 1 hệ thống dây, 1 UI quản lý, giảm 30-40% chi phí. BOSCH tích hợp qua BIS (Building Integration System) ở cấp phần mềm — không phải 1 tủ. GST-UL không có tủ đôi UL864+UL1076.'},
{brand:'MIX',cat:'ALL',q:'Tủ chữa cháy khí (gas suppression) tối ưu:',options:['BOSCH FPA-5000 (cần logic riêng)','GST-QKP01H/02H/04H — tủ chuyên biệt có menu delay 0-30s, van 24V/3A tích hợp','SIMPLEX 4008','Không hãng nào'],correct:1,explain:'Tủ chữa cháy khí chuyên biệt: (1) GST-H có dòng GST-QKP01H/02H/04H — tủ chuyên biệt, menu delay 0-30s tích hợp, đầu ra van điện từ 24V/3A trực tiếp, cross-zoning sẵn có. Giá tối ưu, dễ vận hành, phổ biến ở VN cho FM200/CO2/Novec. (2) SIMPLEX 4004R Suppression Releasing Panel — mạnh hơn, có 3 giai đoạn escalation audio, nhưng phức tạp và đắt hơn. (3) BOSCH FPA-5000 cần lập trình logic riêng qua FSP-5000-RPS, không có tủ chuyên biệt.'},
{brand:'MIX',cat:'ALL',q:'Điểm chung của cả 3 hãng khi thiết kế loop:',options:['Không có','Đều tuân thủ: 24h standby + 30 phút alarm (EN 54-4 / NFPA 72); chừa ~20% dự phòng loop; isolator cho ngắn mạch','Chỉ BOSCH','Chỉ SIMPLEX'],correct:1,explain:'Nguyên tắc thiết kế chung cho cả 3 hãng: (1) Ắc-quy dự phòng — 24 giờ standby + 30 phút full alarm (chuẩn EN 54-4 / NFPA 72), critical bệnh viện cần 72h; (2) Chừa ~20% dự phòng số điểm/loop (dùng 200/254, 100/127, 200/250 tùy hãng); (3) Cơ chế cách ly ngắn mạch dù cách tiếp cận khác nhau (integrated vs modular); (4) Class A cho tòa nhà critical, Class B cho tiết kiệm dây; (5) Tính sụt áp cuối loop đảm bảo điện áp tối thiểu cho thiết bị hoạt động.'},
{brand:'MIX',cat:'ALL',q:'Chi phí hệ thống — xếp hạng thông thường ở VN:',options:['Đều bằng nhau','GST-H rẻ nhất → GST-UL trung bình → BOSCH cao hơn → SIMPLEX cao nhất (dòng ES cao cấp)','SIMPLEX rẻ nhất','BOSCH đắt nhất luôn'],correct:1,explain:'Bảng giá tham khảo thị trường VN (thứ tự tăng dần): (1) GST-H (Hải Vịnh) — rẻ nhất, sản xuất TQ, phổ biến nhất VN cho dự án dân dụng/thương mại vừa; (2) GST-UL — trung bình, khi cần UL864 với giá phải chăng; (3) BOSCH — cao hơn, chất lượng Đức, thị trường công nghiệp/cao cấp; (4) SIMPLEX dòng ES (4007ES/4010ES/4100ES) — cao nhất, tính năng đầy đủ cho critical infrastructure (bệnh viện lớn, sân bay). Chọn theo ngân sách + yêu cầu chuẩn + độ phức tạp dự án.'},
{brand:'MIX',cat:'ALL',q:'Phần mềm cấu hình đặc trưng của từng hãng:',options:['Cùng phần mềm','BOSCH: FSP-5000-RPS + SSD Designer; GST-UL: GST-IFPx-Def Tool; SIMPLEX: ES Programmer + site-specific tools','Đều không cần','Chỉ Excel'],correct:1,explain:'Phần mềm cấu hình từng hãng: (1) BOSCH — FSP-5000-RPS Programming Software (cấu hình logic tủ) + SSD Safety Systems Designer (lập kế hoạch loop, tính dòng/cáp); (2) GST-H — công cụ nội bộ, thường qua tủ trực tiếp; (3) GST-UL — GST-IFPx-Def Tool; (4) SIMPLEX — Enhanced System programmer (dùng site-specific software, cần kỹ thuật viên được đào tạo). Chọn hãng cần tính đến khả năng có phần mềm và người biết dùng ở địa phương.'},
{brand:'MIX',cat:'ALL',q:'Backward compatibility thiết bị cũ với tủ mới:',options:['Không hãng nào','BOSCH: LSN improved back-compatible LSN classic + tủ cũ (BZ 500/UGM 2020); SIMPLEX: 4100ES back-compatible MAPNET II','Chỉ GST','Chỉ SIMPLEX'],correct:1,explain:'Chính sách backward compatibility: (1) BOSCH — LSN improved back-compatible hoàn toàn với LSN classic; AVENAR 4000 back-compatible với tủ cũ BZ 500 LSN, UEZ 2000 LSN, UGM 2020; (2) SIMPLEX 4100ES back-compatible với MAPNET II — thiết bị đời cũ (MAPNET II detector/module) vẫn dùng được trên tủ 4100ES mới; (3) GST giữ chuẩn địa chỉ 1-242 nhất quán, đa số thiết bị tương thích ngược. Điều này bảo toàn đầu tư khi nâng cấp tủ.'},
{brand:'MIX',cat:'ALL',q:'Isolator strategy khác nhau ở 3 hãng:',options:['Giống nhau','BOSCH: 2 isolator/thiết bị tích hợp; SIMPLEX IDNet2: dual loop isolation trong bus; GST: module isolator riêng mỗi 32 địa chỉ','Chỉ BOSCH có','Không hãng nào có'],correct:1,explain:'3 triết lý isolator: (1) BOSCH LSN — mỗi thiết bị (AVENAR 4000 detector, FMC-420RW MCP…) tích hợp SẴN 2 isolator; ngắn mạch chỉ cô lập giữa 2 thiết bị kề nhau; (2) SIMPLEX IDNet2 — short circuit isolation TÍCH HỢP TRONG BUS (dual loop), tự cô lập từng đoạn khi có sự cố; (3) GST-H và GST-UL — dùng MODULE ISOLATOR RIÊNG (GST-LD-8313 / DC-M9503) lắp mỗi 32 địa chỉ; ngắn mạch cô lập cả đoạn 32 thiết bị. Cách BOSCH giữ tin cậy cao nhất; GST tiết kiệm chi phí hơn.'}
);

function showCategories(brand){
  currentBrand=brand;
  document.getElementById('home').classList.add('hidden');
  document.getElementById('categories').classList.remove('hidden');
  document.getElementById('brand-title').textContent = brand==='MIX'?'🌈 HỖN HỢP':brand;
  const grid=document.getElementById('cat-grid');
  grid.innerHTML='';
  CATEGORIES[brand].forEach(c=>{
    const div=document.createElement('div');
    div.className='cat-card';
    div.innerHTML=`<div class="cat-icon">${c.icon}</div><div style="font-weight:bold;">${c.name}</div>`;
    div.onclick=()=>startQuiz(brand,c.key);
    grid.appendChild(div);
  });
}

document.querySelectorAll('.count-btn').forEach(b=>{
  b.onclick=()=>{
    document.querySelectorAll('.count-btn').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    currentCount=b.dataset.count==='all'?9999:parseInt(b.dataset.count);
  };
});

function startQuiz(brand,cat){
  currentCat=cat;
  let pool = QUESTIONS.filter(q=>{
    if(brand==='MIX') return q.brand==='MIX';
    if(cat==='ALL') return q.brand===brand;
    return q.brand===brand && q.cat===cat;
  });
  if(pool.length===0){ alert('Chưa có câu hỏi cho mục này!'); return; }
  quiz = shuffle([...pool]).slice(0,currentCount);
  qIdx=0; score=0; wrongs=[];
  document.getElementById('categories').classList.add('hidden');
  document.getElementById('quiz').classList.remove('hidden');
  showQ();
}

function shuffle(arr){for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}return arr;}

function showQ(){
  const q=quiz[qIdx];
  document.getElementById('qcat').textContent = `Câu ${qIdx+1} · ${q.brand==='MIX'?'HỖN HỢP':q.brand+' / '+q.cat}`;
  document.getElementById('qtext').textContent = q.q;
  document.getElementById('pcount').textContent = `${qIdx+1}/${quiz.length}`;
  document.getElementById('pbar').style.width = ((qIdx)/quiz.length*100)+'%';
  const opts=document.getElementById('qopts');
  opts.innerHTML='';
  const letters=['A','B','C','D'];
  // shuffle options but track correct
  const idxs=[0,1,2,3];
  shuffle(idxs);
  idxs.forEach((oi,i)=>{
    const div=document.createElement('div');
    div.className='option';
    div.innerHTML=`<span class="opt-letter">${letters[i]}</span><span>${q.options[oi]}</span>`;
    div.onclick=()=>selectAns(div,oi,q.correct);
    opts.appendChild(div);
  });
  document.getElementById('qexp').classList.remove('show');
  document.getElementById('btnNext').classList.add('hidden');
}

function selectAns(el,chosen,correct){
  if(el.parentElement.querySelector('.disabled')) return;
  document.querySelectorAll('.option').forEach((o,i)=>{
    o.classList.add('disabled');
    o.onclick=null;
  });
  const q=quiz[qIdx];
  if(chosen===correct){
    el.classList.add('correct');
    score++;
  }else{
    el.classList.add('wrong');
    document.querySelectorAll('.option').forEach(o=>{
      if(o.querySelector('span:last-child').textContent===q.options[correct]) o.classList.add('correct');
    });
    wrongs.push({q:q.q, correct:q.options[correct], exp:q.explain});
  }
  const exp=document.getElementById('qexp');
  exp.innerHTML=`<strong>💡 Giải thích:</strong> ${q.explain}`;
  exp.classList.add('show');
  document.getElementById('btnNext').classList.remove('hidden');
  document.getElementById('btnNext').textContent = qIdx===quiz.length-1?'Xem kết quả 🎯':'Câu tiếp →';
}

function nextQ(){
  qIdx++;
  if(qIdx>=quiz.length) showResult();
  else showQ();
}

function showResult(){
  document.getElementById('quiz').classList.add('hidden');
  document.getElementById('result').classList.remove('hidden');
  const pct=Math.round(score/quiz.length*100);
  document.getElementById('scoreBig').textContent=`${score}/${quiz.length}`;
  document.getElementById('scorePercent').textContent=`${pct}% chính xác`;
  let msg='';
  if(pct===100) msg='🏆 Xuất sắc! Bạn đã nắm vững toàn bộ nội dung. Tiếp tục ôn luyện các category khác để mở rộng kiến thức.';
  else if(pct>=80) msg='🎉 Tuyệt vời! Kiến thức của bạn rất chắc. Xem lại các câu sai để hoàn thiện thêm.';
  else if(pct>=60) msg='👍 Khá tốt! Bạn đã nắm được kiến thức cơ bản. Chú ý các câu sai bên dưới để cải thiện.';
  else if(pct>=40) msg='📚 Trung bình. Bạn cần ôn lại tài liệu, đặc biệt các thông số kỹ thuật và lưu ý lắp đặt.';
  else msg='💪 Cần cố gắng thêm! Đề nghị đọc lại tài liệu từng hãng trước khi làm quiz lần nữa.';
  let html=`<h3>Nhận xét chung</h3><p>${msg}</p>`;
  if(wrongs.length>0){
    html+=`<h3 style="margin-top:20px;">Các câu bạn cần ôn lại (${wrongs.length})</h3><div class="wrong-list">`;
    wrongs.forEach((w,i)=>{
      html+=`<div class="wrong-item"><strong>Câu ${i+1}:</strong> ${w.q}<br><strong style="color:#00b04f;">Đáp án đúng:</strong> ${w.correct}<br><strong style="color:#f7c548;">Giải thích:</strong> ${w.exp}</div>`;
    });
    html+='</div>';
  }
  document.getElementById('summary').innerHTML=html;
}

function goHome(){
  ['categories','quiz','result'].forEach(id=>document.getElementById(id).classList.add('hidden'));
  document.getElementById('home').classList.remove('hidden');
}
function retryQuiz(){
  document.getElementById('result').classList.add('hidden');
  showCategories(currentBrand);
}
</script>
